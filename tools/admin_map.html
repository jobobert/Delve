<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Sixfold Realms — Admin Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #eee; font-family: monospace;
          display: flex; height: 100vh; overflow: hidden; }

  #sidebar { width: 300px; min-width: 220px; background: #16213e;
              border-right: 1px solid #2a2a4a;
              display: flex; flex-direction: column; overflow: hidden; }
  #sidebar-header { padding: 12px 14px; background: #0f3460;
                     border-bottom: 1px solid #2a2a4a; flex-shrink: 0; }
  #sidebar-header h2 { font-size: 13px; color: #88aaff; }
  #sidebar-header p  { font-size: 10px; color: #555; margin-top: 3px; }
  #sidebar-body { flex: 1; overflow-y: auto; padding: 12px; }

  #room-detail h3 { color: #88aaff; font-size: 13px; margin-bottom: 3px; }
  .room-id  { color: #555; font-size: 10px; margin-bottom: 10px; }
  .section  { margin-top: 10px; }
  .section h4 { color: #888; font-size: 10px; text-transform: uppercase;
                letter-spacing: 1px; margin-bottom: 3px; }
  .desc   { color: #bbb; font-size: 11px; line-height: 1.5; white-space: pre-wrap; }
  .tag    { display: inline-block; background: #2a2a4a; color: #aaa;
             font-size: 10px; padding: 1px 5px; border-radius: 3px; margin: 1px; }
  .tag.town       { color: #88f; }
  .tag.no_combat  { color: #f88; }
  .tag.safe_combat { color: #8f8; }
  .exit   { font-size: 11px; color: #ccc; margin: 1px 0; }
  .exit .locked { color: #e05050; font-size: 10px; }
  .item   { font-size: 11px; color: #fa0; margin: 1px 0; }
  .npc    { font-size: 11px; color: #f88; margin: 1px 0; }
  .auto-badge { font-size: 10px; color: #f80; background: #332;
                 padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
  .comment    { color: #f80; font-size: 10px; font-style: italic;
                 margin-top: 6px; }
  .placeholder { color: #444; font-size: 12px; margin-top: 40px;
                  text-align: center; }

  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #toolbar { padding: 7px 12px; background: #0f3460;
              border-bottom: 1px solid #2a2a4a;
              display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #toolbar input { background: #1a1a2e; border: 1px solid #444;
                    color: #eee; padding: 3px 7px; border-radius: 4px;
                    font-size: 11px; width: 130px; }
  #toolbar label { color: #888; font-size: 11px; }
  #map-container { flex: 1; overflow: auto; }

  .room-node rect { transition: fill 0.1s, stroke 0.1s; }
  .room-node:hover rect  { fill: rgba(255,255,255,0.07) !important; }
  .room-node.selected rect {
    stroke: #fff !important; stroke-width: 2.5 !important;
    fill: rgba(255,255,255,0.12) !important;
  }
</style>

<script>
const ROOMS = {"ashwood_gate": {"id": "ashwood_gate", "name": "Ashwood Gate", "zone": "ashwood", "description": "Two stone pillars flank the old eastern road, carved with warning sigils that have half-eroded over the centuries. A weathered notice board bears a torn placard: 'ROAD CLOSED — MILITARY ORDER.' Beyond the gate the trees are larger, older, and the air smells faintly of something burnt and animal. A lone ranger sits beside the pillar, sharpening a knife.", "flags": ["no_combat", "town"], "items": [], "npcs": ["Ranger Wren", "Ashwood Warden"], "exits": {"west": {"dest": "deep_forest", "locked": false}, "east": {"dest": "ashwood_road", "locked": false}}, "start": false, "coord": [1, -4], "auto_placed": false, "admin_comment": ""}, "ashwood_road": {"id": "ashwood_road", "name": "Ashwood Road", "zone": "ashwood", "description": "The old stone road is cracked and pushed up by roots that didn't exist a decade ago. The trees on either side lean inward like an audience watching something terrible. Every few paces there's a dead bird on the ground — not fallen, but placed, wings spread. Something here is wrong in a way that goes beyond danger.", "flags": [], "items": [], "npcs": ["Corrupted Wolf", "Corrupted Wolf"], "exits": {"west": {"dest": "ashwood_gate", "locked": false}, "east": {"dest": "ashwood_ruins", "locked": false}, "south": {"dest": "ashwood_clearing", "locked": false}}, "start": false, "coord": [2, -4], "auto_placed": false, "admin_comment": ""}, "ashwood_ruins": {"id": "ashwood_ruins", "name": "Ruined Garrison", "zone": "ashwood", "description": "The stone walls of an old military post, collapsed inward over decades of neglect. Rotted timber beams stick up from the rubble like broken ribs. Something valuable was stored here once — you can see the remains of weapon racks along the surviving walls. The east door is still standing, sealed with a heavy crossbar.", "flags": [], "items": ["Faded Letter"], "npcs": ["Ghost of Private Marsh"], "exits": {"west": {"dest": "ashwood_road", "locked": false}, "east": {"dest": "ashwood_armory", "locked": true}}, "start": false, "coord": [3, -4], "auto_placed": false, "admin_comment": ""}, "ashwood_armory": {"id": "ashwood_armory", "name": "Garrison Armory", "zone": "ashwood", "description": "The armory has been sealed since the garrison fell. Dust coats everything in a uniform grey. Most of the weapons have rusted to nothing, but one rack holds something remarkable — a sword whose blade still gleams as if freshly forged, dark metal wrapped in what looks like scaled leather. Beside it, a suit of armor built for serious work. On the floor, a small wooden chest.", "flags": [], "items": ["Drakebone Sword", "Drakebone Plate", "Drakebone Bracers", "Shrine Descent Key", "Garrison Helm", "Garrison Hauberk", "Garrison Leggings"], "npcs": [], "exits": {"west": {"dest": "ashwood_ruins", "locked": false}}, "start": false, "coord": [4, -4], "auto_placed": false, "admin_comment": ""}, "ashwood_clearing": {"id": "ashwood_clearing", "name": "Haunted Clearing", "zone": "ashwood", "description": "A perfect circle of grass, unnaturally green in the grey-brown forest. In the center stands a stone altar with a brass plaque. The air here is still — no wind, no birdsong, no rustling. The silence isn't peaceful. It feels like waiting. To the north, the road continues. To the south, the land drops toward the old shrine.", "flags": [], "items": ["Stone Altar"], "npcs": ["The Arbiter"], "exits": {"north": {"dest": "ashwood_road", "locked": false}, "south": {"dest": "ashwood_shrine", "locked": false}}, "start": false, "coord": [2, -5], "auto_placed": false, "admin_comment": ""}, "ashwood_shrine": {"id": "ashwood_shrine", "name": "Ashwood Shrine", "zone": "ashwood", "description": "Ancient stonework, surprisingly intact, carved with interlocking serpent motifs. The shrine was built to contain something powerful — every surface is inscribed with binding prayers in an old dialect. Braziers that should be cold still burn with pale blue flame. A stone door to the south has a circular lock mechanism — six numbered rings that must be set correctly to open.", "flags": [], "items": [], "npcs": ["Shrine Keeper"], "exits": {"north": {"dest": "ashwood_clearing", "locked": false}, "south": {"dest": "shrine_descent", "locked": true}}, "start": false, "coord": [2, -6], "auto_placed": false, "admin_comment": ""}, "shrine_descent": {"id": "shrine_descent", "name": "The Descent", "zone": "ashwood", "description": "A long stairway carved into living rock descends into heat and orange light. The walls are scored with long parallel claw marks — something large walked up these stairs long ago. The air thickens with each step. A distant sound, somewhere between breathing and grinding stone, rises from below.", "flags": [], "items": [], "npcs": [], "exits": {"north": {"dest": "ashwood_shrine", "locked": false}, "south": {"dest": "drakes_lair_antechamber", "locked": false}}, "start": false, "coord": [2, -7], "auto_placed": false, "admin_comment": ""}, "drakes_lair_antechamber": {"id": "drakes_lair_antechamber", "name": "Drake's Antechamber", "zone": "ashwood", "description": "A wide cavern, its floor covered in scorched earth and crushed bones. Heat radiates from cracks in the southern wall. Three massive wolves pace the chamber — not the grey wolves of the surface forest, but larger, darker, their fur matted with ash. Their eyes glow faintly orange, corrupted by proximity to the Drake. They have been here long enough that they no longer remember the forest.", "flags": [], "items": [], "npcs": ["Ashwood Wolf", "Ashwood Wolf", "Ashwood Wolf"], "exits": {"north": {"dest": "shrine_descent", "locked": false}, "south": {"dest": "drakes_lair", "locked": false}}, "start": false, "coord": [2, -8], "auto_placed": false, "admin_comment": ""}, "drakes_lair": {"id": "drakes_lair", "name": "The Drake's Lair", "zone": "ashwood", "description": "The heart of the corruption. A vast natural cavern, its ceiling lost in shadow, its floor a mosaic of fused stone and ancient bone. At the center, coiled around a column of rock as wide as a house, the Ashwood Drake watches you enter. It is enormous — fifteen feet of scaled muscle and ancient malice. Its eyes, the color of dying embers, track you with intelligent, unhurried attention. The Drake has been waiting for something like you. It is not afraid.", "flags": [], "items": [], "npcs": ["Ashwood Drake"], "exits": {"north": {"dest": "drakes_lair_antechamber", "locked": false}, "east": {"dest": "lair_treasury", "locked": false}}, "start": false, "coord": [2, -9], "auto_placed": false, "admin_comment": ""}, "lair_treasury": {"id": "lair_treasury", "name": "The Drake's Hoard", "zone": "ashwood", "description": "An alcove off the main lair, piled with the accumulated possessions of the Drake's victims over decades. Mostly rusted junk, crumbled leather, and corroded coins. But among the debris are a few items that survived: a leather pack reinforced with Drake scales, and scattered across the floor, more gold than you've seen in one place.", "flags": [], "items": ["Drake Scale Pack", "Pile of Gold Coins"], "npcs": [], "exits": {"west": {"dest": "drakes_lair", "locked": false}}, "start": false, "coord": [3, -9], "auto_placed": false, "admin_comment": ""}, "blackfen_gate": {"id": "blackfen_gate", "name": "Edge of the Murk Fens", "zone": "blackfen", "description": "The road from Millhaven ends here. Beyond the rotting wooden post that marks the boundary, the world turns grey and wet. Twisted willows trail their fingers in black water. The air smells of sulfur and rot and something older than either. A scrawny lizard-person sits on a wobbly stool outside a low hovel, rocking contentedly. A painted wooden plaque hangs from his neck.", "flags": ["town"], "items": [], "npcs": ["Grimwick", "Warden Holt"], "exits": {"northeast": {"dest": "forest_path", "locked": false}, "east": {"dest": "blackfen_trail", "locked": false}}, "start": false, "coord": [0, 0], "auto_placed": false, "admin_comment": ""}, "blackfen_trail": {"id": "blackfen_trail", "name": "Fen Trail", "zone": "blackfen", "description": "A narrow path of packed earth winds between the mire's grey-barked trees. The ground is spongy underfoot. Frog calls and bird-screams compete with the hiss of insects. A spray of old blood on a nearby trunk suggests something died here recently. Aonn Tesk's rough map shows the dead dragon lying to the west of this point — but the direct route would take you off the path entirely.", "flags": [], "items": [], "npcs": [], "exits": {"west": {"dest": "blackfen_gate", "locked": false}, "north": {"dest": "blackfen_thorn_path", "locked": false}, "east": {"dest": "blackfen_clearing", "locked": false}, "south": {"dest": "blackfen_boulderring", "locked": false}}, "start": false, "coord": [1, 0], "auto_placed": false, "admin_comment": ""}, "blackfen_thorn_path": {"id": "blackfen_thorn_path", "name": "Thorn-Vine Path", "zone": "blackfen", "description": "The path narrows until you are weaving between long hanging vines laced with black thorns the length of your finger. As you watch, one of the vines slowly retracts upward, carrying the limp body of a swamp rodent it had caught. You move quickly. The path ends at a hot freshwater spring bubbling from a crack in the rocks. You refill your waterskin — Aonn said such springs run clean. Nearby, a massive old stump sits off the trail. Something has carved a low door in its side, and the hollow within looks very dark.", "flags": [], "items": [], "npcs": [], "exits": {"south": {"dest": "blackfen_trail", "locked": false}, "east": {"dest": "blackfen_stump_exterior", "locked": false}}, "start": false, "coord": [1, 1], "auto_placed": false, "admin_comment": ""}, "blackfen_stump_exterior": {"id": "blackfen_stump_exterior", "name": "The Scorched Stump", "zone": "blackfen", "description": "The stump is the size of a small cottage — the remnant of some vast tree that burned long ago. Someone has cut a low door into its side, fitted with iron hinges gone dark with rust. The top of the stump is scorched, whether by the original fire or something more deliberate you cannot say. The door is locked with a simple mechanism.", "flags": [], "items": [], "npcs": [], "exits": {"west": {"dest": "blackfen_thorn_path", "locked": false}, "east": {"dest": "blackfen_stump_interior", "locked": false}}, "start": false, "coord": [2, 1], "auto_placed": false, "admin_comment": ""}, "blackfen_stump_interior": {"id": "blackfen_stump_interior", "name": "Stump Laboratory", "zone": "blackfen", "description": "The inside of the stump has been carved out and fitted as a tiny alchemist's workroom. Shelves line the curved walls, covered in dusty vials and crockery. A small table bears stains in cherry-red and deep purple that smell sweetly of something fermented. Notes in a cramped, unreadable hand are pinned to every surface. Whoever worked here has been gone for years — maybe decades. One shelf holds a single vial of purplish liquid, conspicuously labelled in clear block lettering.", "flags": [], "items": ["M. Batten's Blade Polish"], "npcs": [], "exits": {"west": {"dest": "blackfen_stump_exterior", "locked": false}}, "start": false, "coord": [3, 1], "auto_placed": false, "admin_comment": ""}, "blackfen_clearing": {"id": "blackfen_clearing", "name": "Fly-Ridden Clearing", "zone": "blackfen", "description": "A dry patch of high ground, which should be a relief after the wet trail. It isn't. A thick cloud of black flies has claimed this space, drawn by the smell of something that died here not long ago. You wave them off unsuccessfully. Two trails lead on from here: one continues east through flower-fringed reeds, the other winds downhill into darker country.", "flags": [], "items": [], "npcs": ["Redbelly Hunter"], "exits": {"west": {"dest": "blackfen_trail", "locked": false}, "east": {"dest": "blackfen_flower_path", "locked": false}, "south": {"dest": "blackfen_boulderring", "locked": false}, "down": {"dest": "blackfen_boulderring", "locked": false}}, "start": false, "coord": [2, 0], "auto_placed": false, "admin_comment": ""}, "blackfen_flower_path": {"id": "blackfen_flower_path", "name": "Reed-Flower Trail", "zone": "blackfen", "description": "This part of the mire is almost beautiful. Fist-sized red and purple flowers grow from thick reeds whose barbed edges remind you of arrowheads. They sway gently in air that, here at least, smells of something alive and growing. Grimwick would know exactly what to do with these plants.", "flags": [], "items": [], "npcs": [], "exits": {"west": {"dest": "blackfen_clearing", "locked": false}, "south": {"dest": "blackfen_wading", "locked": false}}, "start": false, "coord": [3, 0], "auto_placed": false, "admin_comment": ""}, "blackfen_boulderring": {"id": "blackfen_boulderring", "name": "The Boulder Ring", "zone": "blackfen", "description": "Tall black stones jut from the brackish water, forming a rough circle around a collapsed pile of the same glossy black rock. This was an altar — perhaps Redbelly, perhaps older. The water is knee-deep and smells of iron. You've heard the Redbellies leave valuables on such altars. You've also heard they leave traps.", "flags": [], "items": [], "npcs": [], "exits": {"north": {"dest": "blackfen_clearing", "locked": false}, "south": {"dest": "blackfen_wading", "locked": false}}, "start": false, "coord": [2, -1], "auto_placed": false, "admin_comment": ""}, "blackfen_wading": {"id": "blackfen_wading", "name": "Wading Stretch", "zone": "blackfen", "description": "The path drops into knee-deep, brackish water. Each step requires dragging your boot free of thick grey silt. Occasionally something wriggles against your leg below the surface and you choose not to investigate. The water smells of old blood and wet rot. Somewhere ahead the tall stones of the Blacklake shoreline are visible through the grey trees.", "flags": [], "items": [], "npcs": [], "exits": {"north": {"dest": "blackfen_boulderring", "locked": false}, "west": {"dest": "blackfen_north_shore", "locked": false}, "south": {"dest": "blackfen_blacklake_shore", "locked": false}, "east": {"dest": "blackfen_stump", "locked": false}}, "start": false, "coord": [2, -2], "auto_placed": false, "admin_comment": ""}, "blackfen_stump": {"id": "blackfen_stump", "name": "Ghost Willow Grove", "zone": "blackfen", "description": "A ghost-white willow tree stands apart from the mire's other vegetation, its bark carved with rough sigils — old marks, not recent. The pale branches hang very still even when there is wind. Other trees give it space. The dead dragon's location should be south and west of here.", "flags": [], "items": [], "npcs": [], "exits": {"west": {"dest": "blackfen_wading", "locked": false}}, "start": false, "coord": [3, -2], "auto_placed": false, "admin_comment": ""}, "blackfen_north_shore": {"id": "blackfen_north_shore", "name": "North Shore of Blacklake", "zone": "blackfen", "description": "The Blacklake lives up to its name — the water is the colour of deep night, completely opaque. Dead jellyfish-like things litter the grey sand shore. Occasionally a fish breaks the surface. Occasionally something much larger than a fish does the same. The lake curves south. A bone-littered trail runs along the western shore.", "flags": [], "items": [], "npcs": [], "exits": {"east": {"dest": "blackfen_wading", "locked": false}, "south": {"dest": "blackfen_witchs_cottage", "locked": false}, "southeast": {"dest": "blackfen_blacklake_shore", "locked": false}}, "start": false, "coord": [1, -3], "auto_placed": false, "admin_comment": ""}, "blackfen_blacklake_shore": {"id": "blackfen_blacklake_shore", "name": "Blacklake Shore — Insect Crossing", "zone": "blackfen", "description": "A long stretch of acid-puddled bog runs along the lake's eastern shore. The entire place hums with mosquitoes and biting things. There is no way to cross this ground without exposing your skin to the swarm. The bone trail and the witch's cottage lie south and west. The dragon clearing lies further south along the lake.", "flags": [], "items": [], "npcs": [], "exits": {"northwest": {"dest": "blackfen_north_shore", "locked": false}, "west": {"dest": "blackfen_witchs_cottage", "locked": false}, "south": {"dest": "blackfen_bone_trail", "locked": false}}, "start": false, "coord": [2, -3], "auto_placed": false, "admin_comment": ""}, "blackfen_witchs_cottage": {"id": "blackfen_witchs_cottage", "name": "Thornbury's Cottage", "zone": "blackfen", "description": "A hovel of logs and twisted branches with a ramshackle dock jutting into the lake. Inside, it is warm — impossibly warm for a building with no visible fire. A heavy iron kettle sits in the middle of the room radiating heat from no apparent source. A cot, a table, three chairs. Neat, lived-in, strange. This is the home of Maren Thornbury, a woman with a great deal of power and no patience whatsoever for nonsense.", "flags": ["no_combat"], "items": ["Fen Antitoxin"], "npcs": ["Maren Thornbury"], "exits": {"north": {"dest": "blackfen_north_shore", "locked": false}, "east": {"dest": "blackfen_blacklake_shore", "locked": false}, "south": {"dest": "blackfen_bone_trail", "locked": false}}, "start": false, "coord": [1, -4], "auto_placed": false, "admin_comment": ""}, "blackfen_bone_trail": {"id": "blackfen_bone_trail", "name": "Path of Bones", "zone": "blackfen", "description": "The trail is littered with bones — vermin, Redbellies, things you cannot identify. Something has been doing a lot of killing in this corridor for a long time. Aonn Tesk's map marks this trail with hurried elvish script: this is the path to where the dead serpent fell. A rope bridge to the east leads to Fanghelm's camp. It is padlocked.", "flags": [], "items": [], "npcs": [], "exits": {"north": {"dest": "blackfen_witchs_cottage", "locked": false}, "south": {"dest": "blackfen_dragon_clearing", "locked": false}, "east": {"dest": "blackfen_slaughter_camp", "locked": true}}, "start": false, "coord": [1, -5], "auto_placed": false, "admin_comment": ""}, "blackfen_slaughter_camp": {"id": "blackfen_slaughter_camp", "name": "Slaughterstone Camp", "zone": "blackfen", "description": "A rough camp on a dry rise above the lake shore. Fire rings, animal carcasses, crude shelters of hide stretched over poles. The Redbelly crew has been here long enough to get comfortable. Their leader's presence is evident in the order of it — this is not a rabble's camp but a warlord's forward base. Fanghelm himself stands near the largest fire, wearing leather fashioned from serpent hide, a fanged helmet tucked under one arm. His face is a ruin of old acid scarring. He looks at you with something like delight.", "flags": [], "items": [], "npcs": ["Durath Ironteeth", "Redbelly Brute", "Redbelly Brute"], "exits": {"west": {"dest": "blackfen_bone_trail", "locked": false}, "east": {"dest": "blackfen_dragon_clearing", "locked": false}}, "start": false, "coord": [2, -5], "auto_placed": false, "admin_comment": ""}, "blackfen_dragon_clearing": {"id": "blackfen_dragon_clearing", "name": "The Dragon's Clearing", "zone": "blackfen", "description": "A massive clearing, the ground burned and scattered with ash. Acidic puddles have eaten brown rings into the earth. The air smells like the inside of a forge that uses something foul for fuel. You look up. The dead serpent dragon hangs in the canopy a dozen yards overhead, its long body tangled in the high branches. Its eyes are white and dead. Its jaws are open. A drip of acidic blood falls and hisses in a puddle at your feet.", "flags": [], "items": [], "npcs": [], "exits": {"north": {"dest": "blackfen_bone_trail", "locked": false}, "east": {"dest": "blackfen_serpent_temple", "locked": false}, "south": {"dest": "blackfen_dragon_belly", "locked": false}, "west": {"dest": "blackfen_slaughter_camp", "locked": false}}, "start": false, "coord": [1, -6], "auto_placed": false, "admin_comment": ""}, "blackfen_serpent_temple": {"id": "blackfen_serpent_temple", "name": "Sunken Serpent Temple", "zone": "blackfen", "description": "Stone pillars rise from the water, forming a rough circle around a polished black altar. The rubble of a collapsed roof lies scattered around the site. Dry vines trail across the altar's surface. The glyphs carved into the stone are old — older than the Redbellies, older than the mire. Something about this place makes the air tight, as though the atmosphere itself is holding its breath.", "flags": [], "items": ["Sacrificial Knife"], "npcs": ["Anurus the Returned"], "exits": {"west": {"dest": "blackfen_dragon_clearing", "locked": false}}, "start": false, "coord": [2, -6], "auto_placed": false, "admin_comment": ""}, "blackfen_dragon_belly": {"id": "blackfen_dragon_belly", "name": "Beneath the Dragon", "zone": "blackfen", "description": "The great carcass has been brought down — the canopy branches still sway from its fall. The creature lies on the clearing floor, its belly facing you. Acid seeps slowly from old wounds in its hide. The stench is tremendous. Your grandfather is in there. So is what he was carrying. The jaws are open at your feet. The belly is before you. You take out your sharpest weapon.", "flags": [], "items": [], "npcs": [], "exits": {"north": {"dest": "blackfen_dragon_clearing", "locked": false}}, "start": false, "coord": [1, -7], "auto_placed": false, "admin_comment": ""}, "greenhollow_path": {"id": "greenhollow_path", "name": "The Downward Path", "zone": "greenhollow", "description": "A clay road drops away from the ridge into the valley below. Greenhollow sits in the bowl beneath you — three dozen buildings around a mill wheel you can hear from here. The air smells of cut grain and creek water. A hand-lettered sign at the road's edge reads GREENHOLLOW — KEEP THE PACE. Children are small bright shapes at the bottom of the hill.", "flags": [], "items": [], "npcs": [], "exits": {"south": {"dest": "greenhollow_lane", "locked": false}}, "start": false, "coord": [0, 1], "auto_placed": false, "admin_comment": "Zone entry from north. Connects to Millhaven via the ridge road eventually."}, "greenhollow_lane": {"id": "greenhollow_lane", "name": "Main Lane", "zone": "greenhollow", "description": "The main lane runs through the heart of Greenhollow between two rows of close-packed houses. Washing lines cross overhead. A dog is asleep in the middle of the road. Children dart between the buildings calling names. The mill is audible to the west, a smithy's ring to the south-east, and the lane continues north toward the valley entrance and south toward the fields.", "flags": ["town", "no_combat"], "items": ["Village Sign"], "npcs": ["Stray Dog", "Farm Hand", "Elder Torva"], "exits": {"north": {"dest": "greenhollow_path", "locked": false}, "south": {"dest": "greenhollow_fields_edge", "locked": false}, "east": {"dest": "greenhollow_pond", "locked": false}, "west": {"dest": "greenhollow_mill", "locked": false}, "southeast": {"dest": "greenhollow_smithy", "locked": false}}, "start": false, "coord": [0, 0], "auto_placed": false, "admin_comment": "Hub room. All main quest NPCs pass through or originate here."}, "greenhollow_mill": {"id": "greenhollow_mill", "name": "The Water Mill", "zone": "greenhollow", "description": "The mill sits at the stream's edge, wheel turning with a steady wooden rhythm. Flour dust coats every surface in a thin white film. Sacks line the walls, some full and some waiting. The millstone makes the floor vibrate gently. It smells of grain and damp wood and old machinery.", "flags": ["no_combat"], "items": ["Flour Sack", "Mill Cat"], "npcs": ["Owain the Miller"], "exits": {"east": {"dest": "greenhollow_lane", "locked": false}}, "start": false, "coord": [-1, 0], "auto_placed": false, "admin_comment": "Miller Owain is here. He knows about the mine situation and can point to Elder Torva."}, "greenhollow_fields_edge": {"id": "greenhollow_fields_edge", "name": "Field's Edge", "zone": "greenhollow", "description": "The lane ends and the fields begin here — long rows of wheat stretching south toward the valley wall. The crop looks good except for a string of collapsed sections nearest the hedgerow where something has been burrowing up from below. Deep half-moon holes in the earth, dirt thrown wide, root systems pulled out. The damage has been getting worse each week.", "flags": [], "items": ["Field Burrow", "Trampled Wheat"], "npcs": ["Giant Groundhog", "Giant Groundhog"], "exits": {"north": {"dest": "greenhollow_lane", "locked": false}, "south": {"dest": "greenhollow_practice_yard", "locked": false}, "east": {"dest": "greenhollow_pond", "locked": false}, "west": {"dest": "greenhollow_mine_entrance", "locked": false}}, "start": false, "coord": [0, -1], "auto_placed": false, "admin_comment": "Two groundhog scouts here. Mine entrance is to the west. Ruffian practice yard to south."}, "greenhollow_pond": {"id": "greenhollow_pond", "name": "The Mill Pond", "zone": "greenhollow", "description": "A broad dark pond fed by the hill stream. Willows drape their branches into the water along the near bank. Ducks move in a slow circuit near the rushes. The water is clear enough to see bottom in the shallows — stones and waterweed and the occasional flash of a fish. Someone has tied a rope to the willow overhanging the swimming hole.", "flags": [], "items": ["Willow Branch", "Reed Bed"], "npcs": ["Pond Snapping Turtle", "Moorhen"], "exits": {"west": {"dest": "greenhollow_lane", "locked": false}, "north": {"dest": "greenhollow_forest_edge", "locked": false}}, "start": false, "coord": [1, 0], "auto_placed": false, "admin_comment": "Peaceful encounter area. Pond turtle is a mild combat. Forest edge to north."}, "greenhollow_smithy": {"id": "greenhollow_smithy", "name": "Brynn's Smithy", "zone": "greenhollow", "description": "A wide open-fronted building with a forge at the back wall. The fire is banked but warm — Brynn works methodical hours and doesn't waste fuel. Finished ironwork hangs from the ceiling: brackets, hinges, tools, a few weapons. The floor is packed earth and the ceiling is black with old smoke. It smells of iron and charcoal and sweat.", "flags": ["no_combat"], "items": ["Iron Pickaxe", "Forge Tongs"], "npcs": ["Brynn Farrier"], "exits": {"northwest": {"dest": "greenhollow_lane", "locked": false}}, "start": false, "coord": [1, -1], "auto_placed": false, "admin_comment": "Brynn teaches Flowing Water (level 5+). She also sells picks and can explain mining."}, "greenhollow_practice_yard": {"id": "greenhollow_practice_yard", "name": "The Practice Yard", "zone": "greenhollow", "description": "A flat patch of bare earth behind the southernmost houses, walled in on two sides by old stone. A straw-stuffed dummy has been hung from the post in the corner — it's been hit so many times it's mostly stuffing and spite. Three teenage boys are here, circling it with the intent focus of people who have nowhere better to be.", "flags": [], "items": ["Practice Dummy"], "npcs": ["Finn", "Dale", "Scratch"], "exits": {"north": {"dest": "greenhollow_fields_edge", "locked": false}}, "start": false, "coord": [0, -2], "auto_placed": false, "admin_comment": "Ruffian encounter room. Both paths available: spar (non-lethal) or dialogue/quest."}, "greenhollow_forest_edge": {"id": "greenhollow_forest_edge", "name": "Oak Edge", "zone": "greenhollow", "description": "The cultivated land gives out here and old oak begins. The transition is clean — field to treeline in twenty feet, as if the two zones have agreed to leave each other alone. The forest is darker than it looks from the village, and older. The trees are not the tidy managed oak of a coppice — they're ancient, wide-spaced, and indifferent.", "flags": [], "items": ["Fallen Oak Log", "Fallen Acorns"], "npcs": ["Red Fox", "Wood Pigeon"], "exits": {"south": {"dest": "greenhollow_pond", "locked": false}, "north": {"dest": "greenhollow_forest_shrine", "locked": false}}, "start": false, "coord": [1, 1], "auto_placed": false, "admin_comment": "Transition to forest. Light wildlife encounters. Shrine is north deeper in forest."}, "greenhollow_forest_shrine": {"id": "greenhollow_forest_shrine", "name": "The Hollow Shrine", "zone": "greenhollow", "description": "Deep enough in the forest that the village sounds have faded completely. An ancient oak has grown around a stone marker until the two are inseparable — the stone is visible only as a grey rectangle within the trunk's embrace. Someone still tends this place: there are fresh flowers on the roots, a small oil lamp burning, a woven grass ring hung from the lowest branch.", "flags": ["safe_combat"], "items": ["Oil Lamp", "Wildflower Offering", "Oilcloth Bundle"], "npcs": [], "exits": {"south": {"dest": "greenhollow_forest_edge", "locked": false}}, "start": false, "coord": [1, 2], "auto_placed": false, "admin_comment": "Quiet/safe area. Wrapped bundle is a discoverable item with minor lore."}, "greenhollow_mine_entrance": {"id": "greenhollow_mine_entrance", "name": "Mine Entrance", "zone": "greenhollow", "description": "A timber-framed portal cut into the valley's west wall. The frame is solid — this isn't a recent dig. Cart tracks lead in from the fields. A rack of tools stands outside: picks, shovels, a hand cart. Mine tallow lanterns hang from the frame. Inside, the shaft drops at a gentle angle into darkness. Something has been digging parallel tunnels alongside the main shaft — you can see the fresh earthworks.", "flags": [], "items": ["Mine Lantern", "Tool Rack"], "npcs": ["Osric Bryne"], "exits": {"east": {"dest": "greenhollow_fields_edge", "locked": false}, "down": {"dest": "greenhollow_mine_level1", "locked": false}}, "start": false, "coord": [-1, -1], "auto_placed": false, "admin_comment": "Mine foreman Osric is here (non-hostile, worried). Gives Osric's Pick quest."}, "greenhollow_mine_level1": {"id": "greenhollow_mine_level1", "name": "Mine Level One", "zone": "greenhollow", "description": "The first level of the mine opens into a worked cavern. Greenstone walls sheened with ground water. Timber shoring along the central corridor. The cart tracks split here — one branch going deeper, one looping back to the surface. In the side passages, ore veins are visible: grey stone threaded with reddish iron lines. There are burrows in the floor. Fresh ones.", "flags": [], "items": ["Iron Ore Vein", "Coal Seam"], "npcs": ["Mine Groundhog", "Mine Groundhog", "Mine Groundhog"], "exits": {"up": {"dest": "greenhollow_mine_entrance", "locked": false}, "down": {"dest": "greenhollow_mine_level2", "locked": false}}, "start": false, "coord": [-1, -2], "auto_placed": false, "admin_comment": "Three groundhog workers. Iron and coal ore nodes with on_get scripts and skill checks."}, "greenhollow_mine_level2": {"id": "greenhollow_mine_level2", "name": "The Deep Chamber", "zone": "greenhollow", "description": "The bottom of the mine opens into a natural chamber — the tunnellers hit a void in the greenstone and widened it. The walls here are different: darker, denser, showing a narrow vein of something darker than iron ore. But the chamber belongs to something else now. Burrows honeycomb the floor and walls. A pile of chewed timbers suggests the thing that lives here has been busy. A low, throbbing sound comes from the deepest burrow.", "flags": [], "items": ["Rich Ore Vein", "Groundhog Den", "Osric's Pickaxe"], "npcs": ["Groundhog King"], "exits": {"up": {"dest": "greenhollow_mine_level1", "locked": false}}, "start": false, "coord": [-1, -3], "auto_placed": false, "admin_comment": "Boss room. Groundhog King spawns here. osric_pickaxe is the lost item quest target."}, "millbrook_road": {"id": "millbrook_road", "name": "Millbrook Road", "zone": "millbrook", "description": "The road climbs gently from the west, following the line of an old hedgerow thick with blackthorn and dog rose. Ahead, the first slate rooftops of Millbrook catch the light. Someone has set a wooden post at the crossroads with a carved fish and a carved sheaf of wheat — the village's twin industries, both going strong. The air smells of turned earth and, faintly, of hops.", "flags": ["town"], "items": [], "npcs": [], "exits": {"east": {"dest": "millbrook_green", "locked": false}, "north": {"dest": "millbrook_hilltop", "locked": false}}, "start": false, "coord": [-1, 0], "auto_placed": false, "admin_comment": ""}, "millbrook_green": {"id": "millbrook_green", "name": "The Village Green", "zone": "millbrook", "description": "Millbrook gathers itself around a broad oval of grass worn smooth in the middle where children play and the weekly market sets up its trestles. An old oak dominates the south end, its lower branches scarred where generations of kids have shinned up it. A woman hangs washing on a line strung between two fence posts, glancing up as you arrive with the easy calm of someone who doesn't worry about strangers.", "flags": ["town", "no_combat"], "items": ["Village Notice Board", "Fallen Acorn"], "npcs": ["Marta", "Bram"], "exits": {"west": {"dest": "millbrook_road", "locked": false}, "east": {"dest": "millbrook_mill", "locked": false}, "north": {"dest": "millbrook_well", "locked": false}, "south": {"dest": "millbrook_farm", "locked": false}, "northeast": {"dest": "millbrook_brewhouse", "locked": false}}, "start": false, "coord": [0, 0], "auto_placed": false, "admin_comment": "Hub room. Marta gives the lost item quest. Bram is the ruffian gang leader."}, "millbrook_hilltop": {"id": "millbrook_hilltop", "name": "Hilltop Meadow", "zone": "millbrook", "description": "The road gives way to open meadow at the top of the rise, and suddenly you can see for miles. The Millwater river is a silver thread below. Millhaven is a smudge on the western horizon. The meadow itself is a riot of wildflowers — ox-eye daisy, clover, yellow rattle — and the grass is long enough to hiss when the wind moves through it. A red kite rides a thermal somewhere above, barely moving.", "flags": [], "items": ["Wildflower Bunch", "Flint Shard"], "npcs": ["Meadow Hare", "Meadow Hare"], "exits": {"south": {"dest": "millbrook_road", "locked": false}}, "start": false, "coord": [-1, 1], "auto_placed": false, "admin_comment": "Peaceful encounter with rabbits. Wildflowers for alchemy/crafting."}, "millbrook_mill": {"id": "millbrook_mill", "name": "Millbrook Mill", "zone": "millbrook", "description": "The mill sits at the edge of the village where the millrace was cut to feed water from the Millwater's upper reach. The wheel turns with a sound like slow breathing, and the whole building vibrates very slightly with each rotation. Sacks of grain are stacked under a lean-to. The miller is somewhere inside; you can hear the grinding and, occasionally, cursing when something binds.", "flags": ["no_combat", "town"], "items": ["Sack of Grain", "Mill Wheel Spoke"], "npcs": ["Aldric"], "exits": {"west": {"dest": "millbrook_green", "locked": false}, "south": {"dest": "millbrook_river", "locked": false}}, "start": false, "coord": [1, 0], "auto_placed": false, "admin_comment": "Aldric is the miller. Has the lost amulet quest. Gives pickaxe commissions."}, "millbrook_river": {"id": "millbrook_river", "name": "River Bend", "zone": "millbrook", "description": "The Millwater bends sharply here around a gravel bar, and the current slows enough that the water is almost clear. Willows trail their fingers in the shallows on the far bank. A wooden dock extends six feet into the river, old enough that the boards are grey and soft-looking but still solid underfoot. Two ducks are aggressively competing for what appears to be nothing of value.", "flags": [], "items": ["River Stone", "Water Reed"], "npcs": ["River Otter", "River Otter"], "exits": {"north": {"dest": "millbrook_mill", "locked": false}, "west": {"dest": "millbrook_green", "locked": false}}, "start": false, "coord": [1, -1], "auto_placed": false, "admin_comment": "Peaceful area. Otters are non-hostile, low XP."}, "millbrook_well": {"id": "millbrook_well", "name": "The Well and Square", "zone": "millbrook", "description": "A stone-lined well stands at the junction of the village's two main lanes, with an iron-bound bucket on a rope so worn the fibres are separating. Around the well is a small square of flat stone, always wet, where people pause to talk, let the children drink, and conduct the quiet business of village life. An old man sits on the wall with no apparent intention of moving.", "flags": ["no_combat", "town"], "items": [], "npcs": ["Elder Tomlin"], "exits": {"south": {"dest": "millbrook_green", "locked": false}, "east": {"dest": "millbrook_brewhouse", "locked": false}, "west": {"dest": "millbrook_farm", "locked": false}}, "start": false, "coord": [0, 1], "auto_placed": false, "admin_comment": "Elder Tomlin is the Flowing Water trainer. Prestige gate: needs prestige >= 10."}, "millbrook_farm": {"id": "millbrook_farm", "name": "Aldric's Farm", "zone": "millbrook", "description": "A working farm with none of the decorative nonsense of a rich man's estate. The house is solid stone with a thatched roof that needs attention on the east end. The yard is swept, the tools are hung. Someone takes care of this place out of habit and pride, not for appearances. A kitchen garden runs along the south wall, dense with cabbages, beans, and medicinal herbs. The smell of bread has come from this direction since you entered the village.", "flags": ["no_combat", "town"], "items": ["Iron Hoe", "Cabbage Head"], "npcs": ["Rilla Aldric", "Goat", "Goat"], "exits": {"north": {"dest": "millbrook_green", "locked": false}, "east": {"dest": "millbrook_barn", "locked": false}, "south": {"dest": "millbrook_east_field", "locked": false}}, "start": false, "coord": [0, -1], "auto_placed": false, "admin_comment": "Rilla Aldric runs the farm. Quest giver for lost amulet (connecting to miller)."}, "millbrook_barn": {"id": "millbrook_barn", "name": "Barn and Paddock", "zone": "millbrook", "description": "The barn is big enough to tell you Millbrook was prosperous once and aims to be again. The ground floor holds hay, tools, and two old horses who have the philosophical calm of animals that have decided nothing is worth panicking about. The upper loft is accessible by a ladder and holds last season's grain, some rope, and a sleeping cat who opens one eye when you come in and immediately closes it.", "flags": ["no_combat", "town"], "items": ["Coil of Old Rope", "Bundle of Dried Hay"], "npcs": ["Dal", "Fen"], "exits": {"west": {"dest": "millbrook_farm", "locked": false}}, "start": false, "coord": [1, -2], "auto_placed": false, "admin_comment": "Two of the three ruffians hang out here. Bram is their leader (green)."}, "millbrook_east_field": {"id": "millbrook_east_field", "name": "East Field", "zone": "millbrook", "description": "The field is newly turned and the soil is the dark, almost black earth of a place that has been loved well. The furrows run straight toward a low stone wall at the far end, beyond which a copse of mixed woodland begins — oak, ash, and some older trees you can't name from here. A crow works the furrows methodically ahead of you, pausing every few steps to extract something edible from the fresh soil.", "flags": [], "items": ["Crow Feather", "Smooth Fieldstone"], "npcs": ["Crow", "Crow", "Burrowing Vole"], "exits": {"north": {"dest": "millbrook_farm", "locked": false}, "east": {"dest": "millbrook_thornwood", "locked": false}}, "start": false, "coord": [0, -2], "auto_placed": false, "admin_comment": "Transition to Thornwood. Small pests here (vole, crows — aggressive)."}, "millbrook_thornwood": {"id": "millbrook_thornwood", "name": "Thornwood Copse", "zone": "millbrook", "description": "The wood is old and dense, the ground between the trees carpeted with wood anemone and the papery skeletons of last year's leaves. The light that gets through is green and shifting. Somewhere in the roots and rocks of this place, something has been eating through the village's grain stores and riddling the field margins with holes. Fresh diggings are visible at the base of several oaks, and the bark of the younger trees has been gnawed.", "flags": [], "items": ["Gnawed Root", "Fresh Digging", "Thornwood Log Pile"], "npcs": ["Thorngrub Worker", "Thorngrub Worker", "Thorngrub Worker"], "exits": {"west": {"dest": "millbrook_east_field", "locked": false}, "south": {"dest": "millbrook_mine_entrance", "locked": false}}, "start": false, "coord": [1, -3], "auto_placed": false, "admin_comment": "Entry to the pest zone. Thorngrubs here are moderate difficulty."}, "millbrook_mine_entrance": {"id": "millbrook_mine_entrance", "name": "Old Mine Entrance", "zone": "millbrook", "description": "The mine is older than anyone in Millbrook and its original purpose is a matter of debate between those who say iron and those who say coal and those who say it was always abandoned. The entrance is a rough-cut arch in a limestone outcrop, braced with timbers grey with age but still holding. A lantern hook above the entrance has no lantern. The smell coming from inside is damp stone, old rot, and something animal — sharp and faintly sweet.", "flags": [], "items": ["Faded Warning Sign", "Iron Lantern"], "npcs": ["Thorngrub Guard", "Thorngrub Guard"], "exits": {"north": {"dest": "millbrook_thornwood", "locked": false}, "enter": {"dest": "millbrook_mine_passage", "locked": false}}, "start": false, "coord": [1, -4], "auto_placed": false, "admin_comment": "Exit 'enter' into mine. Lantern is findable here. Iron ore veins open after queen killed."}, "millbrook_mine_passage": {"id": "millbrook_mine_passage", "name": "Mine Passage", "zone": "millbrook", "description": "The passage is low enough that you have to watch your head on the ceiling beams. The walls are raw limestone, slick with moisture, and you can see the marks of old tools in the stone — the patient work of whoever carved this out. Small trickles of water run down the walls and join a shallow channel cut along the floor. Old rail tracks are set into the floor, long since rusted immobile. Iron ore seams glitter faintly in the walls where the lantern-light catches them.", "flags": [], "items": ["Iron Ore Vein", "Copper Ore Trace"], "npcs": ["Thorngrub Soldier", "Thorngrub Soldier"], "exits": {"leave": {"dest": "millbrook_mine_entrance", "locked": false}, "south": {"dest": "millbrook_thorngrub_nest", "locked": false}}, "start": false, "coord": [1, -5], "auto_placed": false, "admin_comment": "Iron vein only mineable (respawning on_get node). copper_trace needs mining 40+."}, "millbrook_thorngrub_nest": {"id": "millbrook_thorngrub_nest", "name": "The Thorngrub Nest", "zone": "millbrook", "description": "The passage widens suddenly into a rough oval chamber. The floor is covered in a dense mat of compressed organic matter — chewed root, bark, and something less identifiable. The smell here is intense: sweet decay and the particular musk of a large insect colony. At the far end, something large moves. Much larger than the workers you've seen. She sits at the centre of a ring of eggs and regards you with a stillness that isn't calm — it's decision.", "flags": [], "items": ["Thorngrub Queen's Carapace", "Miller's Amulet"], "npcs": ["Thorngrub Queen"], "exits": {"north": {"dest": "millbrook_mine_passage", "locked": false}}, "start": false, "coord": [1, -6], "auto_placed": false, "admin_comment": "Boss room. Queen is tough. Amulet only appears after queen dead (on_get trigger via kill_script)."}, "millbrook_brewhouse": {"id": "millbrook_brewhouse", "name": "The Cloverleaf Brewhouse", "zone": "millbrook", "description": "Half tavern, half brewery, entirely the kind of place a village builds when it decides it deserves good things. The brewhouse smells of hops and yeast and warm wood. Copper fermenting vessels catch the light through windows that clearly haven't been cleaned since they were put in. Behind the bar, a man with forearms built for heaving barrels is filling a glass with something amber and regarding it with professional pride.", "flags": ["town", "no_combat", "inn"], "items": [], "npcs": ["Tobias"], "exits": {"southwest": {"dest": "millbrook_green", "locked": false}, "west": {"dest": "millbrook_well", "locked": false}}, "start": false, "coord": [1, 1], "auto_placed": false, "admin_comment": "Inn and merchant. Tobias sells gear and offers rest. Also has the ruffian spar here sometimes."}, "south_gate": {"id": "south_gate", "name": "South Gate", "zone": "millhaven", "description": "A pair of iron-banded wooden gates stand open. Beyond them the road winds toward the dark forest. A nervous-looking guard watches the tree line.", "flags": [], "items": [], "npcs": [], "exits": {"north": {"dest": "town_square", "locked": false}, "south": {"dest": "forest_path", "locked": false}}, "start": false, "coord": [0, -1], "auto_placed": false, "admin_comment": ""}, "forest_path": {"id": "forest_path", "name": "Forest Path", "zone": "millhaven", "description": "Tall oaks press in on both sides of a muddy trail. Something rustles in the undergrowth. The town gate is visible to the north.", "flags": [], "items": [], "npcs": ["Grey Wolf"], "exits": {"north": {"dest": "south_gate", "locked": false}, "south": {"dest": "deep_forest", "locked": false}, "southwest": {"dest": "blackfen_gate", "locked": false}}, "start": false, "coord": [0, -2], "auto_placed": false, "admin_comment": ""}, "deep_forest": {"id": "deep_forest", "name": "Deep Forest", "zone": "millhaven", "description": "Sunlight barely filters through the dense canopy. Strange sounds echo from the darkness between the trees. An old stone road leads east toward two carved pillars — the Ashwood Gate. To the south, the trees thin and the ground grows darker and wetter. A weathered stone arch marks the boundary of Blackfen Mire.", "flags": [], "items": ["Iron Sword", "Wolf-Fang Dagger"], "npcs": ["Goblin Scout", "Grey Wolf"], "exits": {"north": {"dest": "forest_path", "locked": false}, "east": {"dest": "ashwood_gate", "locked": false}, "south": {"dest": "blackfen_gate", "locked": false}}, "start": false, "coord": [0, -3], "auto_placed": false, "admin_comment": ""}, "town_square": {"id": "town_square", "name": "Town Square", "zone": "millhaven", "description": "The heart of Millhaven. Cobblestones worn smooth by centuries of foot traffic surround a mossy fountain. A weathered signpost points in every direction. Stone steps lead up to the barracks door.", "flags": ["no_combat", "town"], "items": ["Signpost"], "npcs": ["Town Guard", "Town Treasurer"], "exits": {"north": {"dest": "blacksmith", "locked": false}, "south": {"dest": "south_gate", "locked": false}, "east": {"dest": "market", "locked": false}, "west": {"dest": "inn", "locked": false}, "up": {"dest": "barracks", "locked": false}}, "start": true, "coord": [0, 0], "auto_placed": false, "admin_comment": "Main hub. Check bind_room on first entry. Mood: safe + busy."}, "blacksmith": {"id": "blacksmith", "name": "The Blacksmith's Forge", "zone": "millhaven", "description": "Heat blasts from an enormous furnace. The smell of hot iron fills the air. Weapons and tools hang from every wall.", "flags": [], "items": ["Rusty Sword", "Leather Cap"], "npcs": ["Dorin the Blacksmith"], "exits": {"south": {"dest": "town_square", "locked": false}}, "start": false, "coord": [0, 1], "auto_placed": false, "admin_comment": ""}, "market": {"id": "market", "name": "Market Street", "zone": "millhaven", "description": "Colorful awnings shade rows of market stalls. Merchants call out prices and the smell of tanned leather mixes with spice and fresh bread. A leatherworker's stall takes up the eastern corner.", "flags": [], "items": ["Health Potion", "Leather Satchel", "Leather Strip", "Tanned Hide"], "npcs": ["Merchant", "Sera the Leatherworker"], "exits": {"west": {"dest": "town_square", "locked": false}, "east": {"dest": "council_hall", "locked": false}}, "start": false, "coord": [1, 0], "auto_placed": false, "admin_comment": ""}, "inn": {"id": "inn", "name": "The Rusty Flagon Inn", "zone": "millhaven", "description": "A warm common room filled with the sound of laughter and clinking tankards. A fire crackles in a large hearth.", "flags": [], "items": [], "npcs": ["Bron the Innkeeper", "Aonn Tesk"], "exits": {"east": {"dest": "town_square", "locked": false}}, "start": false, "coord": [-1, 0], "auto_placed": false, "admin_comment": ""}, "council_hall": {"id": "council_hall", "name": "Council Hall", "zone": "millhaven", "description": "A stone-floored hall with high ceilings and a long oak table. Maps and ledgers cover every surface. A woman in grey robes sits at the head of the table, reviewing documents with fierce concentration. This is clearly someone who governs by doing the work herself.", "flags": ["no_combat"], "items": [], "npcs": ["Elder Mira"], "exits": {"west": {"dest": "market", "locked": false}}, "start": false, "coord": [2, 0], "auto_placed": false, "admin_comment": ""}, "barracks": {"id": "barracks", "name": "Millhaven Barracks", "zone": "training", "description": "A long timber building beside the town wall. Rows of bunks line the walls. Recruits clean weapons and argue about technique. A door at the back leads to the training yard. A heavy iron door to the east is the storeroom.", "flags": ["no_combat", "town"], "items": ["Spiked Knuckles"], "npcs": ["Drill Sergeant Vorn", "Quartermaster"], "exits": {"south": {"dest": "town_square", "locked": false}, "north": {"dest": "training_yard", "locked": false}, "east": {"dest": "barracks_storeroom", "locked": true}}, "start": false, "coord": [1, 2], "auto_placed": false, "admin_comment": ""}, "training_yard": {"id": "training_yard", "name": "Training Yard", "zone": "training", "description": "A packed-earth yard ringed by wooden posts and straw dummies. This is where soldiers learn their craft. A chalk line on the ground marks the sparring circle. Whatever happens in the circle, it's only practice — you won't take real wounds here.", "flags": ["safe_combat"], "items": ["Rusty Sword", "Chain Shirt"], "npcs": ["Training Dummy", "Sparring Recruit"], "exits": {"south": {"dest": "barracks", "locked": false}}, "start": false, "coord": [1, 3], "auto_placed": false, "admin_comment": ""}, "barracks_storeroom": {"id": "barracks_storeroom", "name": "Barracks Storeroom", "zone": "training", "description": "Shelves of equipment line the walls — spare weapons, rations, a small chest. Dusty but well-organized. A locked iron door leads back to the barracks.", "flags": ["no_combat"], "items": ["Barracks Key", "Health Potion"], "npcs": [], "exits": {"west": {"dest": "barracks", "locked": false}}, "start": false, "coord": [2, 2], "auto_placed": false, "admin_comment": ""}};

function selectRoom(rid) {
  const r = ROOMS[rid];
  if (!r) return;

  document.querySelectorAll('.room-node').forEach(n => n.classList.remove('selected'));
  const node = document.querySelector('.room-node[data-id="' + rid + '"]');
  if (node) {
    node.classList.add('selected');
    node.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  const flags = (r.flags || []).map(f =>
    '<span class="tag ' + f + '">' + f + '</span>'
  ).join('') || '<span style="color:#444">none</span>';

  const exits = Object.entries(r.exits || {}).map(([dir, info]) => {
    const dest  = ROOMS[info.dest];
    const dname = dest ? dest.name : (info.dest || '?');
    const lock  = info.locked ? ' <span class="locked">[locked]</span>' : '';
    return '<div class="exit">&#8594; <b>' + dir + '</b>: ' + dname +
           ' <span style="color:#444">(' + info.dest + ')</span>' + lock + '</div>';
  }).join('') || '<span style="color:#444">none</span>';

  const items = (r.items || []).length
    ? r.items.map(i => '<div class="item">&#9632; ' + i + '</div>').join('')
    : '<span style="color:#444">none</span>';

  const npcs = (r.npcs || []).length
    ? r.npcs.map(n => '<div class="npc">&#9632; ' + n + '</div>').join('')
    : '<span style="color:#444">none</span>';

  const startBadge = r.start
    ? ' <span style="color:#fff;background:#333;padding:1px 5px;border-radius:3px;font-size:10px">START</span>'
    : '';
  const autoBadge = r.auto_placed
    ? '<span class="auto-badge">auto-placed</span>'
    : '';
  const coord   = r.coord ? '[' + r.coord[0] + ', ' + r.coord[1] + ']' : 'no coord';
  const comment = r.admin_comment
    ? '<div class="comment">&#9650; ' + r.admin_comment + '</div>'
    : '';

  document.getElementById('room-detail').innerHTML =
    '<h3>' + r.name + startBadge + autoBadge + '</h3>' +
    '<div class="room-id">' + r.id + ' &middot; ' + r.zone + ' &middot; ' + coord + '</div>' +
    comment +
    '<div class="section"><h4>Description</h4><div class="desc">' + (r.description || '<i>none</i>') + '</div></div>' +
    '<div class="section"><h4>Flags</h4>' + flags + '</div>' +
    '<div class="section"><h4>Exits (' + Object.keys(r.exits || {}).length + ')</h4>' + exits + '</div>' +
    '<div class="section"><h4>Items (' + (r.items || []).length + ')</h4>' + items + '</div>' +
    '<div class="section"><h4>NPC Spawns (' + (r.npcs || []).length + ')</h4>' + npcs + '</div>';
}

function filterRooms(q) {
  q = (q || '').toLowerCase().trim();
  document.querySelectorAll('.room-node').forEach(node => {
    const rid = node.getAttribute('data-id');
    const r   = ROOMS[rid];
    if (!r) return;
    const match = !q || rid.includes(q) || r.name.toLowerCase().includes(q) || r.zone.includes(q);
    node.style.opacity       = match ? '1' : '0.1';
    node.style.pointerEvents = match ? '' : 'none';
  });
}

function filterTo(zone) {
  const inp = document.getElementById('search');
  inp.value = zone;
  filterRooms(zone);
}
