<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Delve</title>
<style>
/* ── Reset ──────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: #141414;
  color: #c8c8c8;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
  font-size: 15px;
  line-height: 1.5;
}

/* ── Login panel ─────────────────────────────────────────────────────────────── */
#login-panel {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.banner {
  color: #ffdc64;
  font-weight: bold;
  font-size: 1.05em;
  line-height: 1.2;
  margin-bottom: 0.5rem;
  text-align: center;
  white-space: pre;
}

.subtitle {
  color: #8c7a30;
  margin-bottom: 2.5rem;
  text-align: center;
  font-size: 0.9em;
  letter-spacing: 0.1em;
}

.form {
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
  width: 320px;
}

.form label {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  color: #787878;
  font-size: 0.78em;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.form select,
.form input[type="text"] {
  background: #1e1e1e;
  border: 1px solid #383838;
  border-radius: 4px;
  color: #e8e8e8;
  font-family: inherit;
  font-size: 1em;
  padding: 0.5rem 0.75rem;
  outline: none;
  transition: border-color 0.15s;
}

.form select:focus,
.form input[type="text"]:focus { border-color: #50c878; }

#char-info {
  color: #8cb48c;
  font-size: 0.85em;
  min-height: 1.2em;
  margin-top: -0.4rem;
}

#connect-btn {
  background: #1a3d25;
  border: 1px solid #50c878;
  border-radius: 4px;
  color: #50c878;
  cursor: pointer;
  font-family: inherit;
  font-size: 1em;
  font-weight: bold;
  padding: 0.65rem;
  letter-spacing: 0.06em;
  transition: background 0.15s;
  margin-top: 0.5rem;
}

#connect-btn:hover  { background: #22522f; }
#connect-btn:active { background: #1a3d25; }
#connect-btn:disabled { opacity: 0.45; cursor: default; }

#login-error {
  color: #ff5050;
  font-size: 0.85em;
  min-height: 1.2em;
  text-align: center;
}

/* ── Game panel ──────────────────────────────────────────────────────────────── */
#game-panel {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Status bar ──────────────────────────────────────────────────────────────── */
#status-bar {
  background: #1c1c1c;
  border-bottom: 1px solid #2a2a2a;
  padding: 0.35rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-shrink: 0;
  font-size: 0.85em;
  white-space: nowrap;
}

#s-player { color: #ffdc64; font-weight: bold; }
#s-hp     { font-weight: bold; }
#s-sep    { color: #383838; }
#s-room   { color: #787878; overflow: hidden; text-overflow: ellipsis; flex: 1; }

#sidebar-toggle {
  background: transparent;
  border: 1px solid #333;
  border-radius: 3px;
  color: #666;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.78em;
  padding: 0.18rem 0.45rem;
  transition: color 0.15s, border-color 0.15s;
  flex-shrink: 0;
  letter-spacing: 0.05em;
}
#sidebar-toggle:hover { color: #aaa; border-color: #555; }

#quit-btn {
  background: transparent;
  border: 1px solid #444;
  border-radius: 3px;
  color: #666;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.82em;
  padding: 0.18rem 0.55rem;
  transition: border-color 0.15s, color 0.15s;
  flex-shrink: 0;
}
#quit-btn:hover { border-color: #f05050; color: #f05050; }

/* ── Main area (output + sidebar) ────────────────────────────────────────────── */
#main-area {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Output area ─────────────────────────────────────────────────────────────── */
#output {
  flex: 1;
  overflow-y: auto;
  padding: 0.6rem 1.1rem;
  scroll-behavior: auto;
  min-width: 0;
}

#output::-webkit-scrollbar       { width: 6px; }
#output::-webkit-scrollbar-track { background: #1a1a1a; }
#output::-webkit-scrollbar-thumb { background: #383838; border-radius: 3px; }

.line       { white-space: pre-wrap; word-break: break-word; }
.line.blank { height: 0.55em; display: block; }
.echo       { color: #3a5a6a; }

/* ── Character panel (left) ──────────────────────────────────────────────────── */
#char-panel {
  width: 200px;
  min-width: 200px;
  border-right: 1px solid #242424;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  background: #161616;
  flex-shrink: 0;
  transition: width 0.2s ease, min-width 0.2s ease;
}

#char-panel.collapsed {
  width: 0;
  min-width: 0;
}

#char-panel::-webkit-scrollbar       { width: 4px; }
#char-panel::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

.cp-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.78em;
  padding: 0.15rem 0.55rem;
  transition: background 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cp-btn:hover { background: #202020; }
.cp-btn.equip-btn   { color: #c89464; }
.cp-btn.inv-btn     { color: #a0c8a0; }

.cp-label {
  color: #505050;
  font-size: 0.7em;
  padding: 0.12rem 0.55rem 0.05rem;
  letter-spacing: 0.05em;
}

.status-chip {
  font-size: 0.76em;
  padding: 0.1rem 0.55rem;
  color: #d08040;
}

.attr-row {
  padding: 0.15rem 0.55rem;
  font-size: 0.76em;
}
.attr-name { color: #787878; margin-bottom: 0.1rem; }
.attr-bar-wrap {
  background: #2a2a2a;
  border-radius: 2px;
  height: 5px;
  margin-bottom: 0.15rem;
}
.attr-bar {
  background: #5090c8;
  border-radius: 2px;
  height: 100%;
  transition: width 0.3s ease;
}
.attr-val { color: #a0b8d0; }

/* ── Sidebar (right) ─────────────────────────────────────────────────────────── */
#sidebar {
  width: 220px;
  min-width: 220px;
  border-left: 1px solid #242424;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #161616;
  flex-shrink: 0;
  transition: width 0.2s ease, min-width 0.2s ease;
}

#sidebar.collapsed {
  width: 0;
  min-width: 0;
}

.sidebar-section {
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}

.sidebar-label {
  color: #404040;
  font-size: 0.68em;
  letter-spacing: 0.14em;
  padding: 0.3rem 0.55rem 0.15rem;
  text-transform: uppercase;
}

/* Map pane */
#map-section { flex-shrink: 0; }

#map-display {
  font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
  color: #3cb450;
  font-size: 0.76em;
  white-space: pre;
  line-height: 1.2;
  padding: 0.2rem 0.5rem 0.4rem;
  overflow: auto;
  max-height: 220px;
}

#map-display::-webkit-scrollbar       { width: 4px; height: 4px; }
#map-display::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

/* Exits pane */
#exits-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  padding: 0.3rem 0.5rem 0.45rem;
}

.exit-btn {
  background: #192819;
  border: 1px solid #2a422a;
  border-radius: 3px;
  color: #50c878;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.76em;
  padding: 0.15rem 0.5rem;
  transition: background 0.1s;
  white-space: nowrap;
}
.exit-btn:hover   { background: #213a21; }
.exit-btn.locked  { border-color: #42341a; color: #c8a050; background: #1e1a10; }
.exit-btn.locked:hover { background: #282210; }

/* Here pane (NPCs + items) */
#here-section {
  flex: 1;
  overflow-y: auto;
  padding: 0.3rem 0;
}

#here-section::-webkit-scrollbar       { width: 4px; }
#here-section::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

.here-empty {
  color: #363636;
  font-size: 0.76em;
  padding: 0.2rem 0.55rem;
  font-style: italic;
}

.npc-btn, .item-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.8em;
  padding: 0.15rem 0.55rem;
  transition: background 0.1s;
}
.npc-btn:hover, .item-btn:hover { background: #202020; }

.npc-btn         { color: #e6823c; }
.npc-btn.hostile { color: #e85050; }
.item-btn        { color: #64beef; }

/* ── Clickable exit words in main text ───────────────────────────────────────── */
.exit-link {
  cursor: pointer;
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 2px;
}
.exit-link:hover { color: #78e896; }

/* ── Clickable dialogue responses ────────────────────────────────────────────── */
.dlg-option {
  display: block;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: inherit;
  color: #dcc8a0;
  text-align: left;
  cursor: pointer;
  padding: 0;
  white-space: pre-wrap;
  word-break: break-word;
  width: 100%;
}
.dlg-option:hover { color: #f5e0b4; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }

/* ── Tag colours — mirror the CLI palette ────────────────────────────────────── */
.tag-room_name    { color: #ffdc64; font-weight: bold; }
.tag-room_divider { color: #645a3c; }
.tag-room_desc    { color: #c8d2dc; }
.tag-exit         { color: #50c878; font-weight: bold; }
.tag-move         { color: #8cb48c; }
.tag-npc          { color: #e6823c; font-weight: bold; }
.tag-item         { color: #64beef; }
.tag-item_equip   { color: #64beef; font-weight: bold; }
.tag-item_have    { color: #50dc78; font-weight: bold; }
.tag-item_bank    { color: #78a08c; }
.tag-item_missing { color: #a05050; }
.tag-dialogue     { color: #dcc8a0; }
.tag-combat_hit   { color: #f05050; font-weight: bold; }
.tag-combat_recv  { color: #c83c3c; }
.tag-combat_kill  { color: #ffa028; font-weight: bold; }
.tag-combat_death { color: #b40000; font-weight: bold; }
.tag-reward_xp    { color: #a078ff; font-weight: bold; }
.tag-reward_gold  { color: #ffd232; }
.tag-stats        { color: #a0c8ff; font-family: monospace; }
.tag-system       { color: #969696; }
.tag-error        { color: #ff5050; font-weight: bold; }
.tag-ambiguous    { color: #ffb428; font-weight: bold; }
.tag-style        { color: #b478ff; font-weight: bold; }
.tag-shop         { color: #64dcb4; }
.tag-door         { color: #c8a050; font-weight: bold; }
.tag-map          { color: #3cb450; }
.tag-quest        { color: #ffd700; font-weight: bold; }
.tag-journal      { color: #b4dcff; font-weight: bold; }

/* ── Input bar ───────────────────────────────────────────────────────────────── */
#input-bar {
  background: #1c1c1c;
  border-top: 1px solid #2a2a2a;
  padding: 0.5rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-shrink: 0;
}

.prompt { color: #5090ff; font-weight: bold; }

#cmd-input {
  flex: 1;
  background: transparent;
  border: none;
  color: #e8e8e8;
  font-family: inherit;
  font-size: 1em;
  outline: none;
}

#send-btn {
  background: #1a2a4a;
  border: 1px solid #3a5a8a;
  border-radius: 3px;
  color: #5090ff;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.88em;
  padding: 0.3rem 0.9rem;
  transition: background 0.15s;
}
#send-btn:hover { background: #1e3a6a; }
</style>
</head>
<body>

<!-- ── Login panel ──────────────────────────────────────────────────────────── -->
<div id="login-panel">
  <pre class="banner"> ____       _
|  _ \  ___| |_   _____
| | | |/ _ \ \ \ / / _ \
| |_| |  __/ |\ V /  __/
|____/ \___|_| \_/ \___|</pre>
  <p class="subtitle">a Python MUD engine</p>

  <div class="form">
    <label>World
      <select id="world-select"></select>
    </label>
    <label>Character
      <input id="player-name" type="text" list="player-suggestions"
             placeholder="Enter name..." autocomplete="off" spellcheck="false">
      <datalist id="player-suggestions"></datalist>
    </label>
    <div id="char-info"></div>
    <button id="connect-btn">Enter World</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ── Game panel ───────────────────────────────────────────────────────────── -->
<div id="game-panel" hidden>
  <div id="status-bar">
    <button id="char-toggle" title="Toggle character panel">&gt;&gt;</button>
    <span id="s-player"></span>
    <span id="s-hp"></span>
    <span id="s-sep">|</span>
    <span id="s-room"></span>
    <button id="sidebar-toggle" title="Toggle map sidebar">&lt;&lt;</button>
    <button id="quit-btn">Quit</button>
  </div>
  <div id="main-area">
    <div id="char-panel" class="collapsed">
      <div class="sidebar-section">
        <div class="sidebar-label">Equipped</div>
        <div id="equip-content"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Inventory</div>
        <div id="inv-content"></div>
      </div>
      <div class="sidebar-section" id="status-section">
        <div class="sidebar-label">Status</div>
        <div id="status-content"></div>
      </div>
      <div class="sidebar-section" id="attrs-section">
        <div class="sidebar-label">Attributes</div>
        <div id="attrs-content"></div>
      </div>
    </div>
    <div id="output"></div>
    <div id="sidebar">
      <div class="sidebar-section" id="map-section">
        <div class="sidebar-label">Map</div>
        <pre id="map-display"></pre>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Exits</div>
        <div id="exits-btns"></div>
      </div>
      <div id="here-section">
        <div class="sidebar-label">Here</div>
        <div id="here-content"></div>
      </div>
    </div>
  </div>
  <div id="input-bar">
    <span class="prompt">&gt;</span>
    <input id="cmd-input" type="text" placeholder="Enter command..."
           autocomplete="off" spellcheck="false">
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
"use strict";

// ── DOM references ────────────────────────────────────────────────────────────

const $ = (id) => document.getElementById(id);
const loginPanel    = $('login-panel');
const gamePanel     = $('game-panel');
const worldSel      = $('world-select');
const playerIn      = $('player-name');
const charInfo      = $('char-info');
const connectBtn    = $('connect-btn');
const loginErr      = $('login-error');
const outputEl      = $('output');
const cmdIn         = $('cmd-input');
const sendBtn       = $('send-btn');
const quitBtn       = $('quit-btn');
const sPlayer       = $('s-player');
const sHp           = $('s-hp');
const sRoom         = $('s-room');
const sidebarEl     = $('sidebar');
const sidebarToggle = $('sidebar-toggle');
const mapDisplay    = $('map-display');
const exitsBtns     = $('exits-btns');
const hereContent   = $('here-content');
const charPanel     = $('char-panel');
const charToggle    = $('char-toggle');
const equipContent  = $('equip-content');
const invContent    = $('inv-content');
const statusSection = $('status-section');
const statusContent = $('status-content');
const attrsSection  = $('attrs-section');
const attrsContent  = $('attrs-content');

// ── State ─────────────────────────────────────────────────────────────────────

let players         = [];
let sidebarMapBuf   = [];     // accumulates Tag.MAP lines destined for sidebar
let mapFlushTimer   = null;
let history         = [];
let histIdx         = -1;
let sse             = null;
let atBottom        = true;

// ── Direction patterns for clickable exit words ───────────────────────────────

const DIR_RE = /\b(north|south|east|west|northeast|northwest|southeast|southwest|up|down)\b/gi;

// ── Dialogue option pattern:  "  [1] Some response text" ─────────────────────

const DLGOPT_RE = /^\s*\[(\d+)\]\s/;

// ── Sidebar state ─────────────────────────────────────────────────────────────

function initSidebar() {
  const open = localStorage.getItem('delve_sidebar_open') !== 'false';
  if (!open) {
    sidebarEl.classList.add('collapsed');
    sidebarToggle.textContent = '>>';
  }
}

sidebarToggle.addEventListener('click', () => {
  const isNowCollapsed = sidebarEl.classList.toggle('collapsed');
  sidebarToggle.textContent = isNowCollapsed ? '>>' : '<<';
  localStorage.setItem('delve_sidebar_open', String(!isNowCollapsed));
});

// ── Character panel (left) ────────────────────────────────────────────────────

function initCharPanel() {
  const open = localStorage.getItem('delve_charpanel_open') === 'true';
  if (open) {
    charPanel.classList.remove('collapsed');
    charToggle.textContent = '<<';
  }
}

charToggle.addEventListener('click', () => {
  const isNowCollapsed = charPanel.classList.toggle('collapsed');
  charToggle.textContent = isNowCollapsed ? '>>' : '<<';
  localStorage.setItem('delve_charpanel_open', String(!isNowCollapsed));
});

function _emptySpan(text) {
  const el = document.createElement('span');
  el.className   = 'here-empty';
  el.textContent = text;
  return el;
}

function updateCharPanel(snap) {
  const key = JSON.stringify(snap);
  if (updateCharPanel._last === key) return;
  updateCharPanel._last = key;

  const equipped = snap.equipped  || [];
  const inv      = snap.inventory || [];
  const effects  = snap.status_effects || [];
  const attrs    = snap.world_attrs    || [];

  // ── Equipped ──────────────────────────────────────────────────────────────
  equipContent.innerHTML = '';
  if (equipped.length === 0) {
    equipContent.appendChild(_emptySpan('nothing'));
  } else {
    equipped.forEach(e => {
      const btn = document.createElement('button');
      btn.className   = 'cp-btn equip-btn';
      btn.textContent = `[${e.slot}] ${e.name}`;
      btn.title       = `unequip ${e.slot}`;
      btn.addEventListener('click', () => sendCmd(`unequip ${e.slot}`));
      equipContent.appendChild(btn);
    });
  }

  // ── Inventory ─────────────────────────────────────────────────────────────
  invContent.innerHTML = '';
  if (inv.length === 0) {
    invContent.appendChild(_emptySpan('empty'));
  } else {
    inv.forEach(item => {
      const btn = document.createElement('button');
      btn.className   = 'cp-btn inv-btn';
      btn.textContent = item.name;
      if (item.equip_slot) {
        btn.title = `equip ${item.name}`;
        btn.addEventListener('click', () => sendCmd(`equip ${item.name}`));
      } else {
        btn.title = `use ${item.name}`;
        btn.addEventListener('click', () => sendCmd(`use ${item.name}`));
      }
      invContent.appendChild(btn);
    });
  }

  // ── Status effects ────────────────────────────────────────────────────────
  statusContent.innerHTML = '';
  if (effects.length === 0) {
    statusSection.style.display = 'none';
  } else {
    statusSection.style.display = '';
    effects.forEach(ef => {
      const el = document.createElement('div');
      el.className   = 'status-chip';
      el.textContent = `${ef.name} (${ef.turns_left})`;
      statusContent.appendChild(el);
    });
  }

  // ── World attributes ──────────────────────────────────────────────────────
  attrsContent.innerHTML = '';
  if (attrs.length === 0) {
    attrsSection.style.display = 'none';
  } else {
    attrsSection.style.display = '';
    attrs.forEach(a => {
      const row = document.createElement('div');
      row.className = 'attr-row';
      if (a.display === 'bar') {
        const range = a.max - a.min || 1;
        const pct   = Math.max(0, Math.min(100, (a.value - a.min) / range * 100));
        row.innerHTML =
          `<div class="attr-name">${a.name}</div>` +
          `<div class="attr-bar-wrap"><div class="attr-bar" style="width:${pct.toFixed(1)}%"></div></div>` +
          `<div class="attr-val">${a.value} / ${a.max}</div>`;
      } else {
        row.innerHTML =
          `<div class="attr-name">${a.name}</div>` +
          `<div class="attr-val">${a.value}</div>`;
      }
      attrsContent.appendChild(row);
    });
  }
}

// ── Sidebar update (from room_snapshot events) ────────────────────────────────

function updateSidebar(snap) {
  // Exits
  exitsBtns.innerHTML = '';
  const exits = snap.exits || [];
  if (exits.length === 0) {
    exitsBtns.appendChild(_emptySpan('none'));
  }
  exits.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'exit-btn' + (e.locked ? ' locked' : '');
    btn.textContent = e.dir.charAt(0).toUpperCase() + e.dir.slice(1);
    btn.title = e.locked ? `${e.dir} (locked — try: unlock ${e.dir})` : `go ${e.dir}`;
    btn.addEventListener('click', () => sendCmd(e.locked ? `unlock ${e.dir}` : `go ${e.dir}`));
    exitsBtns.appendChild(btn);
  });

  // Here (NPCs + items)
  hereContent.innerHTML = '';
  const npcs  = snap.npcs  || [];
  const items = snap.items || [];
  if (npcs.length === 0 && items.length === 0) {
    hereContent.appendChild(_emptySpan('nothing of note'));
  }
  npcs.forEach(npc => {
    const btn = document.createElement('button');
    btn.className = 'npc-btn' + (npc.hostile ? ' hostile' : '');
    btn.textContent = (npc.hostile ? '[!] ' : '') + npc.name;
    btn.title = npc.hostile ? `attack ${npc.name}` : `talk ${npc.name}`;
    btn.addEventListener('click', () => sendCmd(npc.hostile ? `attack ${npc.name}` : `talk ${npc.name}`));
    hereContent.appendChild(btn);
  });
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'item-btn';
    btn.textContent = item.name;
    btn.title = `get ${item.name}`;
    btn.addEventListener('click', () => sendCmd(`get ${item.name}`));
    hereContent.appendChild(btn);
  });
}

// ── Map display (sidebar) ─────────────────────────────────────────────────────

function flushSidebarMap() {
  if (mapFlushTimer) { clearTimeout(mapFlushTimer); mapFlushTimer = null; }
  if (!sidebarMapBuf.length) return;
  mapDisplay.textContent = sidebarMapBuf.join('\n');
  sidebarMapBuf = [];
}

// ── Output helpers ────────────────────────────────────────────────────────────

outputEl.addEventListener('scroll', () => {
  const slack = outputEl.scrollHeight - outputEl.scrollTop - outputEl.clientHeight;
  atBottom = slack < 8;
});

function scrollDown() {
  if (atBottom) outputEl.scrollTop = outputEl.scrollHeight;
}

/** Render a Tag.EXIT line with clickable direction words. */
function renderExitLine(text) {
  const el = document.createElement('div');
  el.className = 'line tag-exit';
  DIR_RE.lastIndex = 0;
  let last = 0, match;
  while ((match = DIR_RE.exec(text)) !== null) {
    if (match.index > last) {
      el.appendChild(document.createTextNode(text.slice(last, match.index)));
    }
    const span = document.createElement('span');
    span.className = 'exit-link';
    span.textContent = match[0];
    const dir = match[0].toLowerCase();
    span.addEventListener('click', () => sendCmd('go ' + dir));
    el.appendChild(span);
    last = match.index + match[0].length;
  }
  if (last < text.length) {
    el.appendChild(document.createTextNode(text.slice(last)));
  }
  outputEl.appendChild(el);
  scrollDown();
}

/** Add one tagged engine line to the output area (or sidebar for map). */
function addLine(tag, text) {
  // Map lines accumulate in the sidebar, not the main output
  if (tag === 'map') {
    sidebarMapBuf.push(text);
    if (mapFlushTimer) clearTimeout(mapFlushTimer);
    mapFlushTimer = setTimeout(flushSidebarMap, 80);
    return;
  }
  flushSidebarMap();

  if (tag === 'blank') {
    const el = document.createElement('div');
    el.className = 'line blank';
    outputEl.appendChild(el);
    scrollDown();
    return;
  }

  if (tag === 'exit') {
    renderExitLine(text);
    return;
  }

  // Dialogue numbered options become clickable buttons
  if (tag === 'dialogue') {
    const m = DLGOPT_RE.exec(text);
    if (m) {
      const num = m[1];
      const btn = document.createElement('button');
      btn.className   = 'dlg-option';
      btn.textContent = text;
      btn.title       = `Select option ${num}`;
      btn.addEventListener('click', () => sendCmd(num));
      outputEl.appendChild(btn);
      scrollDown();
      return;
    }
  }

  const el = document.createElement('div');
  el.className   = `line tag-${tag}`;
  el.textContent = text;
  outputEl.appendChild(el);
  scrollDown();
}

/** Echo the player's own command back dimmed. */
function addEcho(text) {
  flushSidebarMap();
  const el = document.createElement('div');
  el.className   = 'line echo';
  el.textContent = '> ' + text;
  outputEl.appendChild(el);
  scrollDown();
}

// ── SSE connection ────────────────────────────────────────────────────────────

function startSSE() {
  if (sse) { sse.close(); sse = null; }

  sse = new EventSource('/game/stream');

  sse.onmessage = (e) => {
    let ev;
    try { ev = JSON.parse(e.data); } catch (_) { return; }

    switch (ev.type) {
      case 'msg':
        addLine(ev.tag, ev.text);
        // When entering a new room, refresh the sidebar map silently
        if (ev.tag === 'room_name') {
          mapDisplay.textContent = '';
          sidebarMapBuf = [];
          sendSilent('map');
        }
        break;
      case 'room_snapshot':
        updateSidebar(ev);
        break;
      case 'char_snapshot':
        updateCharPanel(ev);
        break;
      case 'prompt':
        flushSidebarMap();
        addLine('system', ev.text);
        break;
      case 'player_died':
        flushSidebarMap();
        addLine('combat_death', '*** YOU HAVE BEEN SLAIN ***');
        updateStatus();
        break;
      case 'quit':
        flushSidebarMap();
        addLine('system', '[Session ended — refresh the page to start a new session.]');
        sse.close(); sse = null;
        break;
      case 'error':
        flushSidebarMap();
        addLine('error', ev.text);
        break;
      case 'no_session':
        break;
    }
  };

  sse.onerror = () => {
    if (!document.hidden) {
      flushSidebarMap();
      addLine('system', '[Connection lost — reconnecting in 3 s...]');
    }
    sse.close();
    sse = null;
    setTimeout(startSSE, 3000);
  };
}

// ── Commands ──────────────────────────────────────────────────────────────────

async function sendCmd(cmd) {
  cmd = cmd.trim();
  if (!cmd) return;

  addEcho(cmd);
  history.unshift(cmd);
  if (history.length > 100) history.pop();
  histIdx = -1;

  try {
    await fetch('/game/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cmd }),
    });
  } catch (_) {
    addLine('error', '[Failed to send command — is the server running?]');
  }
}

/** Send a command silently (no echo, no history entry). Used for auto-map. */
function sendSilent(cmd) {
  fetch('/game/command', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cmd }),
  }).catch(() => {});
}

// ── Status bar ────────────────────────────────────────────────────────────────

async function updateStatus() {
  try {
    const res  = await fetch('/game/status');
    const data = await res.json();
    if (!data.session) return;

    sPlayer.textContent = data.player;

    const pct = data.max_hp > 0 ? data.hp / data.max_hp : 0;
    sHp.textContent = `HP ${data.hp}/${data.max_hp}`;
    sHp.style.color = pct > 0.5 ? '#50dc78' : pct > 0.25 ? '#ffa028' : '#f05050';

    sRoom.textContent = data.room.replace(/_/g, ' ');
  } catch (_) { /* server busy, skip */ }
}

// ── Login ─────────────────────────────────────────────────────────────────────

async function doLogin() {
  const worldId    = worldSel.value;
  const playerName = playerIn.value.trim();

  if (!worldId) {
    loginErr.textContent = 'No worlds found — is the server running correctly?';
    return;
  }
  if (!playerName) {
    loginErr.textContent = 'Enter a character name.';
    playerIn.focus();
    return;
  }

  loginErr.textContent   = '';
  connectBtn.disabled    = true;
  connectBtn.textContent = 'Connecting\u2026';

  try {
    const res  = await fetch('/game/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ world_id: worldId, player_name: playerName }),
    });
    const data = await res.json();

    if (!data.ok) {
      loginErr.textContent   = data.error;
      connectBtn.disabled    = false;
      connectBtn.textContent = 'Enter World';
      return;
    }

    showGame();
  } catch (_) {
    loginErr.textContent   = 'Server error — is wct_server.py running?';
    connectBtn.disabled    = false;
    connectBtn.textContent = 'Enter World';
  }
}

function showGame() {
  loginPanel.style.display = 'none';
  gamePanel.removeAttribute('hidden');
  initSidebar();
  initCharPanel();
  cmdIn.focus();
  startSSE();
  updateStatus();
  setInterval(updateStatus, 4000);
}

// ── Quit ──────────────────────────────────────────────────────────────────────

quitBtn.addEventListener('click', async () => {
  if (!confirm('End this session and return to the login screen?')) return;
  try {
    await fetch('/game/quit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
    });
  } catch (_) { /* ignore */ }
  location.reload();
});

// ── Initialise ────────────────────────────────────────────────────────────────

async function init() {
  // Load world list
  try {
    const res  = await fetch('/game/worlds');
    const data = await res.json();
    if (data.worlds.length === 0) {
      loginErr.textContent = 'No worlds found in data/. Create a world config.py to get started.';
    }
    data.worlds.forEach(w => {
      const opt = document.createElement('option');
      opt.value       = w.id;
      opt.textContent = w.name;
      worldSel.appendChild(opt);
    });
  } catch (_) {
    loginErr.textContent = 'Could not reach server — is wct_server.py running?';
  }

  // Load player list for autocomplete + world pre-selection
  try {
    const res  = await fetch('/game/players');
    const data = await res.json();
    players    = data.players;
    const dl   = $('player-suggestions');
    players.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      dl.appendChild(opt);
    });
  } catch (_) { /* non-fatal */ }

  playerIn.addEventListener('input', () => {
    const name  = playerIn.value.trim().toLowerCase();
    const match = players.find(p => p.name.toLowerCase() === name);
    if (match) {
      if (match.world_id) worldSel.value = match.world_id;
      charInfo.textContent = `Returning — HP ${match.hp}/${match.max_hp}`;
    } else {
      charInfo.textContent = name ? 'New character' : '';
    }
  });

  // Skip login if a session is already active
  try {
    const res  = await fetch('/game/status');
    const data = await res.json();
    if (data.session) {
      showGame();
      return;
    }
  } catch (_) { /* ignore */ }
}

// ── Event listeners ───────────────────────────────────────────────────────────

connectBtn.addEventListener('click', doLogin);
playerIn.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

sendBtn.addEventListener('click', () => {
  sendCmd(cmdIn.value);
  cmdIn.value = '';
});

cmdIn.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    sendCmd(cmdIn.value);
    cmdIn.value = '';
    histIdx = -1;
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) {
      histIdx++;
      cmdIn.value = history[histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      cmdIn.value = history[histIdx];
    } else {
      histIdx     = -1;
      cmdIn.value = '';
    }
  }
});

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
