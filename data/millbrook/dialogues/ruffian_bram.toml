# data/millbrook/dialogues/ruffian_bram.toml

[[node]]
id    = "root"
lines = [
  "What do you want?",
  "We're not bothering anyone.",
  "You're not from here."
]

[[response]]
node = "root"
text = "Just looking around."
next = "brush_off"

[[response]]
node = "root"
text = "I've heard about you three."
next = "heard_about"

[[response]]
node = "root"
condition = { quest = "village_ruffians" }
text = "Elder Tomlin asked me to talk to you."
next = "tomlin_sent"

[[response]]
node = "root"
condition = { flag = "ruffians_resolved" }
text = "How are things?"
next = "after_resolution"

[[response]]
