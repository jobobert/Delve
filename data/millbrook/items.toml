# data/millbrook/items.toml
 
# ── Scenery / ambient ─────────────────────────────────────────────────────────

[[item]]
id          = "millbrook_notice"
name        = "Village Notice Board"
desc_short  = "A board covered in pinned notices, most of them weather-beaten."
desc_long   = "Notices in various states of preservation. One says REWARD — LOST AMULET, family heirloom, silver, ask at the mill. Another announces the weekly market. A third advertises the services of a farrier operating out of the next valley. One notice has been pinned so long the paper has become part of the wood."
slot        = ""
weight      = 0
scenery     = true

[[item]]
id          = "fallen_acorn"
name        = "Fallen Acorn"
desc_short  = "A fat acorn from the old oak, still in its cap."
desc_long   = "Heavy for its size, with the dense smoothness of a seed that knows exactly what it is."
slot        = ""
weight      = 0
respawn     = true

[[item]]
id          = "mine_notice"
name        = "Faded Warning Sign"
desc_short  = "A wooden board nailed above the mine entrance. 'ABANDONED — UNSAFE.'"
desc_long   = "Old enough that whoever nailed it up is probably also abandoned and unsafe. The mine has clearly been in recent use regardless. Someone has scratched 'and yet' beneath the original text."
slot        = ""
weight      = 0
scenery     = true

