respawn     = false
effects     = [
  { type = "stat_bonus", stat = "defense", amount = 8 },
  { type = "on_equip",   message = "The chitin helm fits well. It doesn't feel like wearing insect." },
]

[[item]]
id          = "chitin_cuirass"
name        = "Chitin Cuirass"
desc_short  = "A breastplate of shaped Thorngrub carapace segments."
desc_long   = "The Thorngrub Queen's carapace provides exceptional material: hard, light, and articulated. Sera has shaped it into a full front-and-back cuirass with leather straps. Better than anything the blacksmith can provide from the same weight of material."
slot        = "chest"
armor_tags  = ["medium", "chest", "chitin"]
weight      = 4
respawn     = false
effects     = [
  { type = "stat_bonus", stat = "defense", amount = 13 },
  { type = "on_equip",   message = "The cuirass settles onto your chest with a faint click of segments." },
]

