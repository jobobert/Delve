# ── Quest items ───────────────────────────────────────────────────────────────

[[item]]
id          = "millbrook_amulet"
name        = "Miller's Amulet"
desc_short  = "A small silver disc on a cord, tarnished but intact."
desc_long   = "The Aldric family amulet — a silver disc stamped with a millwheel, hung on a braided leather cord. It has been in the nest for some time but the silver is intact. The back is engraved with a name: 'Edda Aldric.' The miller's mother. He has been looking for this."
slot        = "ring"
weight      = 0
respawn     = false
no_drop     = true
effects     = [
  { type = "stat_bonus", stat = "defense", amount = 1 },
  { type = "on_equip", message = "The cold silver disc settles against your chest." },
]
on_get      = [
  { op = "if_not_flag", flag = "amulet_found", then = [
    { op = "set_flag",   flag = "amulet_found" },
    { op = "advance_quest", quest_id = "lost_amulet", step = 2 },
    { op = "message",    tag = "system",
      text = "A silver disc on a leather cord — stamped with a millwheel and a name on the back: Edda Aldric. This is what the miller has been looking for." },
  ]},
]

[[item]]
id          = "thorngrub_queen_remains"
name        = "Thorngrub Queen's Carapace"
desc_short  = "A section of the Queen's reinforced exoskeleton, still warm."
desc_long   = "The carapace is surprisingly hard — somewhere between leather and light plate. It would make exceptional armour material in the right hands. The surface has a faint iridescence, the segments articulated perfectly. Sera the Leatherworker would know what to do with this."
slot        = ""
weight      = 3
respawn     = false
no_drop     = false

[[item]]
id          = "thorngrub_chitin"
name        = "Thorngrub Chitin"
desc_short  = "A plate of segmented chitin from a Thorngrub worker."
desc_long   = "Hard and light. The joints are clever — each segment overlaps the next in a way that allows movement while maintaining coverage. A good armour material."
slot        = ""
weight      = 1
respawn     = false

# ── Tools ─────────────────────────────────────────────────────────────────────

[[item]]
id          = "iron_pickaxe"
name        = "Iron Pickaxe"
desc_short  = "A heavy-headed pickaxe with an ash handle."
desc_long   = "Standard mining tool. The iron head has a point on one side for breaking rock and a flat side for prying. The ash handle is long enough to get proper leverage. It is heavy. Nobody said mining was pleasant."
slot        = "weapon"
tags        = ["pickaxe", "tool", "heavy"]
weight      = 4
respawn     = false
effects     = [
  { type = "stat_bonus", stat = "attack", amount = 3 },
  { type = "stat_bonus", stat = "mining", amount = 15 },
]

[[item]]
id          = "iron_hatchet"
name        = "Iron Hatchet"
desc_short  = "A short-handled hatchet for splitting kindling and light woodwork."
desc_long   = "The blade is slightly chipped from use but sharp enough. The handle is well-wrapped with cord for grip. Good for chopping wood and, at a stretch, self-defence."
slot        = "weapon"
tags        = ["axe", "tool", "light", "blade"]
weight      = 2
respawn     = false
effects     = [
  { type = "stat_bonus", stat = "attack", amount = 2 },
]

[[item]]
id          = "iron_hoe"
name        = "Iron Hoe"
desc_short  = "A long-handled farming hoe, recently cleaned."
desc_long   = "A proper heavy-bladed hoe, not one of those thin ornamental ones. The blade is wide and thick enough to break sod. Not a weapon but absolutely capable of making that point."
slot        = ""
weight      = 2
respawn     = false
scenery     = true

[[item]]
id          = "iron_lantern"
name        = "Iron Lantern"
desc_short  = "A battered iron lantern with a cracked glass pane."
desc_long   = "Still functional despite the cracked pane. Burns oil, needs a flint to start. Provides enough light to see in a mine. Someone left it at the mine entrance — probably decided they didn't want to go in after all."
slot        = ""
weight      = 1
respawn     = false
effects     = [
  { type = "on_equip", message = "You light the lantern. Warm light spills out through the cracked glass." },
]

# ── Mine resources (ore nodes) ────────────────────────────────────────────────

[[item]]
id          = "iron_vein"
name        = "Iron Ore Vein"
desc_short  = "A seam of dark iron ore running through the limestone wall."
desc_long   = "A proper vein, not just a trace — three inches wide and continuous for several feet. The ore is dark red-brown where exposed, with a metallic glitter under lamplight. This is good iron. A pickaxe and a few minutes' work would yield several pieces."
slot        = ""
weight      = 0
scenery     = false
respawn     = true
on_get      = [
  { op = "if_not_flag", flag = "mine_opened", then = [
    { op = "message", tag = "error",
      text = "The mine is too dangerous with the Thorngrubs still inside. Clear them first." },
    { op = "fail" },
  ]},
  { op = "require_tag", tag = "pickaxe",
    fail_message = "You need a pickaxe to mine this. Type 'mine iron vein' with a pickaxe equipped." },
  { op = "skill_check", skill = "mining", dc = 8, grow = false,
    on_pass = [
      { op = "give_item",  item_id = "iron_ingot" },
      { op = "give_item",  item_id = "iron_ingot" },
      { op = "skill_grow", skill = "mining", amount = 3 },
      { op = "message",    tag = "reward_xp",
        text = "You chip free two pieces of good iron ore." },
    ],
    on_fail = [
      { op = "give_item",  item_id = "iron_ingot" },
      { op = "skill_grow", skill = "mining", amount = 1 },
      { op = "message",    tag = "system",
        text = "You chip out one piece, mostly crumbling. Your technique needs work." },
    ],
  },
]

[[item]]
id          = "copper_trace"
name        = "Copper Ore Trace"
desc_short  = "A thin green seam of copper ore running through the passage wall."
desc_long   = "A narrow trace of malachite-green copper ore, thin but visible for several yards. Harder to work than the iron — the copper is disseminated through the rock rather than consolidated. Requires real skill to get anything useful from it."
slot        = ""
weight      = 0
respawn     = true
on_get      = [
  { op = "if_not_flag", flag = "mine_opened", then = [
    { op = "message", tag = "error",
      text = "Clear the Thorngrubs first — it's too dangerous here." },
    { op = "fail" },
  ]},
  { op = "require_tag", tag = "pickaxe",
    fail_message = "You need a pickaxe." },
  { op = "skill_check", skill = "mining", dc = 40, grow = false,
    on_pass = [
      { op = "give_item",  item_id = "copper_chunk" },
      { op = "skill_grow", skill = "mining", amount = 5 },
      { op = "message",    tag = "reward_xp",
        text = "You extract a decent chunk of copper ore from the trace. Nice work." },
    ],
    on_fail = [
      { op = "skill_grow", skill = "mining", amount = 3 },
      { op = "message",    tag = "system",
        text = "The copper crumbles as you chip at it. The trace is too fine for your current skill." },
    ],
  },
]



[[item]]
id          = "copper_chunk"
name        = "Copper Ore Chunk"
desc_short  = "A palm-sized piece of green-tinged copper ore."
desc_long   = "Malachite green on the surface, with the dull orange of raw copper where freshly broken. Rare enough to be worth something to a metalworker."
slot        = ""
weight      = 2
respawn     = false

# ── Timber nodes (for chop command) ──────────────────────────────────────────

[[item]]
id          = "thornwood_log"
name        = "Thornwood Log Pile"
desc_short  = "A stack of rough-cut logs beside a fallen ash."
desc_long   = "Someone felled this ash and cut it into rounds but never split or moved it. It has been here long enough that moss is growing on the cut faces. Good hard wood."
slot        = ""
weight      = 0
respawn     = true
on_get      = [
  { op = "require_tag", tag = "axe",
    fail_message = "You need a hatchet or axe to cut timber." },
  { op = "give_item",  item_id = "hard_wood" },
  { op = "give_item",  item_id = "hard_wood" },
  { op = "message",    tag = "reward_xp",
    text = "You split off two good pieces of hardwood." },
]

# ── Combat gear (Millbrook-tier) ──────────────────────────────────────────────

[[item]]
id          = "chitin_helm"
name        = "Chitin Helm"
desc_short  = "A helm shaped from Thorngrub Queen's carapace sections."
desc_long   = "Sera the Leatherworker's work: the Queen's carapace has been shaped and riveted into a close-fitting helm with cheek-guards. It is lighter than iron for equivalent protection. The surface has a faint iridescence in strong light."
slot        = "head"
