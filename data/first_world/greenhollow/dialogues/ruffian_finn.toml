line = "He gets up slowly. There's dirt on his face and he's breathing too carefully — ribs maybe. He looks at you with something that's not quite anger. 'You hit hard for someone who said it was fair.' He wipes his mouth. 'Dale? Scratch?' They're both down. He looks around the practice yard. 'All right. All right.'"
