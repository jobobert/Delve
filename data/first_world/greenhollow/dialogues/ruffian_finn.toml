[[node]]
id   = "challenged"
line = "Bored? We're— yeah, all right. We're bored. There's nothing to do here. The mine's closed, the smithy won't take us on, and if I hear one more thing about the harvest I'll—" He stops. Resets. Goes back to posturing. "Doesn't matter. You just passing through?"

[[response]]
node = "challenged"
text = "Sounds like you need something to push back against."
next = "spar_offer"

[[response]]
node = "challenged"
text = "Maybe there's something worth doing. Ask me."
next = "quest_offer_path"

[[response]]
node = "challenged"
text = "Passing through. Good luck."
next = ""

[[node]]
id   = "spar_offer"
line = "Fair fight. The three of us." He looks at Dale and Scratch. Dale grins. Scratch is already moving to a better angle. "You lose, you keep walking. You win— I don't know. We'll see what that looks like."
script = [
  { op = "set_flag",      flag = "finn_quest_started" },
  { op = "advance_quest", quest_id = "finns_reckoning", step = 1 },
]

[[response]]
node = "spar_offer"
text = "Deal. Come on then."
next = ""

[[response]]
node = "spar_offer"
text = "Actually — hear me out first."
next = "quest_offer_path"

[[node]]
id   = "quest_offer_path"
line = "Something worth doing." Finn says it flat, like he's heard this before. But he doesn't walk away. "Like what?"

[[response]]
node = "quest_offer_path"
text = "The mine needs people to keep watch at the entrance while the deeper levels are cleared."
next = "quest_detail"

[[response]]
node = "quest_offer_path"
text = "Forget it, I'll just fight you."
next = "spar_offer"

[[node]]
id   = "quest_detail"
line = "Mine watch." He looks at Dale and Scratch again. Scratch shrugs. Dale says nothing but stops grinning, which is as close to serious as he gets. 'If the groundhogs come up while someone's in the lower level, they'd need warning. We could—' He catches himself. 'What's in it for us?'

[[response]]
node = "quest_detail"
text = "A real job. Done properly. Something the village will remember."
next = "quest_accept"

[[response]]
node = "quest_detail"
text = "Nothing. Do it because it matters."
next = "quest_accept_hard"

[[node]]
id   = "quest_accept"
line = "A real job." He's quiet for a moment. Then: 'Yeah. All right. We'll watch the entrance. When you go in, we'll keep it clear.' He doesn't shake your hand, but he doesn't walk away either. The other two are already moving toward the field's edge."
script = [
  { op = "set_flag",      flag = "ruffians_talked_down" },
  { op = "set_flag",      flag = "finn_quest_started" },
  { op = "advance_quest", quest_id = "finns_reckoning", step = 1 },
]

[[response]]
node = "quest_accept"
text = "I'll hold you to that."
next = ""

[[node]]
id   = "quest_accept_hard"
line = "He stares at you for a long moment. Then he laughs — once, short, surprised. 'Because it matters.' He says it like he's testing the weight of it. 'Yeah. Fine. Yeah.' He nods at the others and they're moving before you've finished turning around."
script = [
  { op = "set_flag",      flag = "ruffians_talked_down" },
  { op = "set_flag",      flag = "finn_quest_started" },
  { op = "advance_quest", quest_id = "finns_reckoning", step = 1 },
  { op = "prestige",      amount = 1, reason = "convinced Finn without offering reward" },
]

[[response]]
node = "quest_accept_hard"
text = "Let's see it then."
