              { op = "prestige",      amount = 2, reason = "earned Finn's grudging respect" },
              { op = "give_item",     item_id = "ruffian_peace_token" },
            ],
          },
        ],
      },
    ],
  },
]

[[response]]
node = "post_spar"
text = "We done?"
next = "post_spar_done"

[[node]]
