[[npc]]
id          = "thorngrub_queen"
name        = "Thorngrub Queen"
desc_short  = "A five-foot insect of deliberate, terrible purpose."
desc_long   = "She is enormous for an insect and moves with the weight of something that knows it is the last line of defence. The mandibles are as long as short swords and articulate sideways as well as forward. The carapace is deeply segmented, the colour of old iron. Her eyes track you with disturbing intelligence. The eggs around her make this non-negotiable. She will not retreat."
tags        = ["insect", "boss", "large", "slow"]
style       = "iron_root"
style_prof  = 40
hp          = 120
max_hp      = 120
attack      = 18
defense     = 10
xp_reward   = 200
gold_reward = 0
hostile     = true
kill_script = [
  { op = "set_flag",   flag = "mine_opened" },
  { op = "set_flag",   flag = "thorngrubs_cleared" },
  { op = "advance_quest", quest_id = "thorngrub_queen", step = 3 },
  { op = "prestige",   delta = 3, reason = "cleared the Thorngrub nest" },
  { op = "message",    tag = "system",
