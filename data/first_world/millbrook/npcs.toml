desc_short  = "A larger Thorngrub variant, heavier-plated, positioned at the entrance."
desc_long   = "Considerably larger than the workers — perhaps two and a half feet long, with heavier plating and mandibles wide enough to be properly dangerous. Whether the colony has a caste system or these are simply older workers is a question for a naturalist. For practical purposes: it is bigger and angrier than the others."
