desc_short  = "A sleek brown animal moving through the shallows with total confidence."
desc_long   = "The otter is about two feet long and entirely at home. It catches a small fish with the casual ease of something that has been doing this its whole life and finds it easy. It regards you briefly, decides you're not interesting, and goes back to fishing."
