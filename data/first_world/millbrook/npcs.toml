[[npc]]
id          = "field_crow"
name        = "Crow"
desc_short  = "A large crow working the turned soil, aggressive about its finds."
desc_long   = "Crows are not afraid of you. This one has decided you're too close to its patch and is making that opinion known vocally. It's a big bird — the size of a small cat — and it has the self-assurance of something that knows it can fly away anytime it wants. It just hasn't decided to yet."
