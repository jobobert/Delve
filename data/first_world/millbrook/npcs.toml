desc_short  = "A goat watching you with profound philosophical suspicion."
desc_long   = "Goats have rectangular pupils, which gives them an unsettling quality even when they're doing nothing. This one is doing something — it is watching you with the specific focus of an animal deciding whether you are edible, a threat, or simply wrong. It may headbutt you. Many goats headbutt things for reasons that are not immediately obvious."
