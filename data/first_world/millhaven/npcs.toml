[[npc]]
id          = "innkeeper"
name        = "Bron the Innkeeper"
tags        = ["humanoid", "slow"]
style       = "brawling"
style_prof  = 20
desc_short  = "A heavyset man with a warm smile and watchful eyes."
desc_long   = "Bron has the innkeeper's gift of seeming pleased to see everyone who walks through the door, while simultaneously never being surprised by what they do next. He keeps a club behind the bar and has presumably used it, given the lack of trouble in his establishment."
hp          = 40
max_hp      = 40
attack      = 6
defense     = 3
xp_reward   = 0
gold_reward = 0
hostile     = false
rest_cost   = 10

[[npc]]
id          = "elder_mira"
name        = "Elder Mira"
tags        = ["humanoid", "slow", "small"]
style       = "iron_root"
style_prof  = 10
desc_short  = "A grey-robed elder with sharp eyes and ink-stained fingers."
desc_long   = "Mira has governed Millhaven for thirty years and looks every year of it — not worn down, but worn in, like a tool that has been used properly. Her eyes are the kind that see what you're actually doing rather than what you say you're doing. The ink on her fingers is fresh. Whatever she was reviewing when you walked in, she has already decided whether you're useful."
hp          = 30
max_hp      = 30
attack      = 4
defense     = 3
xp_reward   = 0
gold_reward = 0
hostile     = false
dialogue    = "I am Mira, Elder of Millhaven. State your business."

[[npc]]
id          = "wolf"
name        = "Grey Wolf"
tags        = ["beast", "fast", "small"]
style       = "serpent_strike"
style_prof  = 20
desc_short  = "A lean grey wolf with amber eyes."
desc_long   = "Not large for a wolf, but fast — it moves with the loose-limbed efficiency of something that hunts regularly. Its coat is thick and its ribs aren't showing. This is a healthy predator on its own territory, not a desperate one."
hp          = 25
max_hp      = 25
attack      = 7
defense     = 2
xp_reward   = 15
gold_reward = 0
hostile     = true
dialogue    = "The wolf regards you with flat amber eyes."

[[npc]]
id          = "goblin"
name        = "Goblin Scout"
tags        = ["humanoid", "fast", "small"]
style       = "evasion"
style_prof  = 15
desc_short  = "A small green-skinned creature with a rusty knife."
desc_long   = "It's about four feet tall, lean and wiry, with skin the colour of old moss and eyes that are too big for its head. The knife it carries is probably stolen. It sizes you up with the quick, darting assessment of something that has survived by knowing when to run."
hp          = 20
max_hp      = 20
attack      = 6
defense     = 2
xp_reward   = 12
gold_reward = 3
hostile     = true
dialogue    = "The goblin hisses and raises its knife."

[[npc]]
id          = "millhaven_banker"
name        = "Town Treasurer"
tags        = ["humanoid", "slow", "banker"]
style       = "brawling"
style_prof  = 5
desc_short  = "A careful-eyed clerk behind a reinforced oak counter."
desc_long   = "She has the particular stillness of someone who spends their days handling other people's valuables. The counter between you and her is solid oak reinforced with iron straps. A ledger open in front of her is covered in neat, dense handwriting. She's already noticed what you're carrying."
hp          = 30
max_hp      = 30
attack      = 3
defense     = 3
xp_reward   = 0
gold_reward = 0
hostile     = false
dialogue    = "The Millhaven treasury. Deposit, withdraw, or check your balance — your account is good across all branches."
give_accepts = [
  { item_id = "riversturm_journal",
    message  = "She takes the ledger carefully, opens it to the stamp inside. 'Millhaven Treasury — Charter Ledger. Yes. This is it.' She sets it in the strongbox behind her. 'Your account is expanded. Twenty slots. No charge.'",
    script   = [
      { op = "set_flag",   flag = "ledger_returned" },
      { op = "advance_quest", quest_id = "the_lost_ledger", step = 3 },
      { op = "bank_expand", tier = 20 },
    ]
  },
]

