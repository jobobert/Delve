tags        = ["humanoid", "slow", "large"]
style       = "brawling"
style_prof  = 55
desc_short  = "A barrel-chested smith with forearms like ham hocks."
desc_long   = "Dorin fills the doorway in a way that makes you briefly reconsider whether you want to go in. He's not hostile — his eyes are warm and slightly distracted, the eyes of someone always half-thinking about a problem in metal. His apron has burn marks in a pattern that suggests long practice rather than accidents. His hammer is on his belt even now, apparently a permanent fixture."
