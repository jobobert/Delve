[[npc]]
id          = "town_guard"
name        = "Town Guard"
tags        = ["humanoid", "armored", "slow"]
style       = "swordplay"
style_prof  = 30
desc_short  = "A bored-looking guard in dented chainmail."
desc_long   = "He's young — younger than the job makes him look. His chainmail hauberk is dented across one shoulder and several rings have been replaced with mismatched iron. He's not watching the road so much as staring through it, lost somewhere else entirely. His hand rests near his sword out of habit more than alertness."
hp          = 50
max_hp      = 50
attack      = 8
defense     = 6
xp_reward   = 0
gold_reward = 0
hostile     = false
dialogue    = "Move along."

[[npc]]
