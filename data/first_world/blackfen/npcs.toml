[[npc]]
id       = "anurus_the_returned"
name     = "Anurus the Returned"
desc_short  = "A skeleton in robes that retain their colour despite decades of damp."
desc_long   = "A skeleton in robes that retain their colour despite decades of damp. The skeleton stands upright, one hand on a staff, the jaw moving slightly as though testing its own capacity for speech."
hostile  = true
tags     = ["undead", "arcane"]
style    = "swordplay"
style_prof = 60
attack   = 15
defense  = 8
hp       = 65
max_hp   = 65
gold_reward = 20
xp_reward   = 200
round_script = [
  { op = "if_combat_round", min = 2, then = [
    { op = "message", text = "Anurus speaks a forbidden word — a curse settles into your bones.", tag = "combat" },
    { op = "apply_status", effect = "cursed", duration = 6 },
  ]},
]
kill_script = [
  { op = "message", text = "The skeleton collapses, robes settling over a pile of old bones. The staff remains upright for a moment, then falls.", tag = "combat_death" },
