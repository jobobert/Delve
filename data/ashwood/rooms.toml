# data/ashwood/rooms.toml — The Ashwood Forest quest zone.
# Zone id: ashwood
#
# Quest: The Ashwood Contract (data/ashwood/quests/ashwood_contract.toml)
# This zone is the heart of the tutorial quest chain. Room progression:
#
#   deep_forest (millhaven zone)
#     → ashwood_gate         (ranger_wren, quest entry)
#     → ashwood_road         (corrupted_wolf x2)
#     → ashwood_ruins        (garrison_ghost, ghost_note scenery)
#       → ashwood_armory     [LOCKED: garrison_lock] (drakebone_sword, drakebone_plate, shrine_descent_key)
#     → ashwood_clearing     (riddle_spirit, puzzle_altar scenery)
#     → ashwood_shrine       (shrine_keeper)
#       → shrine_descent     [LOCKED: shrine_seal — unlocked by solving the riddle]
#       → drakes_lair_antechamber (ashwood_wolf x3)
#       → drakes_lair        (ashwood_drake BOSS, lair_treasury)
#         → lair_treasury    (drake_scale_pack, treasure_gold)
#
# coord = [x, y] — see tools/map.py
# coord = [x, y], east = +x, north = +y

[[room]]
id          = "ashwood_gate"
name        = "Ashwood Gate"
description = "Two stone pillars flank the old eastern road, carved with warning sigils that have half-eroded over the centuries. A weathered notice board bears a torn placard: 'ROAD CLOSED — MILITARY ORDER.' Beyond the gate the trees are larger, older, and the air smells faintly of something burnt and animal. A lone ranger sits beside the pillar, sharpening a knife."
coord       = [1, -4]
exits       = { west = "deep_forest", east = "ashwood_road" }
items       = []
flags       = ["no_combat", "town"]
spawns      = ["ranger_wren", "ashwood_warden"]

[[room]]
id          = "ashwood_road"
name        = "Ashwood Road"
description = "The old stone road is cracked and pushed up by roots that didn't exist a decade ago. The trees on either side lean inward like an audience watching something terrible. Every few paces there's a dead bird on the ground — not fallen, but placed, wings spread. Something here is wrong in a way that goes beyond danger."
coord       = [2, -4]
exits       = { west = "ashwood_gate", east = "ashwood_ruins", south = "ashwood_clearing" }
items       = []
spawns      = ["corrupted_wolf", "corrupted_wolf"]

[[room]]
id          = "ashwood_ruins"
name        = "Ruined Garrison"
description = "The stone walls of an old military post, collapsed inward over decades of neglect. Rotted timber beams stick up from the rubble like broken ribs. Something valuable was stored here once — you can see the remains of weapon racks along the surviving walls. The east door is still standing, sealed with a heavy crossbar."
coord       = [3, -4]
exits       = { west = "ashwood_road", east = { to = "ashwood_armory", locked = true, lock_tag = "garrison_lock", desc = "a heavy barred door" } }
items       = ["ghost_note"]
spawns      = ["garrison_ghost"]

[[room]]
id          = "ashwood_armory"
name        = "Garrison Armory"
description = "The armory has been sealed since the garrison fell. Dust coats everything in a uniform grey. Most of the weapons have rusted to nothing, but one rack holds something remarkable — a sword whose blade still gleams as if freshly forged, dark metal wrapped in what looks like scaled leather. Beside it, a suit of armor built for serious work. On the floor, a small wooden chest."
coord       = [4, -4]
exits       = { west = { to = "ashwood_ruins", locked = false, lock_tag = "garrison_lock", desc = "the barred door back to the ruins" } }
items       = ["drakebone_sword", "drakebone_armor", "drakebone_bracers", "shrine_descent_key", "garrison_helm", "garrison_hauberk", "garrison_leggings"]
spawns      = []

[[room]]
id          = "ashwood_clearing"
name        = "Haunted Clearing"
description = "A perfect circle of grass, unnaturally green in the grey-brown forest. In the center stands a stone altar with a brass plaque. The air here is still — no wind, no birdsong, no rustling. The silence isn't peaceful. It feels like waiting. To the north, the road continues. To the south, the land drops toward the old shrine."
coord       = [2, -5]
exits       = { north = "ashwood_road", south = "ashwood_shrine" }
items       = ["puzzle_altar"]
spawns      = ["riddle_spirit"]

[[room]]
id          = "ashwood_shrine"
name        = "Ashwood Shrine"
description = "Ancient stonework, surprisingly intact, carved with interlocking serpent motifs. The shrine was built to contain something powerful — every surface is inscribed with binding prayers in an old dialect. Braziers that should be cold still burn with pale blue flame. A stone door to the south has a circular lock mechanism — six numbered rings that must be set correctly to open."
coord       = [2, -6]
exits       = { north = "ashwood_clearing", south = { to = "shrine_descent", locked = true, lock_tag = "shrine_seal", desc = "a sealed stone door with a circular lock" } }
items       = []
spawns      = ["shrine_keeper"]

[[room]]
id          = "shrine_descent"
name        = "The Descent"
description = "A long stairway carved into living rock descends into heat and orange light. The walls are scored with long parallel claw marks — something large walked up these stairs long ago. The air thickens with each step. A distant sound, somewhere between breathing and grinding stone, rises from below."
coord       = [2, -7]
exits       = { north = { to = "ashwood_shrine", locked = false, lock_tag = "shrine_seal", desc = "the stone door back to the shrine" }, south = "drakes_lair_antechamber" }
items       = []
spawns      = []

[[room]]
id          = "drakes_lair_antechamber"
name        = "Drake's Antechamber"
description = "A wide cavern, its floor covered in scorched earth and crushed bones. Heat radiates from cracks in the southern wall. Three massive wolves pace the chamber — not the grey wolves of the surface forest, but larger, darker, their fur matted with ash. Their eyes glow faintly orange, corrupted by proximity to the Drake. They have been here long enough that they no longer remember the forest."
coord       = [2, -8]
exits       = { north = "shrine_descent", south = "drakes_lair" }
items       = []
spawns      = ["ashwood_wolf", "ashwood_wolf", "ashwood_wolf"]

[[room]]
id          = "drakes_lair"
name        = "The Drake's Lair"
description = "The heart of the corruption. A vast natural cavern, its ceiling lost in shadow, its floor a mosaic of fused stone and ancient bone. At the center, coiled around a column of rock as wide as a house, the Ashwood Drake watches you enter. It is enormous — fifteen feet of scaled muscle and ancient malice. Its eyes, the color of dying embers, track you with intelligent, unhurried attention. The Drake has been waiting for something like you. It is not afraid."
coord       = [2, -9]
exits       = { north = "drakes_lair_antechamber", east = "lair_treasury" }
items       = []
spawns      = ["ashwood_drake"]

[[room]]
id          = "lair_treasury"
name        = "The Drake's Hoard"
description = "An alcove off the main lair, piled with the accumulated possessions of the Drake's victims over decades. Mostly rusted junk, crumbled leather, and corroded coins. But among the debris are a few items that survived: a leather pack reinforced with Drake scales, and scattered across the floor, more gold than you've seen in one place."
coord       = [3, -9]
exits       = { west = "drakes_lair" }
items       = ["drake_scale_pack", "treasure_gold"]
spawns      = []
