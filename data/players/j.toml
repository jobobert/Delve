bank = [{id = "leather_strip", name = "Leather Strip", desc_short = "A cured strip of leather, about a hand's length.", desc_long = "A flat strip of tanned leather, punched with holes along one edge for stitching. Smells like the tannery.", slot = "", weight = 0, respawn = true}, {id = "tanned_hide", name = "Tanned Hide", desc_short = "A cured animal hide, stiff but workable.", desc_long = "A full-cured hide, scraped clean and tanned to a warm brown. The grain is tight and the leather is thick.", slot = "", weight = 2, respawn = true}, {id = "ghost_willow_bark", name = "Ghost Willow Bark", desc_short = "a pouch of pale bark from a ghost willow", desc_long = "Bark stripped from the ghost-white willow in the Murk Fens. Brewed as tea, it closes wounds and reduces fever. The taste is bitter and earthy. Three doses in the pouch.", weight = 0}, {id = "redvange_arrowheads", name = "Redvange Arrowheads", desc_short = "barbed reed-heads prized by fletchers", desc_long = "A bundle of dried redvange reed-tips, their barbs sharp as any metal point. Fletchers value these for how easily they take enchantment — a set of arrows fitted with redvange heads holds magic longer than iron. Worth good coin.", weight = 1}, {id = "ebony_fish", name = "Ebony Fish", desc_short = "a three-eyed lake fish wrapped in cloth", desc_long = "One of the black, three-eyed fish unique to Blacklake. When dried and salted, these are considered a delicacy in noble households throughout the region. This one is wrapped in spare cloth and ready for the journey home.", weight = 1}, {id = "celestial_emerald", name = "The Celestial Emerald", desc_short = "a fist-sized gem of impossible green", desc_long = "A gem the size of your clenched fist, cut in a style no modern lapidary would recognise. The green is not the green of growing things but of deep ocean water over pale sand — a colour that seems lit from within. When you hold it, you feel an impression: not words, not images, but a personality pressing against the inside of your skull. Patient. Old. Curious about you. This is what Gregor Aldenmoor carried into the swamp and never brought out. This is what you came for.", weight = 1, no_drop = true}, {id = "garrison_key", name = "Garrison Key", desc_short = "A heavy iron key with a crest of crossed swords.", desc_long = "Cold iron, old but sound. The bow bears the crest of an old military garrison — crossed swords over a tower. It would open a military-grade lock.", slot = "", key_tag = "garrison_lock", weight = 0, respawn = false, no_drop = true, effects = []}, {id = "shrine_descent_key", name = "Shrine Descent Key", desc_short = "An ancient stone disc etched with a six-pointed star.", desc_long = "A circular stone disc the size of a large coin, carved from black granite and etched with a six-pointed star. The grooves are filled with something that glows faintly when the light hits it at the right angle. The design matches the lock mechanism on the shrine's south door.\n\nThis is the solution to the shrine seal. You know what to do with it.", slot = "", key_tag = "shrine_seal", weight = 0, respawn = false, no_drop = true, effects = []}, {id = "millhaven_commendation", name = "Millhaven Commendation", desc_short = "A bronze medallion stamped with the Millhaven crest.", desc_long = "A bronze disc the size of a palm, stamped on one side with the Millhaven crest — a tower over a river — and on the other, an inscription: 'For service to Millhaven in the Year of the Drake.' It has no practical use, but it is a record. Something happened here, and you were part of it.", slot = "", weight = 0, respawn = false, no_drop = true, effects = []}, {id = "drakes_fang", name = "Drake's Fang", desc_short = "A curved tooth the length of your forearm, still warm.", desc_long = "The Drake's fang, removed after the kill. It curves like a scimitar and tapers to a needle point. Still warm to the touch, and slightly luminescent — the Drake's essence hasn't fully faded yet. This is your proof for Elder Mira.", slot = "", weight = 1, respawn = false, no_drop = true, effects = []}]
