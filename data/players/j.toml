inventory = [{id = "health_potion", name = "Health Potion", desc_short = "A thumb-sized vial of glowing red liquid.", desc_long = "The glass vial is sealed with a wax cork and warm to the touch. The liquid inside catches the light and pulses faintly, as if something alive stirs within. A handwritten label reads 'Drink in need. Do not smell first.'", slot = "", weight = 0, respawn = true, effects = [{type = "on_use", heal = 30}]}, {id = "leather_satchel", name = "Leather Satchel", desc_short = "A well-worn satchel with multiple straps.", desc_long = "Oiled brown leather, reinforced at the corners with brass rivets. Three interior pockets and a main compartment. A good adventurer's bag — not glamorous, but it holds a lot and doesn't fall apart.", slot = "pack", armor_tags = [], weight = 1, respawn = false, effects = [{type = "stat_bonus", stat = "carry_capacity", amount = 5}]}, {id = "chain_shirt", name = "Chain Shirt", desc_short = "A waist-length shirt of interlocked iron rings.", desc_long = "Thousands of small iron rings interlocked into a flexible mesh. Covers the torso and upper arms. The rings are riveted, not just butted — proper work. Heavy on the shoulders after a long march.", slot = "chest", armor_tags = ["medium", "chain", "chest"], weight = 5, respawn = false, effects = [{type = "stat_bonus", stat = "defense", amount = 7}]}, {id = "spiked_knuckles", name = "Spiked Knuckles", desc_short = "Iron knuckles with short brutal spikes.", desc_long = "Four iron rings connected by a crossbar, each one capped with a short blunt spike. They won't do much against armor but against unprotected flesh they're savage. Favoured by brawlers who want an edge without learning to use a blade.", slot = "weapon", weapon_tags = ["fist", "brawling"], weight = 1, respawn = false, effects = [{type = "stat_bonus", stat = "attack", amount = 7}, {type = "on_hit", ability = "stun", chance = 0.12, magnitude = 1}, {type = "on_equip", message = "The spikes bite into your palm slightly. Good."}]}, {id = "wolf_fang_dagger", name = "Wolf-Fang Dagger", desc_short = "A curved dagger carved from a wolf's fang. Unnatural and sharp.", desc_long = "The fang has been fitted with a simple wrapped-leather handle and the tip sharpened to a needle point. It shouldn't hold an edge this well — bone doesn't. But it does, and the wounds it makes bleed freely and stubbornly.", slot = "weapon", weapon_tags = ["blade", "one_handed", "light"], weight = 1, respawn = false, effects = [{type = "stat_bonus", stat = "attack", amount = 8}, {type = "on_hit", ability = "bleed", chance = 0.25, magnitude = 3}, {type = "on_equip", message = "The dagger feels cold in your hand even on a warm day."}]}, {id = "drakebone_sword", name = "Drakebone Sword", desc_short = "A blade forged from Drake-bone ore, unnaturally sharp.", desc_long = "The blade is dark metal — almost black — with a faint pattern in the steel like scales pressed into the surface. It was forged to kill things that ordinary weapons cannot. The edge is absurdly sharp and has remained so despite years of abandonment. The grip is wrapped in what appears to be Drake hide leather. It is heavy enough to feel serious and balanced enough to use.", slot = "weapon", weapon_tags = ["blade", "one_handed", "drake_forged"], weight = 4, respawn = false, effects = [{type = "stat_bonus", stat = "attack", amount = 18}, {type = "on_hit", ability = "bleed", chance = 0.2, magnitude = 4}, {type = "on_equip", message = "The Drakebone Sword hums faintly in your grip, as if it recognizes what you're hunting."}]}, {id = "drakebone_armor", name = "Drakebone Plate", desc_short = "Plate armor reinforced with Drake-bone laminate.", desc_long = "Heavy plate with strips of Drake-bone laminate riveted across the chest and shoulders. The Drake-bone turns blades that would punch through ordinary steel. It weighs more than chain but protects considerably more. The inside is lined with padded cloth that's survived remarkably well.", slot = "armor", armor_tags = ["heavy", "plate", "drake_forged", "torso"], weight = 8, respawn = false, effects = [{type = "stat_bonus", stat = "defense", amount = 15}, {type = "stat_bonus", stat = "attack", amount = -3}, {type = "on_equip", message = "The armor settles onto your shoulders with a familiar weight. Something about it says: this is what you came here for."}]}, {id = "drakebone_bracers", name = "Drakebone Bracers", desc_short = "Vambraces reinforced with strips of Drake-bone.", desc_long = "Iron vambraces with strips of Drake-bone riveted along the outer edge. The Drake-bone has a faint iridescence in certain light. They're lighter than you'd expect from how hard they are — Drake-bone has that quality. The soldier who wore these either abandoned them or didn't survive.", slot = "arms", armor_tags = ["heavy", "arms", "drake_forged"], weight = 3, respawn = false, effects = [{type = "stat_bonus", stat = "defense", amount = 8}, {type = "on_equip", message = "The Drake-bone bracers settle on your forearms with surprising lightness."}]}, {id = "garrison_helm", name = "Garrison Helm", desc_short = "A battered military helm with a dented cheek-guard.", desc_long = "Standard issue from whatever garrison occupied this forest before the corruption. Iron bowl with riveted cheek-guards and a nasal strip. The inside lining has rotted out but the metal is solid. Someone scratched a tally of kills into the bowl's interior.", slot = "head", armor_tags = ["medium", "head", "military"], weight = 3, respawn = false, effects = [{type = "stat_bonus", stat = "defense", amount = 6}]}, {id = "garrison_hauberk", name = "Garrison Hauberk", desc_short = "A long-skirted chainmail coat, military issue.", desc_long = "A knee-length coat of riveted chainmail, split front and back for mounted use even though the garrison soldiers here were infantry. Heavy, well-made, and clearly old — but the rings are sound. The crest that was once on the chest has been scratched off.", slot = "chest", armor_tags = ["medium", "chain", "chest", "military"], weight = 7, respawn = false, effects = [{type = "stat_bonus", stat = "defense", amount = 9}]}, {id = "garrison_leggings", name = "Garrison Leggings", desc_short = "Articulated iron plates worn over the thighs and knees.", desc_long = "Three overlapping iron plates held together with leather rivets, designed to cover the thigh and knee while still allowing movement. The leather has stiffened with age but the plates are intact. Military manufacture — there are dozens of these in garrison supply rooms across the region.", slot = "legs", armor_tags = ["medium", "legs", "military"], weight = 4, respawn = false, effects = [{type = "stat_bonus", stat = "defense", amount = 6}]}, {id = "health_potion", name = "Health Potion", desc_short = "A thumb-sized vial of glowing red liquid.", desc_long = "The glass vial is sealed with a wax cork and warm to the touch. The liquid inside catches the light and pulses faintly, as if something alive stirs within. A handwritten label reads 'Drink in need. Do not smell first.'", slot = "", weight = 0, respawn = true, effects = [{type = "on_use", heal = 30}]}, {id = "health_potion", name = "Health Potion", desc_short = "A thumb-sized vial of glowing red liquid.", desc_long = "The glass vial is sealed with a wax cork and warm to the touch. The liquid inside catches the light and pulses faintly, as if something alive stirs within. A handwritten label reads 'Drink in need. Do not smell first.'", slot = "", weight = 0, respawn = true, effects = [{type = "on_use", heal = 30}]}, {id = "health_potion", name = "Health Potion", desc_short = "A thumb-sized vial of glowing red liquid.", desc_long = "The glass vial is sealed with a wax cork and warm to the touch. The liquid inside catches the light and pulses faintly, as if something alive stirs within. A handwritten label reads 'Drink in need. Do not smell first.'", slot = "", weight = 0, respawn = true, effects = [{type = "on_use", heal = 30}]}, {id = "sacrificial_knife", name = "Sacrificial Knife", desc_short = "a silver knife, impossibly sharp and unrusted", desc_long = "A blade of pure silver, the handle wound in leather that has dried to the hardness of wood. The silver is not rusted — has never rusted — despite being half-buried in swamp dirt. The edge is sharp enough to shave with. Someone made this blade with serious intent.", weight = 1, slot = "weapon"}, {id = "fen_antitoxin", name = "Fen Antitoxin", desc_short = "a small vial of milky liquid", desc_long = "A glass vial sealed with wax. The label (still legible under a protective coating) reads: BLACKFEN ANTITOXIN — DOSE FOR STANDARD FEN AILMENTS. GRIMWICK'S REMEDY. NO SUBSTITUTE.", weight = 0}, {id = "redvange_arrowheads", name = "Redvange Arrowheads", desc_short = "barbed reed-heads prized by fletchers", desc_long = "A bundle of dried redvange reed-tips, their barbs sharp as any metal point. Fletchers value these for how easily they take enchantment — a set of arrows fitted with redvange heads holds magic longer than iron. Worth good coin.", weight = 1}]
