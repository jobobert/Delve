# riverlands_confluence/rooms.toml
#
# 10 rooms. Layout (rough):
#
#   [echoing_chamber]
#         |
#   [hidden_stair]
#         |
#   [mural_promenade]
#         |
#   [ferryman_shack] -- [ferrydock_square] -- [market_row] -- [inn_common]
#                              |                                    |
#                         [lower_piers]                        [inn_rooms]
#                              |
#                      [unstable_current]

# ── 1. Ferrydock Square — starting hub ──────────────────────────────────────

[[room]]
id          = "rl_ferrydock_square"
name        = "Ferrydock Square"
description = "A broad wooden platform where several ferries once departed in steady rhythm. Lantern posts lean at odd angles, their glass cracked by subtle tremors in the air. Ropes creak, boats knock against the pilings, and a faded mural of six interlocking circles is painted on the stone embankment to the north."
flags       = ["town", "no_combat"]
start       = true
exits       = { north = "rl_mural_promenade", east = "rl_market_row", south = "rl_lower_piers", west = "rl_ferryman_shack" }
spawns      = ["kale_ferryman", "sela_mapmaker", "river_child"]
items       = ["mural_inscription_fragment"]

on_enter = [
  { op = "if_not_flag", flag = "rl_intro_seen", then = [
    { op = "message", tag = "system", text = "The rivers feel wrong here — like they are listening." },
    { op = "set_flag", flag = "rl_intro_seen" },
    { op = "advance_quest", quest_id = "rivers_remember", step = 1 },
  ] },
]

# ── 2. Mural Promenade — perception gate ────────────────────────────────────

[[room]]
id          = "rl_mural_promenade"
name        = "Mural Promenade"
description = "A stone walkway overlooking the confluence, dominated by a weathered mural of five rivers feeding a central circle, cracked down the middle. The stonework here is unusually regular."
flags       = ["no_combat"]
exits       = { south = "rl_ferrydock_square", north = { to = "rl_hidden_stair", locked = true, lock_tag = "perception_gate", desc = "a faint seam in the stone where steps descend" } }

on_enter = [
  { op = "if_not_flag", flag = "rl_mural_examined", then = [
    { op = "message", tag = "system", text = "The mural shows five rivers feeding a central circle, cracked down the middle." },
    { op = "set_flag", flag = "rl_mural_examined" },
  ] },
  { op = "if_not_flag", flag = "rl_stair_noticed", then = [
    { op = "skill_check", skill = "perception", dc = 12,
      on_pass = [
        { op = "message", tag = "system", text = "Your eye catches a faint seam in the stone — steps, descending north beneath the mural." },
        { op = "set_flag", flag = "rl_stair_noticed" },
        { op = "unlock_exit", room_id = "rl_mural_promenade", direction = "north" },
      ],
      on_fail = [
        { op = "message", tag = "system", text = "The stonework here seems unnaturally regular, but you can't make out anything specific." },
        { op = "skill_grow", skill = "perception", amount = 2 },
      ],
    },
  ] },
]

# ── 3. Hidden Stair — resonance hazard, echo wraiths ────────────────────────

[[room]]
id          = "rl_hidden_stair"
name        = "Hidden Stair"
description = "Narrow stone steps spiral downward, slick with condensation. The air hums with a low resonance that makes your teeth ache. Shapes that might be shadows drift at the edge of the torchlight."
exits       = { up = "rl_mural_promenade", down = "rl_echoing_chamber" }
spawns      = ["echo_wraith"]

on_enter = [
  { op = "if_not_flag", flag = "rl_has_resonant_token", then = [
    { op = "damage", amount = 2, message = "The resonance vibrates painfully through your bones." },
  ] },
  { op = "if_not_flag", flag = "rl_stair_found", then = [
    { op = "message", tag = "system", text = "You have found the hidden stair. The air hums with an old, patient frequency." },
    { op = "set_flag", flag = "rl_stair_found" },
    { op = "advance_quest", quest_id = "rivers_remember", step = 2 },
  ] },
]

# ── 4. Echoing Chamber — inscription, quest completion ──────────────────────

[[room]]
id          = "rl_echoing_chamber"
name        = "Echoing Chamber"
description = "A circular chamber carved into the bedrock, its walls etched with concentric rings that seem to pulse faintly in the dark. The air is still, and every sound returns doubled."
exits       = { up = "rl_hidden_stair" }
items       = ["resonant_token"]

on_enter = [
  { op = "if_not_flag", flag = "rl_echo_lore_seen", then = [
    { op = "message", tag = "system", text = "Faint words shimmer across the stone: 'Five conduits feed the heart. When one falters, all tremble.'" },
    { op = "set_flag", flag = "rl_echo_lore_seen" },
    { op = "advance_quest", quest_id = "rivers_remember", step = 3 },
    { op = "complete_quest", quest_id = "rivers_remember" },
  ] },
]

# ── 5. Market Row — vendors ──────────────────────────────────────────────────

[[room]]
id          = "rl_market_row"
name        = "Market Row"
description = "A line of stalls and awnings, some abandoned, others stubbornly open for trade. The smell of river mud and spiced oil hangs in the air."
flags       = ["town", "no_combat"]
exits       = { west = "rl_ferrydock_square", east = "rl_inn_common" }
spawns      = ["vendor_supplies", "crafter_boatwright"]

# ── 6. Confluence Inn — rest, healing ───────────────────────────────────────

[[room]]
id          = "rl_inn_common"
name        = "Confluence Inn — Common Room"
description = "A warm, low-ceilinged hall where the smell of stew fights the damp river air. Travellers huddle over their bowls, trading rumours in low voices."
flags       = ["town", "healing", "no_combat"]
exits       = { west = "rl_market_row", up = "rl_inn_rooms" }
spawns      = ["innkeeper_mara"]

# ── 7. Inn Rooms — sleep ─────────────────────────────────────────────────────

[[room]]
id          = "rl_inn_rooms"
name        = "Inn Rooms"
description = "A narrow hallway with simple doors on either side. The beds are plain but dry, and the sound of the river is muffled here."
flags       = ["sleep", "no_combat"]
exits       = { down = "rl_inn_common" }

on_sleep = [
  { op = "message", tag = "system", text = "You sleep to the distant murmur of the confluence. For a few hours, the rivers sound almost calm." },
]
on_wake = [
  { op = "message", tag = "system", text = "Morning. The inn creaks around you. Time to move." },
]

# ── 8. Lower Piers — combat zone ────────────────────────────────────────────

[[room]]
id          = "rl_lower_piers"
name        = "Lower Piers"
description = "Rotting planks dip dangerously close to the churning water below. Old mooring rings hang loose, and something moves in the shadows beneath the dock."
exits       = { north = "rl_ferrydock_square", south = "rl_unstable_current" }
spawns      = ["mire_wolf"]
items       = ["driftwood_crate"]

on_enter = [
  { op = "if_not_flag", flag = "rl_piers_warned", then = [
    { op = "message", tag = "system", text = "Someone has carved into a post: 'Do not fall in. The river does not let go.'" },
    { op = "set_flag", flag = "rl_piers_warned" },
  ] },
  { op = "damage", amount = 2, message = "Spray from the churning water stings your skin." },
]

# ── 9. Unstable Current — skill check ───────────────────────────────────────

[[room]]
id          = "rl_unstable_current"
name        = "Unstable Current"
description = "Here the river narrows, its surface folding in on itself in impossible patterns. The planking underfoot flexes with each pulse of the water. Long shapes move just beneath the surface."
exits       = { north = "rl_lower_piers" }
spawns      = ["drift_serpent"]

on_enter = [
  { op = "message", tag = "system", text = "You feel as though the river is trying to pull you somewhere that isn't here." },
  { op = "if_not_flag", flag = "rl_current_read", then = [
    { op = "skill_check", skill = "navigation", dc = 10,
      on_pass = [
        { op = "message", tag = "system", text = "You read the eddies and step where the planks are most stable." },
        { op = "set_flag", flag = "rl_current_read" },
        { op = "skill_grow", skill = "navigation", amount = 3 },
      ],
      on_fail = [
        { op = "damage", amount = 5, message = "You misjudge a step and slam into the railing." },
        { op = "skill_grow", skill = "navigation", amount = 1 },
      ],
    },
  ] },
]

# ── 10. Ferryman's Shack — flavour, lore ────────────────────────────────────

[[room]]
id          = "rl_ferryman_shack"
name        = "Ferryman's Shack"
description = "A weathered wooden shack filled with ropes, charts, and ferry logs going back decades. A corkboard on the wall holds pinned notes: departure times, passenger tallies, tide warnings. One note reads: 'Dragon Peaks route — SUSPENDED until currents stabilise.'"
exits       = { east = "rl_ferrydock_square" }

on_enter = [
  { op = "if_not_flag", flag = "rl_shack_seen", then = [
    { op = "message", tag = "system", text = "The ferry logs on the table show a steady record of crossings — until, abruptly, they stop." },
    { op = "set_flag", flag = "rl_shack_seen" },
  ] },
]

# ── 11. Dragon Peaks Ferry Berth — inter-zone stub (suspended) ───────────────

[[room]]
id          = "rl_ferry_berth_peaks"
name        = "Dragon Peaks Ferry Berth"
description = "A broad stone jetty where the Dragon Peaks ferry once docked. Heavy chains hang loose from iron bollards, and the gangway has been pulled back and lashed down. A hand-lettered board reads: 'ROUTE SUSPENDED — Currents unsafe. No departures until further notice.'"
exits       = { south = "rl_ferrydock_square", north = "dp_approach_1" }

on_enter = [
  { op = "if_not_flag", flag = "rl_berth_seen", then = [
    { op = "message", tag = "system", text = "The jetty is cold and quiet. Whatever life this place had, it left with the last ferry." },
    { op = "set_flag", flag = "rl_berth_seen" },
  ] },
]
