id = "gossip"
lines = ["'Three things on everyone's lips: the ferries stopped running proper, the currents are doing something strange near the lower piers, and someone found an old stair under the mural promenade that no one remembers building.'", {text = "'Old Aldric lost his room key again. I refuse to make him a new one. If you run across it he'd appreciate you bringing it to him upstairs.'", show_if = {not_quest = "rl_locket_return"}}, "'I don't ask too many questions. People drink more when they're unsettled.'"]

