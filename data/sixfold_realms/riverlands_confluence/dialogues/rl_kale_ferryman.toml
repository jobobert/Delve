# -------------------------
# NODE: root
# -------------------------

[[node]]
id = "root"
line = "Kale squints at the currents. 'The rivers are wrong, traveller. They remember things they shouldn't.'"

[[node]]
id = "ask_remember"
line = "'Once, they were calm. Now they bring echoes from the Peaks, the Fens, the Heartwood... even the Gloam.'"
script = [{op = "if_not_flag", flag = "rl_kale_quest_talked", then = [{op = "set_flag", flag = "rl_kale_quest_talked"}], else = []}]

[[node]]
id = "offer_help"
line = "Kale nods slowly. 'Find where the echoes are strongest. The old mural, the hidden stair... they might still sing.'"

[[node]]
id = "dismiss"
line = "Kale shrugs. 'Then mind your footing. The river doesn't care if you believe in it.'"

[[node]]
id = "ask_passage"
line = "'Passage used to be simple. Now the currents twist. Until the echoes calm, I won't risk a full crossing.'"

[[node]]
id = "return_token"
lines = [
  "'Bring me proof and we may be able to negotiate a crossing.'",
  { text = "Kale examines the token. His expression shifts from skepticism to something quieter. 'You went down there. You heard what the river carries.' He tucks the token into his coat. 'I'll take you across when you are ready.'", show_if = {op = "has_flag", flag = "rl_has_resonant_token"} },
]
script = [
  { op = "if_flag", flag = "rl_has_resonant_token", then = [
    { op = "if_not_flag", flag = "rivers_remember_done", then = [
      { op = "take_item", item_id = "resonant_token" },
      { op = "set_flag", flag = "rivers_remember_done" },
      { op = "complete_quest", quest_id = "rivers_remember" },
    ] },
  ] },
]

[[response]]
node = "root"
text = "What do you mean, 'remember'?"
next = "ask_remember"

[[response]]
node = "root"
text = "I just need passage."
next = "ask_passage"

[[response]]
node = "ask_remember"
text = "Is there anything I can do?"
next = "offer_help"

[[response]]
node = "ask_remember"
text = "Sounds like a problem for someone else."
next = "dismiss"

[[response]]
node = "offer_help"
text = "I'll look around the confluence."
next = "return_token"
script = [{op = "advance_quest", quest_id = "rivers_remember", step = 1}]

[[response]]
node = "return_token"
text = "I'll get you that proof."
next = ""

[[response]]
node = "return_token"
text = "I found what you were looking for."
next = ""
show_if = {op = "has_flag", flag = "rl_has_resonant_token"}

[[response]]
node = "dismiss"
text = "..."
next = ""

[[response]]
node = "ask_passage"
text = "Then I'll help calm them."
next = "offer_help"

[[response]]
node = "ask_passage"
text = "I'll find another way."
next = ""
