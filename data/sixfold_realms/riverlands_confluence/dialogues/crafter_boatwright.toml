[[node]]
id    = "root"
lines = [
  "Loran wipes sawdust from his hands. 'Need something built, patched, or floated?'"
]

[[response]]
node = "root"
text = "How’s the ferry holding up?"
next = "ferry_status"

[[response]]
node = "root"
text = "Can you repair small boats?"
next = "repairs"

[[response]]
node = "root"
text = "How do you feel about the world after the Core Chamber?"
next = "epilogue_react"

[[response]]
node = "root"
text = "Nothing right now."
next = ""


# --- Ferry Status ---
[[node]]
id   = "ferry_status"
line = "'Steady as ever. River’s calmer than it looks, long as you respect her moods.'"

[[response]]
node = "ferry_status"
text = "Good to know."
next = ""


# --- Repairs ---
[[node]]
id   = "repairs"
line = "'Aye, I can mend hulls, patch seams, and tune rudders. Bring me the parts and I’ll see it done.'"

[[response]]
node = "repairs"
text = "I’ll keep that in mind."
next = ""


# --- Epilogue Reaction ---
[[node]]
id   = "epilogue_react"
lines = [
  "Loran leans on a beam. 'Hard to miss the change in the air since you came back from the Core.'"
]

[[response]]
node = "epilogue_react"
text = "What change do you mean?"
next = "epilogue_detail"


[[node]]
id   = "epilogue_detail"
line = "'Depends on what you did down there…'"
script = [
  { op = "if_flag", flag = "cc_reboot_restore", then = [
    { op = "say", text = "The currents feel steadier. Folks are hopeful. Even the ferries glide easier." }
  ] },
  { op = "if_flag", flag = "cc_reboot_disable", then = [
    { op = "say", text = "The river’s wilder, but honest. People are nervous, but some say freedom’s worth the uncertainty." }
  ] }
]

[[response]]
node = "epilogue_detail"
text = "Thanks for telling me."
next = ""
