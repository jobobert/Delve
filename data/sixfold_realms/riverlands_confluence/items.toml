# riverlands_confluence/items.toml
#
# Quest/lore:  mural_inscription_fragment, resonant_token
# Scenery:     driftwood_crate
# Consumables: clarity_stew, rl_travel_rations, rl_minor_tonic, rl_antifog_oil
# Equipment:   ferryman_hook (weapon), rl_torch_bundle (offhand), rl_small_pouch (pack)
# Misc:        rl_water_flask, rl_rope_coil, rl_basic_repair_kit

# ── Lore / quest items ───────────────────────────────────────────────────────

[[item]]
id = "mural_inscription_fragment"
name = "Faded Inscription Fragment"
desc_short = "A stone fragment etched with worn words."
desc_long = "Most of the text is eroded, but you can still make out: 'Five conduits feed the heart...'"
weight = 0
scenery = true
respawn = true

[[item]]
id = "resonant_token"
name = "Resonant Token"
desc_short = "A small metal disc that hums faintly in your hand."
desc_long = "Concentric circles are etched into its surface. It seems to vibrate in time with your heartbeat."
slot = "neck"
weight = 0
tags = ["resonant"]
respawn = false
effects = [{type = "stat_bonus", stat = "defense", amount = 2}, {type = "on_equip", message = "The world sharpens, as if coming into tune."}]
on_get = [{op = "message", tag = "item", text = "The token's hum settles into a steady, reassuring rhythm."}, {op = "set_flag", flag = "rl_has_resonant_token"}]

[[item]]
id = "driftwood_crate"
name = "Waterlogged Crate"
desc_short = "A crate half-sunk into the pier planking."
desc_long = "It washed up from somewhere upriver. The lid is warped but might give with effort."
weight = 0
scenery = true
respawn = true
on_get = [{op = "skill_check", skill = "survival", dc = 8, on_pass = [{op = "give_item", item_id = "clarity_stew"}, {op = "message", tag = "item", text = "You pry the crate open and salvage a sealed jar of stew."}], on_fail = [{op = "message", tag = "system", text = "The crate splinters uselessly in your hands."}]}]
type = "misc"

[[item]]
id = "clarity_stew"
name = "Bowl of Clarity Stew"
desc_short = "A steaming bowl of herb-laced stew."
desc_long = "The innkeeper swears it cuts through river fog and swamp mists alike. It restores strength and clears the mind."
weight = 0
respawn = true
tags = ["consumable", "healing"]
effects = [{type = "on_use", heal = 20}]

[[item]]
id = "rl_travel_rations"
name = "Travel Rations"
desc_short = "A bundle of dried meat and hardbread."
desc_long = "Simple but reliable food for long journeys. Keeps well even in humid Riverlands air."
weight = 1
respawn = false
tags = ["consumable", "travel"]
effects = [{type = "on_use", heal = 8}]

[[item]]
id = "rl_minor_tonic"
name = "Minor Tonic"
desc_short = "A mild restorative brew."
desc_long = "A blend of Riverlands herbs that restores a small amount of vitality."
weight = 0
respawn = false
tags = ["consumable", "healing"]
effects = [{type = "on_use", heal = 15}]

[[item]]
id = "rl_antifog_oil"
name = "Antifog Oil"
desc_short = "A pungent oil that sharpens the senses."
desc_long = "Rubbing this beneath the nose helps resist the Mistfen's disorienting spore haze. Clears the spore-touched condition."
weight = 0
respawn = false
tags = ["consumable", "mistfen_resist"]
effects = [{type = "on_use", special = "clear_status_spores"}]

[[item]]
id = "ferryman_hook"
name = "Ferryman's Hook"
desc_short = "A long-handled hook used to pull boats to the dock."
desc_long = "The wood is worn smooth by years of use. The metal tip is etched with tiny concentric circles — a river-mark. It has reach, and the curved tip can catch an off-balance opponent."
slot = "weapon"
weight = 2
weapon_tags = ["polearm", "river"]
respawn = false
effects = [{type = "stat_bonus", stat = "attack", amount = 5}, {type = "on_hit", ability = "stun", chance = 0.1, magnitude = 1}]

[[item]]
id = "rl_torch_bundle"
name = "Torch Bundle"
desc_short = "Three pitch-soaked torches bundled together."
desc_long = "Reliable light sources for caves, ruins, and gloam-touched passages. Hold one ready and the dark retreats."
slot = "offhand"
weight = 1
light_add = 3
respawn = false
tags = ["light_source"]
effects = [{type = "on_equip", message = "The torch sputters, then catches. Light pushes back the dark."}]

[[item]]
id = "rl_small_pouch"
name = "Small Pouch"
desc_short = "A simple leather pouch on a belt loop."
desc_long = "Adds a bit of extra carrying space. Favored by Riverlands traders who keep small goods close to hand."
slot = "pack"
weight = 0
respawn = false
tags = ["container"]
effects = [{type = "stat_bonus", stat = "carry_capacity", amount = 5}]

[[item]]
id = "rl_water_flask"
name = "Water Flask"
desc_short = "A sturdy leather flask."
desc_long = "A refillable flask used by travelers and ferrymen alike. Holds enough water for a day's march."
weight = 1
respawn = false
tags = ["container", "travel"]

[[item]]
id = "rl_rope_coil"
name = "Coil of Rope"
desc_short = "Twenty feet of braided rope."
desc_long = "Strong enough for climbing, ferry mooring, or makeshift repairs."
weight = 1
respawn = false
tags = ["tool", "travel"]

[[item]]
id = "rl_basic_repair_kit"
name = "Basic Repair Kit"
desc_short = "Tools for minor gear repairs."
desc_long = "A small kit containing needles, thread, resin patches, and metal clamps. Useful for restoring worn equipment."
weight = 1
respawn = false
tags = ["tool", "repair"]

# ── Nessa the Realm-Walker — trader exclusives ───────────────────────────────
# One item sourced from each of the six realms. Only available after
# rivers_remember is complete and Nessa's route is active.

[[item]]
id         = "rl_echo_pendant"
name       = "Echo Pendant"
desc_short = "A small disc of river-iron etched with the six-circle mark of the Confluence."
desc_long  = "Those who have heard the Echoing Chamber say the pendant hums with the same tone. It sharpens the senses and steadies the nerves."
slot       = "neck"
weight     = 0
tags       = ["resonant", "trader_exclusive"]
respawn    = false
effects    = [
  { type = "stat_bonus", stat = "defense", amount = 3 },
  { type = "on_equip", message = "The pendant settles at your collarbone. The world feels a little more legible." },
]

[[item]]
id         = "dp_peak_forge_vial"
name       = "Peak-Forge Vial"
desc_short = "A sealed glass vial of dense amber liquid, still warm to the touch."
desc_long  = "Distilled from Dragon Peaks thermal vents by Orun's forge apprentices. The heat inside is sealed by wax stamped with a dragon-claw mark. Drinking it floods the body with sudden warmth — and clears lingering toxins."
weight     = 0
tags       = ["consumable", "healing", "trader_exclusive"]
respawn    = false
effects    = [{ type = "on_use", heal = 40 }]
commands   = [
  { verb = "drink", ops = [
    { op = "heal", amount = 40 },
    { op = "clear_status", effect = "poisoned" },
    { op = "message", tag = "system", text = "Heat rushes through you. The poison burns away." },
    { op = "take_item", item_id = "dp_peak_forge_vial" },
  ]},
]

[[item]]
id         = "gr_twilight_ink"
name       = "Vial of Twilight Ink"
desc_short = "A small glass vial of ink that seems to absorb light rather than reflect it."
desc_long  = "Gathered from the deepest passages of Gloamreach, where twilight becomes something with weight and intention. Drinking it cloaks the body in a pale ward for a short time."
weight     = 0
tags       = ["consumable", "gloam", "trader_exclusive"]
respawn    = false
commands   = [
  { verb = "drink", ops = [
    { op = "apply_status", effect = "protected", duration = 5 },
    { op = "message", tag = "system", text = "The ink is cold and faintly sweet. A pale shimmer settles over you." },
    { op = "take_item", item_id = "gr_twilight_ink" },
  ]},
]

[[item]]
id         = "mf_bog_lens"
name       = "Bog-Glass Lens"
desc_short = "A thick lens ground from Mistfen bog-quartz, mounted in a wire frame."
desc_long  = "Mistfen path-readers use these to navigate the spore haze. The polarised quartz cuts through mist, spore-clouds, and shallow darkness alike. Wearers describe seeing the world with unusual clarity."
slot       = "head"
weight     = 1
light_add  = 2
tags       = ["mistfen_resist", "trader_exclusive"]
respawn    = false
effects    = [
  { type = "stat_bonus", stat = "defense", amount = 1 },
  { type = "on_equip", message = "The fog thins. Edges sharpen. You can see further than you expected." },
]

[[item]]
id         = "mp_spore_silk_sash"
name       = "Spore-Silk Sash"
desc_short = "A wide belt woven from Mycelial Plains spore-silk threads."
desc_long  = "The silk is harvested from the deepest growth nodes of the Mycelial Plains, where fungal threads are drawn into fibres stronger than leather. Worn as a sash, it expands carrying capacity considerably."
slot       = "pack"
weight     = 0
tags       = ["container", "mycelial", "trader_exclusive"]
respawn    = false
effects    = [
  { type = "stat_bonus", stat = "carry_capacity", amount = 8 },
  { type = "on_equip", message = "The sash cinches snugly. Suddenly your pack feels lighter." },
]

[[item]]
id         = "vh_sap_salve"
name       = "Heartwood Sap Salve"
desc_short = "A small clay pot sealed with green wax."
desc_long  = "Pressed from the ancient trees at the deepest heart of the Verdant Heartwood, this salve carries centuries of stored vitality. Applying it closes wounds rapidly. Healers in the Heartwood treat it with reverence."
weight     = 0
tags       = ["consumable", "healing", "verdant", "trader_exclusive"]
respawn    = false
effects    = [{ type = "on_use", heal = 50 }]

[[item]]
id = "rl_locket"
name = "Locket"
type = "misc"
description = ""

[[item]]
id = "rl_guest_room_key"
name = "Guest Room Key"
type = "misc"
description = "A well-used, but functional room key for the Confluence Inn"
desc_short = "A well-used, but functional room key for the Confluence Inn"
desc_long = "The key was made with care, but that was a long time ago. There is no way to know how many copies are in the world"
tags    = ["guest_room_key"]
