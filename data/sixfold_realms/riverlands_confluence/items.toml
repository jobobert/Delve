[[item]]
id          = "mural_inscription_fragment"
name        = "Faded Inscription Fragment"
desc_short  = "A fragment of text beneath the mural."
desc_long   = "Most of the words are worn away, but you can still make out: 'Five conduits feed the heart...'"
slot        = ""
weight      = 0
scenery     = true
respawn     = true

[[item]]
id          = "resonant_token"
name        = "Resonant Token"
desc_short  = "A small metal disc that hums faintly in your hand."
desc_long   = "Concentric circles are etched into its surface. It seems to vibrate in time with your heartbeat."
slot        = "neck"
weight      = 0
tags        = ["resonant"]
respawn     = false
effects     = [
  { type = "stat_bonus", stat = "perception", amount = 3 },
  { type = "on_equip", message = "The world sharpens, as if coming into tune." },
]
on_get = [
  { op = "message", tag = "item", text = "The token's hum settles into a steady, reassuring rhythm." },
  { op = "set_flag", flag = "rl_has_resonant_token" },
]

[[item]]
id          = "clarity_stew"
name        = "Bowl of Clarity Stew"
desc_short  = "A steaming bowl of herb-laced stew."
desc_long   = "The innkeeper swears it 'cuts through river fog and swamp mists alike.'"
slot        = ""
weight      = 0
respawn     = true
effects     = [
  { type = "on_use", heal = 20, message = "Warmth spreads through you, and your thoughts feel a little clearer." },
]

[[item]]
id          = "ferryman_hook"
name        = "Ferryman's Hook"
desc_short  = "A long-handled hook used to pull boats to the dock."
desc_long   = "The wood is worn smooth by years of use. The metal tip is etched with tiny circles."
slot        = "weapon"
weight      = 2
weapon_tags = ["polearm", "river"]
respawn     = false
effects     = [
  { type = "stat_bonus", stat = "attack", amount = 5 },
  { type = "on_hit", ability = "bleed", chance = 0.15, magnitude = 2 },
]

[[item]]
id          = "driftwood_crate"
name        = "Waterlogged Crate"
desc_short  = "A crate half-sunk into the pier."
desc_long   = "It looks like it washed up from somewhere upriver."
slot        = ""
scenery     = true
respawn     = true
on_get      = [
  { op = "skill_check", skill = "survival", dc = 8,
    on_pass = [
      { op = "give_item", item_id = "clarity_stew" },
      { op = "message", tag = "item", text = "You pry the crate open and salvage a sealed jar of stew." },
    ],
    on_fail = [
      { op = "message", tag = "system", text = "The crate splinters uselessly in your hands." },
    ],
  },
]

