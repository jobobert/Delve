# riverlands_confluence/items.toml
#
# Quest/lore:  mural_inscription_fragment, resonant_token
# Scenery:     driftwood_crate
# Consumables: clarity_stew, rl_travel_rations, rl_minor_tonic, rl_antifog_oil
# Equipment:   ferryman_hook (weapon), rl_torch_bundle (offhand), rl_small_pouch (pack)
# Misc:        rl_water_flask, rl_rope_coil, rl_basic_repair_kit

# ── Lore / quest items ───────────────────────────────────────────────────────

[[item]]
id = "mural_inscription_fragment"
name = "Faded Inscription Fragment"
desc_short = "A stone fragment etched with worn words."
desc_long = "Most of the text is eroded, but you can still make out: 'Five conduits feed the heart...'"
weight = 0
scenery = true
respawn = true

[[item]]
id = "resonant_token"
name = "Resonant Token"
desc_short = "A small metal disc that hums faintly in your hand."
desc_long = "Concentric circles are etched into its surface. It seems to vibrate in time with your heartbeat."
slot = "neck"
weight = 0
tags = ["resonant"]
respawn = false
effects = [{type = "stat_bonus", stat = "defense", amount = 2}, {type = "on_equip", message = "The world sharpens, as if coming into tune."}]
on_get = [{op = "message", tag = "item", text = "The token's hum settles into a steady, reassuring rhythm."}, {op = "set_flag", flag = "rl_has_resonant_token"}]

[[item]]
id = "driftwood_crate"
name = "Waterlogged Crate"
desc_short = "A crate half-sunk into the pier planking."
desc_long = "It washed up from somewhere upriver. The lid is warped but might give with effort."
slot = "head"
weight = 0
scenery = true
respawn = true
on_get = [{op = "skill_check", skill = "survival", dc = 8, on_pass = [{op = "give_item", item_id = "clarity_stew"}, {op = "message", tag = "item", text = "You pry the crate open and salvage a sealed jar of stew."}], on_fail = [{op = "message", tag = "system", text = "The crate splinters uselessly in your hands."}]}]
type = "weapon"

[[item]]
id = "clarity_stew"
name = "Bowl of Clarity Stew"
desc_short = "A steaming bowl of herb-laced stew."
desc_long = "The innkeeper swears it cuts through river fog and swamp mists alike. It restores strength and clears the mind."
weight = 0
respawn = true
tags = ["consumable", "healing"]
effects = [{type = "on_use", heal = 20}]

[[item]]
id = "rl_travel_rations"
name = "Travel Rations"
desc_short = "A bundle of dried meat and hardbread."
desc_long = "Simple but reliable food for long journeys. Keeps well even in humid Riverlands air."
weight = 1
respawn = false
tags = ["consumable", "travel"]
effects = [{type = "on_use", heal = 8}]

[[item]]
id = "rl_minor_tonic"
name = "Minor Tonic"
desc_short = "A mild restorative brew."
desc_long = "A blend of Riverlands herbs that restores a small amount of vitality."
weight = 0
respawn = false
tags = ["consumable", "healing"]
effects = [{type = "on_use", heal = 15}]

[[item]]
id = "rl_antifog_oil"
name = "Antifog Oil"
desc_short = "A pungent oil that sharpens the senses."
desc_long = "Rubbing this beneath the nose helps resist the Mistfen's disorienting spore haze. Clears the spore-touched condition."
weight = 0
respawn = false
tags = ["consumable", "mistfen_resist"]
effects = [{type = "on_use", special = "clear_status_spores"}]

[[item]]
id = "ferryman_hook"
name = "Ferryman's Hook"
desc_short = "A long-handled hook used to pull boats to the dock."
desc_long = "The wood is worn smooth by years of use. The metal tip is etched with tiny concentric circles — a river-mark. It has reach, and the curved tip can catch an off-balance opponent."
slot = "weapon"
weight = 2
weapon_tags = ["polearm", "river"]
respawn = false
effects = [{type = "stat_bonus", stat = "attack", amount = 5}, {type = "on_hit", ability = "stun", chance = 0.1, magnitude = 1}]

[[item]]
id = "rl_torch_bundle"
name = "Torch Bundle"
desc_short = "Three pitch-soaked torches bundled together."
desc_long = "Reliable light sources for caves, ruins, and gloam-touched passages. Hold one ready and the dark retreats."
slot = "offhand"
weight = 1
light_add = 3
respawn = false
tags = ["light_source"]
effects = [{type = "on_equip", message = "The torch sputters, then catches. Light pushes back the dark."}]

[[item]]
id = "rl_small_pouch"
name = "Small Pouch"
desc_short = "A simple leather pouch on a belt loop."
desc_long = "Adds a bit of extra carrying space. Favored by Riverlands traders who keep small goods close to hand."
slot = "pack"
weight = 0
respawn = false
tags = ["container"]
effects = [{type = "stat_bonus", stat = "carry_capacity", amount = 5}]

[[item]]
id = "rl_water_flask"
name = "Water Flask"
desc_short = "A sturdy leather flask."
desc_long = "A refillable flask used by travelers and ferrymen alike. Holds enough water for a day's march."
weight = 1
respawn = false
tags = ["container", "travel"]

[[item]]
id = "rl_rope_coil"
name = "Coil of Rope"
desc_short = "Twenty feet of braided rope."
desc_long = "Strong enough for climbing, ferry mooring, or makeshift repairs."
weight = 1
respawn = false
tags = ["tool", "travel"]

[[item]]
id = "rl_basic_repair_kit"
name = "Basic Repair Kit"
desc_short = "Tools for minor gear repairs."
desc_long = "A small kit containing needles, thread, resin patches, and metal clamps. Useful for restoring worn equipment."
weight = 1
respawn = false
tags = ["tool", "repair"]
