name = "Stallkeeper Brann"
desc_short = "A stocky merchant arranging goods with practiced efficiency."
desc_long = "Brann's stall holds ropes, hooks, and jars labeled in a neat hand. He nods when you approach, no words wasted."
tags = ["humanoid", "townsfolk"]
style = "flowcurrent"
style_prof = 15
hp = 35
max_hp = 35
attack = 6
defense = 5
xp_reward = 0
gold_reward = 0
hostile = false
shop = [{item_id = "clarity_stew", price = 8}, {item_id = "ferryman_hook", price = 25}, {item_id = "rl_travel_rations", price = 5}, {item_id = "rl_water_flask", price = 3}, {item_id = "rl_torch_bundle", price = 4}, {item_id = "rl_rope_coil", price = 6}, {item_id = "rl_basic_repair_kit", price = 8}, {item_id = "rl_small_pouch", price = 2}, {item_id = "rl_minor_tonic", price = 6}, {item_id = "rl_antifog_oil", price = 7}]

[[npc]]
id = "rl_innkeeper_mara"
name = "Innkeeper Mara"
desc_short = "A broad-shouldered woman with tired eyes and a ready smile."
desc_long = "Mara moves with the efficiency of someone who has kept this place running through worse than bad weather. A set of keys hangs at her belt."
tags = ["humanoid", "townsfolk"]
style = "flowcurrent"
style_prof = 20
hp = 45
max_hp = 45
attack = 7
defense = 7
xp_reward = 0
gold_reward = 0
hostile = false
