style       = "flowcurrent"
style_prof  = 10
hp          = 30
max_hp      = 30
attack      = 4
defense     = 3
xp_reward   = 0
gold_reward = 0
hostile     = false

# ── Nessa the Realm-Walker — traveling trader ────────────────────────────────
# Starts in rl_market_row. Inactive until rivers_remember is completed,
# then routed through all six realms by the "nessa_realm_route" process.

[[npc]]
id          = "nessa_realm_walker"
name        = "Nessa the Realm-Walker"
desc_short  = "A road-worn trader whose pack is covered in pins and tokens from distant places."
desc_long   = "Nessa's coat is stitched with patches from every zone she has passed through — Peaks wax, Gloam-shadow, Heartwood bark, Mistfen quartz. She moves like someone who has made peace with being always in transit."
tags        = ["humanoid", "townsfolk", "trader"]
style       = "flowcurrent"
style_prof  = 20
hp          = 35
max_hp      = 35
attack      = 6
defense     = 6
xp_reward   = 0
gold_reward = 0
hostile     = false

shop = [
  { item_id = "rl_echo_pendant",    price = 55 },
  { item_id = "dp_peak_forge_vial", price = 30 },
  { item_id = "gr_twilight_ink",    price = 25 },
  { item_id = "mf_bog_lens",        price = 45 },
  { item_id = "mp_spore_silk_sash", price = 50 },
  { item_id = "vh_sap_salve",       price = 35 },
]

# ── ENEMIES ──────────────────────────────────────────────────────────────────

# Mire Wolf — spawns at lower piers. Riverlands scavenger drawn to the dock
# refuse. Fast and aggressive, but fragile. Flowcurrent players handle it well.

[[npc]]
id          = "mire_wolf"
name        = "Mire Wolf"
desc_short  = "A lean, river-damp wolf that has learned to stalk the docks."
desc_long   = "Its grey coat is slick with spray, its eyes pale and calculating. It circles wide before committing, watching for an opening."
tags        = ["beast", "fast"]
style       = "flowcurrent"
style_prof  = 20
hp          = 28
max_hp      = 28
attack      = 8
defense     = 3
xp_reward   = 18
gold_reward = 0
hostile     = true
respawn     = true
respawn_time = 5

kill_script = [
  { op = "message", tag = "combat_death", text = "The mire wolf slumps and slides off the pier edge into the churning water below." },
]

# Drift Serpent — spawns at unstable current. An eel-like creature native to
# the confluence's chaotic waters. Attacks with a numbing toxin.

[[npc]]
id          = "drift_serpent"
name        = "Drift Serpent"
desc_short  = "A long, pale serpent that rides the impossible currents beneath the planking."
desc_long   = "It moves like liquid, like the river itself shaped into something with intent. Its bite carries a faint numbing cold."
tags        = ["beast", "fast", "small"]
style       = "flowcurrent"
style_prof  = 25
hp          = 22
max_hp      = 22
attack      = 9
defense     = 4
xp_reward   = 20
gold_reward = 0
hostile     = true
respawn     = true
respawn_time = 5

kill_script = [
  { op = "message", tag = "combat_death", text = "The drift serpent unravels and is carried away by the current." },
]

round_script = [
  { op = "if_combat_round", min = 2, then = [
    { op = "if_npc_hp", max = 15, then = [
      { op = "apply_status", effect = "poisoned", duration = 3 },
      { op = "message", tag = "combat", text = "The serpent's bite carries a cold sting — poison seeps in." },
    ] },
  ] },
]

# Echo Wraith — spawns on the hidden stair. A resonance entity born from
# centuries of accumulated harmonic energy in the bedrock. Semi-translucent,
# cold to the touch, and disorienting to fight.

[[npc]]
id          = "echo_wraith"
name        = "Echo Wraith"
desc_short  = "A translucent shape that ripples like a reflection on disturbed water."
desc_long   = "Not quite solid, not quite absent. It moves with eerie patience, its form shifting between the shadow of a person and the shape of something older."
tags        = ["undead", "fast", "small"]
style       = "flowcurrent"
style_prof  = 35
hp          = 38
max_hp      = 38
attack      = 11
defense     = 6
xp_reward   = 30
gold_reward = 0
hostile     = true
respawn     = true
respawn_time = 8

kill_script = [
  { op = "message", tag = "combat_death", text = "The echo wraith disperses into a scatter of dying harmonics, leaving nothing behind but a faint ringing in your ears." },
]

round_script = [
  { op = "if_combat_round", min = 3, then = [
    { op = "apply_status", effect = "confused", duration = 2 },
    { op = "message", tag = "combat", text = "The wraith's presence blurs your senses — the world goes sideways for a moment." },
  ] },
]

[[npc]]
id          = "rl_banker"
name        = "Bank-Broker Sian"
tags        = ["humanoid", "banker"]
style       = "brawling"
style_prof  = 3
desc_short  = "A sharp-eyed broker behind a lacquered counter, quill ever-ready."
desc_long   = "The Riverlands Confluence once hosted three competing banks. The floods took two; Sian runs what remains, serving merchants, ferryers, and adventurers alike. She knows every mark by the sound it makes on the counter."
hp          = 20
max_hp      = 20
attack      = 2
defense     = 2
xp_reward   = 0
gold_reward = 0
hostile     = false
dialogue    = "Welcome to the Confluence Branch. Deposit, withdraw, or check your balance."
