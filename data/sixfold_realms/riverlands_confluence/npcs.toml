# riverlands_confluence/npcs.toml
#
# Friendly NPCs: kale_ferryman, sela_mapmaker, vendor_supplies,
#                innkeeper_mara, river_child, crafter_boatwright
# Enemies:       mire_wolf, drift_serpent, echo_wraith

# ── Ferryman Kale — quest giver, lore ───────────────────────────────────────

[[npc]]
id          = "kale_ferryman"
name        = "Ferryman Kale"
desc_short  = "A weathered ferryman with river lines etched into his face."
desc_long   = "Kale's eyes track the currents more than the people, as if listening to something only he can hear. His hands are rope-calloused, his boots permanently waterlogged."
tags        = ["humanoid", "townsfolk"]
style       = "flowcurrent"
style_prof  = 30
hp          = 40
max_hp      = 40
attack      = 8
defense     = 6
xp_reward   = 0
gold_reward = 0
hostile     = false

give_accepts = [
  {
    item_id = "resonant_token",
    message = "Kale turns the token over in his hand, listening. 'So the echoes have found you too.'",
    script  = [
      { op = "set_flag",  flag = "rl_kale_trusts_you" },
      { op = "prestige",  amount = 5, reason = "shared a relic of the old rivers" },
      { op = "give_gold", amount = 10 },
    ],
  },
]

# ── Mapmaker Sela — shop, lore ───────────────────────────────────────────────

[[npc]]
id          = "sela_mapmaker"
name        = "Mapmaker Sela"
desc_short  = "A sharp-eyed cartographer surrounded by half-finished maps."
desc_long   = "Lines of ink crisscross her table, some crossed out, others circled with frustration. She glances at you without pausing her work."
tags        = ["humanoid", "townsfolk"]
style       = "flowcurrent"
style_prof  = 10
hp          = 30
max_hp      = 30
attack      = 5
defense     = 4
xp_reward   = 0
gold_reward = 0
hostile     = false

shop = [
  { item_id = "clarity_stew",   price = 6 },
  { item_id = "resonant_token", price = 40 },
]

kill_script = [
  { op = "message", tag = "system", text = "As Sela falls, her ink spills across the maps like a spreading river." },
  { op = "set_flag", flag = "rl_sela_dead" },
]

