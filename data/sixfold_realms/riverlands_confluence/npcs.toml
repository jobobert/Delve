# Ferryman Kale — quest giver, lore, style teacher later
[[npc]]
id          = "kale_ferryman"
name        = "Ferryman Kale"
desc_short  = "A weathered ferryman with river lines etched into his face."
desc_long   = "Kale's eyes track the currents more than the people, as if listening to something only he can hear."
tags        = ["humanoid", "prestige_neutral"]
style       = "brawling"
style_prof  = 30
hp          = 40
max_hp      = 40
attack      = 8
defense     = 6
xp_reward   = 20
gold_reward = 5
hostile     = false
dialogue    = "The rivers remember more than we do, traveller."

give_accepts = [
  {
    item_id = "resonant_token",
    message = "Kale turns the token over in his hand, listening. 'So the echoes have found you too.'",
    script  = [
      { op = "set_flag", flag = "rl_kale_trusts_you" },
      { op = "prestige", amount = 5, reason = "shared a relic of the old rivers" },
      { op = "give_gold", amount = 10 },
      { op = "advance_quest", quest_id = "rivers_remember", step = 2 },
    ],
  },
]

