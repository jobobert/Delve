# ── River Child — flavour ────────────────────────────────────────────────────

[[npc]]
id          = "river_child"
name        = "River Child"
desc_short  = "A barefoot child tossing pebbles into the water."
desc_long   = "They watch the ripples with intense concentration, as if expecting an answer. When they notice you watching, they don't flinch."
tags        = ["humanoid", "small", "townsfolk"]
style       = "flowcurrent"
style_prof  = 5
hp          = 20
max_hp      = 20
attack      = 2
defense     = 2
xp_reward   = 0
gold_reward = 0
hostile     = false
dialogue    = "Sometimes the river whispers names. Sometimes it forgets them."

# ── Loran the Boatwright — crafting, lore ───────────────────────────────────

[[npc]]
id          = "crafter_boatwright"
name        = "Loran the Boatwright"
desc_short  = "A skilled craftsman who builds and repairs river vessels."
desc_long   = "Loran has spent decades shaping hulls and patching ferries. His hands are calloused, and his eyes are sharp with experience."
