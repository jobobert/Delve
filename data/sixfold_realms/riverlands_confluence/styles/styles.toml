# riverlands_confluence/styles/styles.toml
#
# Flowcurrent — the Riverlands' native fighting discipline.
# A fluid, adaptive style that matches an opponent's rhythm and redirects
# their force rather than meeting it head-on. Practised by ferrymen, river
# scouts, and travellers who learned that the current is never truly stopped —
# only guided.
#
# Passive chain:
#   25  sidestep     — slip aside, negating a blow entirely (defend)
#   50  redirect     — when sidestepping, guide their momentum into a counter-strike (defend, requires sidestep)
#   75  current_flow — flowing offensive strike that amplifies damage (attack)

[[style]]
id                = "flowcurrent"
name              = "Flowcurrent"
desc_short        = "Fluid river-fighting. Redirects force, excels against fast opponents."
desc_long         = "Flowcurrent treats every fight like navigating a rapid — you read the current, yield where you must, and strike where the water finds its own path. Developed by Riverlands ferrymen and scouts, it works best against fast, mobile opponents whose momentum can be turned against them. Armoured or sluggish foes resist its redirection entirely."
strong_vs         = ["fast", "humanoid", "beast"]
weak_vs           = ["armored", "large", "slow"]
strong_multiplier = 1.35
weak_multiplier   = 0.75
attack_bonus      = 0
defense_bonus     = 2
difficulty        = 1.5
preferred_weapon_tags = ["staff", "light_blade", "fist"]
preferred_armor_tags  = ["cloth", "leather"]
weapon_bonus      = 0.20
armor_bonus       = 0.15
learned_from      = ""
learned_at        = 0
passives = [
  { ability = "sidestep",     threshold = 25, trigger = "defend",                       chance = 0.15, message = "You slip aside, letting the blow pass through empty air.", on_activate = [{op = "block_damage"}] },
  { ability = "redirect",     threshold = 50, trigger = "defend", requires = "sidestep", chance = 0.40, message = "You guide their momentum — and send it right back.",         on_activate = [{op = "counter_damage", multiplier = 0.5}] },
  { ability = "current_flow", threshold = 75, trigger = "attack",                        chance = 0.12, message = "You strike in one unbroken motion — impossible to brace against.", on_activate = [{op = "multiply_damage", multiplier = 1.5}] },
]
