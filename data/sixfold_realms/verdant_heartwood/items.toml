# ---------------------------------------------------------
# SCENERY / INTERACTIVE ITEMS
# ---------------------------------------------------------

[[item]]
id          = "vh_memory_root_cluster"
name        = "Memory Root Cluster"
desc_short  = "A tangle of roots that hum with stored impressions."
desc_long   = "Touching the roots triggers faint echoes of past events. Some reveal hidden paths."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
on_get      = [
  { op = "message", tag = "dialogue", text = "A whisper brushes your mind: 'The true path bends east...'" },
  { op = "if_not_flag", flag = "vh_true_path", then = [
    { op = "set_flag", flag = "vh_true_path" },
    { op = "advance_quest", quest_id = "vh_growth_regulator", step = 1 },
  ], else = [
    { op = "set_flag", flag = "vh_true_path" },
  ] },
]

[[item]]
id          = "vh_fallen_log"
name        = "Fallen Log"
desc_short  = "A heavy log blocking the path."
desc_long   = "It looks like it could be rolled aside with enough leverage."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
on_get      = [
  { op = "skill_check", skill = "survival", dc = 10,
    on_pass = [
      { op = "message", tag = "system", text = "You heave the log aside." },
      { op = "set_flag", flag = "vh_log_moved" },
    ],
    on_fail = [
      { op = "message", tag = "error", text = "You strain, but the log barely shifts." },
    ],
  },
]

[[item]]
id          = "vh_vine_wall"
name        = "Vine Wall"
desc_short  = "A dense wall of twitching vines."
desc_long   = "The vines react to movement. They might retract if soothed."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
on_get      = [
  { op = "if_item", item_id = "vh_vine_charm", then = [
    { op = "message", tag = "system", text = "The vines relax and pull away from the path." },
    { op = "set_flag", flag = "vh_vines_cleared" },
  ], else = [
    { op = "message", tag = "error", text = "The vines tighten, refusing to move." },
  ] },
]

# Heartwood Tree — bark gathering node
[[item]]
id          = "vh_heartwood_tree"
name        = "Ancient Heartwood Tree"
desc_short  = "A vast tree whose bark pulses faintly with living energy."
desc_long   = "Root-Tenders harvest bark from these trees with care and reverence."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
on_get      = [
  { op = "skill_check", skill = "survival", dc = 8,
    on_pass = [
      { op = "give_item",  item_id = "vh_heartwood_bark" },
      { op = "skill_grow", skill = "survival", amount = 2 },
      { op = "message", tag = "system", text = "You peel a strip of living bark cleanly from the tree." },
      { op = "if_not_flag", flag = "vh_carapace_started", then = [
        { op = "set_flag", flag = "vh_carapace_started" },
        { op = "advance_quest", quest_id = "vh_carapace", step = 1 },
      ] },
    ],
    on_fail = [
      { op = "give_item",  item_id = "vh_heartwood_bark" },
      { op = "message", tag = "system", text = "You take some bark, though the tree resists slightly." },
    ],
  },
]

# Growth Forge — crafting station (scenery; interact via 'commission' command)
[[item]]
id          = "vh_growth_forge"
name        = "Growth Forge"
desc_short  = "A living forge grown from Heartwood roots."
desc_long   = "This organic forge channels heat through living wood, allowing the shaping of bio-alloys and living tools. Its pulse synchronizes with the forest's growth cycle."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
tags        = ["heartwood_structure", "crafting_station"]
on_get      = [
  { op = "message", tag = "system", text = "The forge pulses with slow, rhythmic light. Speak with Thalen to commission work here." },
]


