# Verdant Heartwood — Fighting Styles

[[style]]
id                = "rootbind"
name              = "Rootbind"
desc_short        = "A grounded, symbiotic style that channels living force through the body."
desc_long         = "Rootbind channels the slow strength of root and earth — patience and defensive positioning over speed. Effective against armored or large opponents that rely on sustained pressure. Struggles against quick, evasive foes that never stay still long enough to be held."
strong_vs         = ["armored", "humanoid", "large"]
weak_vs           = ["fast", "flying", "small"]
strong_multiplier = 1.4
weak_multiplier   = 0.70
attack_bonus      = 0
defense_bonus     = 2
difficulty        = 1.3
preferred_weapon_tags = ["staff", "blunt", "two_handed"]
preferred_armor_tags  = ["heavy", "chain"]
weapon_bonus      = 0.20
armor_bonus       = 0.20
learned_from      = "vh_root_tender_lyren"
learned_at        = 2
passives = [
  { ability = "rooted_stance", threshold = 50, trigger = "defend", chance = 0.18, message = "You root yourself into the earth — the blow is absorbed!", on_activate = [{op = "block_damage"}] },
  { ability = "constrict",     threshold = 40, trigger = "attack", chance = 0.15, message = "Living force constricts around your opponent!",            on_activate = [{op = "apply_status", effect = "slowed", duration = 2}] },
]
