# Verdant Heartwood — Fighting Styles

# rootbind: a grounded, symbiotic style native to the Root-Tenders.
# Rewards patience and defensive positioning; effective against armored or large
# opponents that rely on sustained pressure. Weak against quick, evasive foes.
[[style]]
id            = "rootbind"
name          = "Rootbind"
desc          = "A grounded, symbiotic style that channels living force through the body. Rewards patience and defensive positioning."
strong_vs     = ["armored", "humanoid", "large"]
weak_vs       = ["fast", "flying", "small"]
defense_bonus = 2
difficulty    = 1.3
learned_from  = "vh_root_tender_lyren"

[[passive]]
ability   = "rooted_stance"
threshold = 50
trigger   = "defend"
message   = "You root yourself into the earth — the blow is absorbed!"
on_activate = [
  { op = "block_damage" },
]

[[passive]]
ability   = "constrict"
threshold = 40
trigger   = "attack"
message   = "Living force constricts around your opponent!"
on_activate = [
  { op = "apply_status", effect = "slowed", duration = 2 },
]
