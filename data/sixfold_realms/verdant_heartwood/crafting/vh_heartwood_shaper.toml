desc           = "Thalen grows a living armor from Heartwood Bark, Sap Resin, and a Bog-Quartz Heart at the Growth Forge."
slot           = ""
weapon_tags    = []
materials      = ["vh_heartwood_bark", "vh_sap_resin", "mf_quartz_heart"]
