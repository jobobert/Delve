# Commission 1: Grow the Heartwood Carapace (required for vh_carapace quest)
[[commission]]
id             = "vh_grow_carapace"
npc_id         = "vh_heartwood_shaper"
label          = "Grow Heartwood Carapace"
desc           = "Thalen grows a living armor from Heartwood Bark, Sap Resin, and a Bog-Quartz Heart at the Growth Forge."
slot           = "body"
armor_tags     = ["organic", "heartwood", "resonant"]
materials      = ["vh_heartwood_bark", "vh_sap_resin", "mf_quartz_heart"]
turns_required = 15
gold_cost      = 0
weight         = 3
on_complete = [
  { op = "message", tag = "crafting", text = "The forge pulses, weaving bark and resin into a symbiotic armor. 'It is yours,' Thalen says. 'Let it learn you.'" },
  { op = "advance_quest", quest_id = "vh_carapace", step = 2 },
  { op = "advance_quest", quest_id = "vh_carapace", step = 3 },
  { op = "complete_quest", quest_id = "vh_carapace" },
  { op = "prestige", amount = 2, reason = "earned the Heartwood's trust" },
]
qualities = [
  { tier = "poor",        weight = 25, defense_bonus = 4, max_hp_bonus = 4, equip_msg = "The carapace fits unevenly; it is alive but still adjusting.", craft_message = "The growth was unsteady. It will bond in time." },
  { tier = "standard",    weight = 50, defense_bonus = 8, max_hp_bonus = 10, equip_msg = "A symbiotic armor that adapts to its wearer. It pulses with quiet strength." },
  { tier = "exceptional", weight = 25, defense_bonus = 11, max_hp_bonus = 14, name_prefix = "Heartbound ", equip_msg = "The carapace breathes in rhythm with you, amplifying each movement.", craft_message = "The quartz heart fused completely. Perfection." },
]


# Commission 2: Bark Shaping (material refinement for further crafting)
[[commission]]
id             = "vh_bark_shaping"
npc_id         = "vh_heartwood_shaper"
label          = "Bark Shaping"
desc           = "Thalen can shape raw Heartwood Bark using Sap Resin, producing a refined slab."
slot           = ""
weapon_tags    = []
materials      = ["vh_heartwood_bark", "vh_sap_resin"]
turns_required = 8
gold_cost      = 0
on_complete = [
  { op = "message", tag = "crafting", text = "Thalen runs a hand along the bark. It hardens and darkens slightly." },
  { op = "give_item", item_id = "vh_heartwood_bark" },
]
qualities = [
  { tier = "poor",        weight = 25, craft_message = "Rough shaping — the bark is functional but uneven." },
  { tier = "standard",    weight = 50, craft_message = "Clean shaping. The bark's grain is clear and even." },
  { tier = "exceptional", weight = 25, craft_message = "Master shaping. The bark has taken on a subtle inner warmth." },
]


# Commission 3: Shape the Rootbound Stave
[[commission]]
id             = "vh_shape_rootbound_stave"
npc_id         = "vh_heartwood_shaper"
label          = "Shape the Rootbound Stave"
desc           = "Thalen can grow a living stave from Heartwood bark and catalyst — a weapon that roots targets with each strike."
slot           = "weapon"
weapon_tags    = ["polearm", "stave", "heartwood"]
materials      = ["vh_heartwood_bark", "vh_sap_resin", "vh_growth_catalyst"]
turns_required = 15
gold_cost      = 0
weight         = 3
on_complete = [
  { op = "message", tag = "crafting", text = "The forge pulses as Thalen removes the stave. It is still warm, still growing. 'Treat it well,' he says." },
  { op = "advance_quest", quest_id = "vh_rootbound_stave", step = 2 },
  { op = "advance_quest", quest_id = "vh_rootbound_stave", step = 3 },
  { op = "complete_quest", quest_id = "vh_rootbound_stave" },
  { op = "prestige", amount = 3, reason = "shaped the Rootbound Stave with Thalen" },
]
qualities = [
  { tier = "poor",        weight = 20, attack_bonus = 7,  defense_bonus = 2, equip_msg = "The stave is a little unsteady — the growth catalyst didn't fuse evenly.", craft_message = "The catalyst bonded partially. It will still hold." },
  { tier = "standard",    weight = 55, attack_bonus = 10, defense_bonus = 3, equip_msg = "The stave is solid and warm. Each hit releases a pulse of contained growth." },
  { tier = "exceptional", weight = 20, attack_bonus = 12, defense_bonus = 4, name_prefix = "Living ", equip_msg = "Small tendrils extend toward threats when you raise the stave.", craft_message = "The wood is still choosing its final shape. Watch it grow." },
  { tier = "masterwork",  weight = 5,  attack_bonus = 14, defense_bonus = 5, name_prefix = "Masterwork ", equip_msg = "The stave has grown into the shape of your grip. It roots targets completely.", craft_message = "That stave is not a weapon. It is a partnership." },
]
