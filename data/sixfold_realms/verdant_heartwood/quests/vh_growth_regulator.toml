# The Heartwood's Pulse — main zone quest.
#
# Step 1 advanced by the Memory Root Cluster on_get (sets vh_true_path).
# Step 2 advanced by the Core Guardian kill_script.
# Step 3 advanced + quest completed by growth_regulator_fragment on_get.
# Prestige is awarded in growth_regulator_fragment on_get.

id      = "vh_growth_regulator"
title   = "The Heartwood's Pulse"
giver   = "vh_root_tender_lyren"
summary = "The Heartwood Core holds a fragment of the ancient Regulator. To claim it, you must navigate the forest's memories and face its guardian."

[[step]]
index     = 1
objective = "Follow the memory roots to locate the true path into the Warrens."
hint      = "Touch Memory Root Clusters in the Listening Grove and the Echo Chamber."

[[step]]
index     = 2
objective = "Defeat the Heartwood Core Guardian."
hint      = "The guardian waits in the Inner Sanctum."

[[step]]
index     = 3
objective = "Claim the Growth Regulator Fragment."
hint      = "Take the fragment from the pulsing root-heart."

[[reward]]
type   = "xp"
amount = 400

[[reward]]
type   = "gold"
amount = 60
