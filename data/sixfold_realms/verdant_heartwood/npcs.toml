# SYMBIOTIC CREATURES (environmental hazards, semi-hostile)
# ---------------------------------------------------------

[[npc]]
id          = "vh_symbiote"
name        = "Bioluminescent Symbiote"
desc_short  = "A glowing creature fused with fungal growths."
desc_long   = "Its movements are slow but deliberate. Spores drift from its back with every step."
tags        = ["beast", "organic", "sporeborne"]
style       = "rootbind"
style_prof  = 20
hp          = 55
max_hp      = 55
attack      = 12
defense     = 6
xp_reward   = 45
gold_reward = 0
hostile     = true
round_script = [
  { op = "if_combat_round", min = 2, then = [
    { op = "say", text = "The symbiote releases a cloud of spores!" },
    { op = "apply_status", effect = "weakened", duration = 2 },
  ] },
]


