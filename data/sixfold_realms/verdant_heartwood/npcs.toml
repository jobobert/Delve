# ---------------------------------------------------------
# CORE GUARDIAN (boss — tied to Growth Regulator Fragment)
# ---------------------------------------------------------

[[npc]]
id          = "vh_core_guardian"
name        = "Heartwood Core Guardian"
desc_short  = "A towering guardian of bark, sap, and living stone."
desc_long   = "Its chest glows with the pulse of the Heartwood. Roots coil around its limbs like armor."
tags        = ["construct", "armored", "organic"]
style       = "rootbind"
style_prof  = 60
hp          = 160
max_hp      = 160
attack      = 20
defense     = 18
xp_reward   = 200
gold_reward = 0
hostile     = true
dialogue    = "vh_core_guardian"

kill_script = [
  { op = "set_flag",      flag = "vh_core_guardian_slain" },
  { op = "advance_quest", quest_id = "vh_growth_regulator", step = 3 },
  { op = "message", tag = "combat_kill", text = "The guardian collapses, roots withdrawing into the earth." },
]

round_script = [
  # The guardian draws on the forest's strength — weakening the challenger
  { op = "if_combat_round", min = 2, then = [
    { op = "say", text = "The guardian draws strength from the Heartwood!" },
    { op = "apply_status", effect = "weakened", duration = 2 },
  ] },

  # Rootbind constriction — slows your movement
  { op = "if_combat_round", min = 4, then = [
    { op = "say", text = "Roots surge upward, trying to bind you!" },
    { op = "apply_status", effect = "slowed", duration = 2 },
  ] },
]

