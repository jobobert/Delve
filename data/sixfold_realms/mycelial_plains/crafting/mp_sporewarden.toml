# Commission 1: Weave the Sporewarden Mantle (required for mp_mantle quest)
[[commission]]
id             = "mp_weave_mantle"
npc_id         = "mp_sporewarden"
label          = "Weave Sporewarden Mantle"
desc           = "The Sporewarden binds fungal fiber and clarity caps into a mantle that shields the mind from spore exposure."
slot           = "body"
armor_tags     = ["cloth", "light"]
materials      = ["mp_fungal_fiber", "mp_clarity_cap"]
turns_required = 12
gold_cost      = 0
weight         = 1
on_complete = [
  { op = "message", tag = "crafting", text = "The Sporewarden weaves the mantle with slow, deliberate motions. The fibers hum with clarity." },
  { op = "advance_quest", quest_id = "mp_mantle", step = 2 },
  { op = "advance_quest", quest_id = "mp_mantle", step = 3 },
  { op = "complete_quest", quest_id = "mp_mantle" },
  { op = "prestige", amount = 2, reason = "mastered the Plains' cognitive instability" },
]
qualities = [
  { tier = "poor",        weight = 25, defense_bonus = 1, max_hp_bonus = 3, equip_msg = "The weave is loose — spores drift through in places, but it helps.", craft_message = "The fibers resisted the weave. It will hold." },
  { tier = "standard",    weight = 50, defense_bonus = 2, max_hp_bonus = 8, equip_msg = "The mantle resists spore exposure and sharpens your thoughts." },
  { tier = "exceptional", weight = 25, defense_bonus = 4, max_hp_bonus = 12, name_prefix = "Sporewarden ", equip_msg = "Your mind is crystalline within it. The spore fog barely reaches you.", craft_message = "The clarity cap bonded perfectly. Extraordinary weave." },
]


# Commission 2: Brew Clarity Tonic (consumable supply run)
[[commission]]
id             = "mp_brew_clarity"
npc_id         = "mp_sporewarden"
label          = "Brew Clarity Tonic"
desc           = "The Sporewarden distills memory spores and mycelial resin into a potent clarity brew — stronger than what the market sells."
slot           = ""
weapon_tags    = []
materials      = ["mp_memory_spores", "mp_mycelial_resin"]
turns_required = 8
gold_cost      = 0
on_complete = [
  { op = "message", tag = "crafting", text = "The Sporewarden seals a small vial. 'This will hold the worst fog at bay.'" },
  { op = "give_item", item_id = "mp_clarity_brew" },
  { op = "give_item", item_id = "mp_clarity_brew" },
]
qualities = [
  { tier = "poor",        weight = 25, craft_message = "Weak brew — it cleared some fog, but the distillation was off." },
  { tier = "standard",    weight = 50, craft_message = "Clear brew. Two vials, well-sealed." },
  { tier = "exceptional", weight = 25, craft_message = "Potent brew. 'These are my best batch in months,' the Sporewarden notes." },
]


# Commission 3: Weave the Memory Whip
[[commission]]
id             = "mp_weave_memory_whip"
npc_id         = "mp_sporewarden"
label          = "Weave the Memory Whip"
desc           = "The Sporewarden weaves fungal fiber and mycelial resin into a flexible whip that delivers a stunning cognitive jolt on impact."
slot           = "weapon"
weapon_tags    = ["polearm", "whip", "fungal"]
materials      = ["mp_fungal_fiber", "mp_mycelial_resin", "mp_memory_spores"]
turns_required = 14
gold_cost      = 0
weight         = 2
on_complete = [
  { op = "message", tag = "crafting", text = "The Sporewarden coils the finished whip with practiced care. 'Do not use it on yourself,' he says." },
  { op = "advance_quest", quest_id = "mp_memory_whip", step = 2 },
  { op = "advance_quest", quest_id = "mp_memory_whip", step = 3 },
  { op = "complete_quest", quest_id = "mp_memory_whip" },
  { op = "prestige", amount = 3, reason = "wove the Memory Whip with the Sporewarden" },
]
qualities = [
  { tier = "poor",        weight = 20, attack_bonus = 6,  defense_bonus = 1, equip_msg = "The weave is uneven — the stun will be mild and inconsistent.", craft_message = "The memory spores didn't bond evenly. It will still work." },
  { tier = "standard",    weight = 55, attack_bonus = 9,  defense_bonus = 2, equip_msg = "The resin cord holds its shape well. A solid hit will interrupt anything." },
  { tier = "exceptional", weight = 20, attack_bonus = 11, defense_bonus = 3, name_prefix = "Resonant ", equip_msg = "The cord hums faintly. The cognitive jolt carries further than it should.", craft_message = "The memory spores bonded clean. I'm almost proud of it." },
  { tier = "masterwork",  weight = 5,  attack_bonus = 13, defense_bonus = 4, name_prefix = "Masterwork ", equip_msg = "The whip moves like it already knows where to strike. Its stun pulse is immediate and total.", craft_message = "That weapon is smarter than it has any right to be." },
]
