slot           = ""
weapon_tags    = []
materials      = ["mp_memory_spores", "mp_mycelial_resin"]
turns_required = 8
gold_cost      = 0
on_complete = [
  { op = "message", tag = "crafting", text = "The Sporewarden seals a small vial. 'This will hold the worst fog at bay.'" },
