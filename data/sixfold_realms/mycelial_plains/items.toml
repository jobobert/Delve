# ---------------------------------------------------------
# CLARITY & ANTI-SPORE ITEMS
# ---------------------------------------------------------

[[item]]
id          = "mp_clarity_brew"
name        = "Clarity Brew"
desc_short  = "A sharp herbal drink that clears the mind."
desc_long   = "Brewed from clarity caps and bitterroot. Temporarily cuts through the mental fog caused by spores."
slot        = ""
weight      = 0
respawn     = false
gold_value  = 8
on_use      = [
  { op = "adjust_attr", name = "spore_exposure", amount = -20 },
  { op = "message", tag = "system", text = "Your thoughts sharpen as the brew takes effect." },
]

[[item]]
id          = "mp_fungal_mask"
name        = "Fungal Mask"
desc_short  = "A cloth mask treated with anti-spore resin."
desc_long   = "Reduces spore inhalation. Wearing it slows the accumulation of spore exposure in bloom zones."
slot        = "head"
weight      = 0
respawn     = false
gold_value  = 15
tags        = ["cloth"]
effects     = [
  { type = "stat_bonus", stat = "defense", amount = 1 },
]


# ---------------------------------------------------------
# MEMORY INTERACTION TOOLS
# ---------------------------------------------------------

[[item]]
id          = "mp_memory_tuning_fork"
name        = "Memory Tuning Fork"
desc_short  = "A fork that vibrates with cognitive resonance."
desc_long   = "Striking it stabilizes nearby memory nodes and reduces drift."
slot        = ""
weight      = 0
respawn     = false
gold_value  = 15
on_use      = [
  { op = "set_flag",      flag = "mp_memory_stabilized" },
  { op = "if_quest", quest_id = "mp_fragment", step = 1, then = [
    { op = "advance_quest", quest_id = "mp_fragment", step = 2 },
  ] },
  { op = "message", tag = "system", text = "The tuning fork hums, anchoring your thoughts." },
]

[[item]]
id          = "mp_spore_lens"
name        = "Spore Lens"
desc_short  = "A lens that reveals hidden fungal inscriptions."
desc_long   = "Used to read memory spores embedded in ancient structures."
slot        = ""
weight      = 0
respawn     = false
gold_value  = 10
tags        = ["memory_tool"]


# ---------------------------------------------------------
# GATHERING NODES (scenery)
# ---------------------------------------------------------

[[item]]
id          = "mp_fungal_cluster"
name        = "Fungal Cluster"
desc_short  = "A dense cluster of fibrous mushroom stalks."
desc_long   = "The stalks can be stripped of their long, durable fibers. Useful in weaving and rope work."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
on_get      = [
  { op = "skill_check", skill = "survival", dc = 8,
    on_pass = [
      { op = "give_item",  item_id = "mp_fungal_fiber" },
      { op = "skill_grow", skill = "survival", amount = 2 },
      { op = "message", tag = "system", text = "You strip several long fibers from the cluster." },
      { op = "if_not_flag", flag = "mp_mantle_started", then = [
        { op = "set_flag", flag = "mp_mantle_started" },
        { op = "advance_quest", quest_id = "mp_mantle", step = 1 },
      ] },
    ],
    on_fail = [
      { op = "give_item",  item_id = "mp_fungal_fiber" },
      { op = "message", tag = "system", text = "You manage to pull a few fibers free, though the cluster resists." },
    ],
  },
]

[[item]]
id          = "mp_clarity_grove_node"
name        = "Clarity Cap Grove"
desc_short  = "A cluster of pale caps growing in clean air."
desc_long   = "These mushrooms grow only where the spore density is low, making them prized by brewers."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
on_get      = [
  { op = "skill_check", skill = "survival", dc = 6,
    on_pass = [
      { op = "give_item",  item_id = "mp_clarity_cap" },
      { op = "skill_grow", skill = "survival", amount = 2 },
      { op = "message", tag = "system", text = "You harvest a fresh clarity cap, its scent sharp and bracing." },
    ],
    on_fail = [
      { op = "give_item",  item_id = "mp_clarity_cap" },
      { op = "message", tag = "system", text = "You pick a clarity cap, bruising it slightly in the process." },
    ],
  },
]

[[item]]
id          = "mp_memory_spore_node"
name        = "Memory Spore Cloud"
desc_short  = "A drifting cloud of shimmering spores near an ancient structure."
desc_long   = "The spores carry encoded fragments of old thoughts. Carefully collected, they can be used in crafting."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
on_get      = [
  { op = "skill_check", skill = "lore", dc = 10,
    on_pass = [
      { op = "give_item",  item_id = "mp_memory_spores" },
      { op = "skill_grow", skill = "lore", amount = 2 },
      { op = "message", tag = "system", text = "You carefully capture a cluster of memory spores." },
    ],
    on_fail = [
      { op = "give_item",  item_id = "mp_memory_spores" },
      { op = "adjust_attr", name = "spore_exposure", amount = 5 },
      { op = "message", tag = "system", text = "You gather the spores, but breathe in more than intended." },
    ],
  },
]


