# ---------------------------------------------------------
# Clarity & Anti-Spore Items
# ---------------------------------------------------------

[[item]]
id          = "mp_clarity_brew"
name        = "Clarity Brew"
desc_short  = "A sharp herbal drink that clears the mind."
desc_long   = "Brewed from clarity caps and bitterroot. Temporarily cuts through the mental fog caused by spores."
slot        = ""
weight      = 0
respawn     = false
on_use      = [
  { op = "add_spores", amount = -20 },
  { op = "message", tag = "system", text = "Your thoughts sharpen as the brew takes effect." }
]

[[item]]
id          = "mp_fungal_mask"
name        = "Fungal Mask"
desc_short  = "A cloth mask treated with anti-spore resin."
desc_long   = "Reduces spore inhalation and helps maintain clarity in dense bloom zones."
slot        = "head"
weight      = 0
respawn     = false
effects     = [
  { type = "status_resist", effect = "spores", amount = 25 }
]


# ---------------------------------------------------------
# Memory Interaction Tools
# ---------------------------------------------------------

[[item]]
id          = "mp_memory_tuning_fork"
name        = "Memory Tuning Fork"
desc_short  = "A fork that vibrates with cognitive resonance."
desc_long   = "Striking it stabilizes nearby memory nodes and reduces drift."
slot        = ""
weight      = 0
respawn     = false
on_use      = [
  { op = "set_flag", flag = "mp_memory_stabilized" },
  { op = "message", tag = "system", text = "The tuning fork hums, anchoring your thoughts." }
]

[[item]]
id          = "mp_spore_lens"
name        = "Spore Lens"
desc_short  = "A lens that reveals hidden fungal inscriptions."
desc_long   = "Used to read memory spores embedded in ancient structures."
slot        = ""
weight      = 0
respawn     = false
tags        = ["memory_tool"]


