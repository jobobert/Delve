# ---------------------------------------------------------
# Signature Armor — Sporewarden Mantle
# ---------------------------------------------------------

[[item]]
id          = "sporewarden_mantle"
name        = "Sporewarden Mantle"
desc_short  = "A mantle woven from fungal fibers and clarity caps."
desc_long   = "It resists spore exposure and sharpens perception, helping its wearer navigate the Plains."
slot        = "chest"
weight      = 1
respawn     = false
armor_tags  = ["cloth", "light"]
effects     = [
  { type = "stat_bonus", stat = "perception", amount = 2 },
  { type = "status_resist", effect = "spores", amount = 30 }
]
