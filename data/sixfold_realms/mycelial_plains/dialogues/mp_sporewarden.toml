[[node]]
id    = "root"
lines = [
  "The Sporewarden’s cloak rustles softly. 'You seek protection from the Plains? Then you must weave clarity into form.'"
]

[[response]]
node = "root"
text = "What materials do you need?"
next = "materials"

[[response]]
node = "root"
text = "I have the materials."
next = "check"

[[response]]
node = "root"
text = "What does the mantle do?"
next = "explain"


# --- Materials ---
[[node]]
id   = "materials"
line = "'Fungal Fiber and Clarity Caps. Bring them, and I will weave the mantle.'"

[[response]]
node = "materials"
text = "I’ll gather them."
next = ""


# --- Check ---
[[node]]
id   = "check"
line = "The Sporewarden examines your materials."
script = [
  { op = "if_item", item_id = "mp_fungal_fiber", then = [
    { op = "if_item", item_id = "mp_clarity_cap", then = [
      { op = "take_item", item_id = "mp_fungal_fiber" },
      { op = "take_item", item_id = "mp_clarity_cap" },
      { op = "give_item", item_id = "sporewarden_mantle" },
      { op = "message", tag = "crafting", text = "The Sporewarden weaves the mantle with practiced grace." },
      { op = "advance_quest", quest_id = "mp_mantle", step = 2 }
    ], else = [
      { op = "message", tag = "error", text = "'You lack the clarity cap.'" }
    ] }
  ], else = [
    { op = "message", tag = "error", text = "'You lack the fungal fiber.'" }
  ] }
]

[[response]]
node = "check"
text = "Thank you."
next = ""


# --- Explain ---
[[node]]
id   = "explain"
line = "'The mantle shields your thoughts. It helps you walk where others forget themselves.'"

[[response]]
node = "explain"
text = "I’ll put it to good use."
next = ""
