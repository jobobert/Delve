[[node]]
id    = "root"
lines = [
  "The Sporewarden's cloak rustles softly. 'You seek protection from the Plains? Then you must weave clarity into form.'"
]

[[response]]
node = "root"
text = "What materials do you need?"
next = "materials"

[[response]]
node = "root"
text = "How do I commission the mantle?"
next = "commission_how"

[[response]]
node = "root"
text = "What does the mantle do?"
next = "explain"


# --- Materials ---
[[node]]
id   = "materials"
line = "'Fungal Fiber and Clarity Caps. Bring them, and I will weave the mantle. Use the commission command when you are ready.'"
script = [
  { op = "advance_quest", quest_id = "mp_mantle", step = 1 },
]

[[response]]
node = "materials"
text = "I'll gather them."
next = ""


# --- Commission How ---
[[node]]
id   = "commission_how"
line = "'Type commission to see what I can make for you. Bring the materials and return when you are ready.'"
script = [
  { op = "if_quest", quest_id = "mp_mantle", step = 1, then = [
    { op = "advance_quest", quest_id = "mp_mantle", step = 2 },
  ] },
]

[[response]]
node = "commission_how"
text = "Understood."
next = ""


# --- Explain ---
[[node]]
id   = "explain"
line = "'The mantle shields your thoughts. It helps you walk where others forget themselves.'"

[[response]]
node = "explain"
text = "I'll put it to good use."
next = ""
