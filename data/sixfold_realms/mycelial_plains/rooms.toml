# =========================================================
# MYCELIAL PLAINS — ROOMS
# =========================================================
# Spore mechanic: adjust_attr name="spore_exposure" tracks mental fog (0-100).
# High spore_exposure gates exits and triggers hazard effects.
# mp_mind_clear flag: set by clarity areas; cleared by bloom areas.
# Use has_flag mp_mind_clear for show_if on spore-gated exits.
# mp_fungal_mask (head slot) halves spore gain: check via if_item in on_enter.
# =========================================================


# ---------------------------------------------------------
# LOOMROOT GATE — entrance town
# ---------------------------------------------------------

[[room]]
id          = "mp_entrance"
name        = "Loomroot Gate"
description = "A wooden gate half-claimed by pale fungus. The air smells faintly sweet. Sporehaven lies ahead."
flags       = ["town"]
npcs        = ["mp_mayor_dellen", "mp_healer_rissa"]
shop        = [
  { item_id = "mp_clarity_brew",        price = 12 },
  { item_id = "mp_fungal_mask",         price = 20 },
  { item_id = "mp_memory_tuning_fork",  price = 18 },
  { item_id = "mp_spore_lens",          price = 14 },
]
exits       = { east = "mp_approach1" }
on_enter    = [
  { op = "message", tag = "system", text = "A faint haze of spores drifts across your vision." },
]


# ---------------------------------------------------------
# APPROACH (1-7)
# ---------------------------------------------------------

[[room]]
id          = "mp_approach1"
name        = "Approach — Fungal Verge"
description = "Grass gives way to patches of soft white growth. Your thoughts feel slightly sluggish."
spawns      = ["mp_sporeling"]
exits       = { west = "mp_entrance", east = "mp_approach2" }
on_enter    = [
  { op = "if_item", item_id = "mp_fungal_mask", then = [
    { op = "adjust_attr", name = "spore_exposure", amount = 1 },
  ], else = [
    { op = "adjust_attr", name = "spore_exposure", amount = 3 },
  ] },
]

[[room]]
id          = "mp_approach2"
name        = "Approach — Drifting Field"
description = "Spores drift like dust motes. A faint ringing echoes in your ears."
spawns      = ["mp_sporeling"]
exits       = { west = "mp_approach1", east = "mp_approach3" }
on_enter    = [
  { op = "if_item", item_id = "mp_fungal_mask", then = [
    { op = "adjust_attr", name = "spore_exposure", amount = 2 },
  ], else = [
    { op = "adjust_attr", name = "spore_exposure", amount = 4 },
  ] },
  { op = "if_attr", name = "spore_exposure", min = 20, then = [
    { op = "apply_status", effect = "confused", duration = 1 },
    { op = "message", tag = "hazard", text = "The spores cloud your thoughts." },
  ] },
]

[[room]]
id          = "mp_approach3"
name        = "Approach — Loomroot Crossing"
description = "A crossroads where fungal fibers hang from old signposts."
exits       = { west = "mp_approach2", north = "mp_approach4", east = "mp_approach5" }

[[room]]
id          = "mp_approach4"
name        = "Approach — Fresh Air Pocket"
description = "A rare breeze clears the spores. The fungal cluster here grows thick with long fibers."
items       = ["mp_fungal_cluster"]
exits       = { south = "mp_approach3" }
on_enter    = [
  { op = "adjust_attr", name = "spore_exposure", amount = -10 },
  { op = "set_flag",    flag = "mp_mind_clear" },
  { op = "message", tag = "system", text = "The air clears your head." },
]

[[room]]
id          = "mp_approach5"
name        = "Approach — Bloom Edge"
description = "The first massive fungal bloom rises ahead, pulsing faintly."
spawns      = ["mp_sporeling", "mp_bloom_beast"]
exits       = { west = "mp_approach3", east = "mp_approach6" }
on_enter    = [
  { op = "if_item", item_id = "mp_fungal_mask", then = [
    { op = "adjust_attr", name = "spore_exposure", amount = 2 },
  ], else = [
    { op = "adjust_attr", name = "spore_exposure", amount = 5 },
  ] },
  { op = "clear_flag", flag = "mp_mind_clear" },
]

[[room]]
id          = "mp_approach6"
name        = "Approach — Memory Drift Path"
description = "The path seems different than you remember. Did that fence always lean?"
exits       = {
  west = "mp_approach5",
  east = { to = "mp_approach7", show_if = { op = "has_flag", flag = "mp_mind_clear" } },
}
on_enter    = [
  { op = "if_item", item_id = "mp_fungal_mask", then = [
    { op = "adjust_attr", name = "spore_exposure", amount = 2 },
  ], else = [
    { op = "adjust_attr", name = "spore_exposure", amount = 4 },
  ] },
  { op = "if_attr", name = "spore_exposure", min = 25, then = [
    { op = "message", tag = "error", text = "Your memory drifts. You lose track of the path ahead." },
  ] },
]

[[room]]
id          = "mp_approach7"
name        = "Approach — Sporehaven Gate"
description = "A wooden archway covered in fungal carvings. The settlement lies ahead."
npcs        = ["mp_memory_wanderer"]
exits       = { west = "mp_approach6", east = "mp_fields1" }


# ---------------------------------------------------------
# SPOREHAVEN FIELDS (8-14)
# ---------------------------------------------------------

[[room]]
id          = "mp_fields1"
name        = "Fields — Sporehaven Outskirts"
description = "Farmhouses stand half-claimed by fungus. Lanterns glow dimly through the haze."
spawns      = ["mp_sporeling"]
exits       = { west = "mp_approach7", east = "mp_fields2" }
on_enter    = [
  { op = "if_item", item_id = "mp_fungal_mask", then = [
    { op = "adjust_attr", name = "spore_exposure", amount = 1 },
  ], else = [
    { op = "adjust_attr", name = "spore_exposure", amount = 3 },
  ] },
]

[[room]]
id          = "mp_fields2"
name        = "Fields — Thick Spore Drift"
description = "Spores swirl in dense clouds. Shapes blur at the edges of your vision."
spawns      = ["mp_bloom_beast", "mp_spore_drifter"]
exits       = { west = "mp_fields1", east = "mp_fields3" }
on_enter    = [
  { op = "if_item", item_id = "mp_fungal_mask", then = [
    { op = "adjust_attr", name = "spore_exposure", amount = 3 },
  ], else = [
    { op = "adjust_attr", name = "spore_exposure", amount = 6 },
  ] },
  { op = "clear_flag", flag = "mp_mind_clear" },
]

[[room]]
id          = "mp_fields3"
name        = "Fields — Memory Echo Lane"
description = "You feel as though you've walked this lane before. The houses seem familiar."
exits       = {
  west = "mp_fields2",
  east = { to = "mp_fields4", show_if = { op = "has_flag", flag = "mp_mind_clear" } },
}
on_enter    = [
  { op = "if_item", item_id = "mp_fungal_mask", then = [
    { op = "adjust_attr", name = "spore_exposure", amount = 2 },
  ], else = [
    { op = "adjust_attr", name = "spore_exposure", amount = 4 },
  ] },
  { op = "if_attr", name = "spore_exposure", min = 30, then = [
    { op = "teleport_player", room_id = "mp_fields2" },
    { op = "message", tag = "error", text = "Your memory loops. You find yourself back where you started." },
  ] },
]

[[room]]
id          = "mp_fields4"
name        = "Fields — Bloom Maze Entrance"
description = "Towering mushrooms form a natural maze. The air is thick with spores."
spawns      = ["mp_spore_drifter"]
exits       = { west = "mp_fields3", north = "mp_maze1" }

[[room]]
id          = "mp_fields5"
name        = "Fields — Loomroot Rise"
description = "A hill overlooking the fungal plains. A cloaked figure tends to fungal growth here."
npcs        = ["mp_sporewarden"]
exits       = { south = "mp_fields4", east = "mp_fields6" }
on_enter    = [
  { op = "adjust_attr", name = "spore_exposure", amount = -5 },
  { op = "set_flag",    flag = "mp_mind_clear" },
  { op = "message", tag = "system", text = "The Sporewarden's presence calms the ambient spore cloud." },
]

[[room]]
id          = "mp_fields6"
name        = "Fields — Clarity Grove"
description = "A grove of tall, spore-resistant trees. The air is clean. Pale clarity caps grow at the roots."
items       = ["mp_clarity_grove_node"]
exits       = { west = "mp_fields5", east = "mp_fields7" }
on_enter    = [
  { op = "adjust_attr", name = "spore_exposure", amount = -15 },
  { op = "set_flag",    flag = "mp_mind_clear" },
  { op = "message", tag = "system", text = "The clean air sharpens your thoughts." },
]

[[room]]
id          = "mp_fields7"
name        = "Fields — Garden Approach"
description = "Ancient stone pillars rise from the fungal earth. A faint hum fills the air."
exits       = { west = "mp_fields6", east = "mp_garden_entrance" }


# ---------------------------------------------------------
# BLOOM MAZE (15-18)
# ---------------------------------------------------------

[[room]]
id          = "mp_maze1"
name        = "Bloom Maze — Outer Ring"
