on_enter    = [
  { op = "adjust_attr", name = "spore_exposure", amount = -10 },
  { op = "set_flag",    flag = "mp_mind_clear" },
  { op = "message", tag = "system", text = "The resonance node stabilizes your thoughts." },
]

[[room]]
id          = "mp_maze4"
name        = "Bloom Maze — Inner Ring"
description = "The maze tightens here. The air is warm and humid. Memory Garden lies beyond."
spawns      = ["mp_spore_drifter", "mp_memory_node_guardian"]
exits       = { west = "mp_maze3", east = "mp_fields7" }
on_enter    = [
  { op = "if_item", item_id = "mp_fungal_mask", then = [
    { op = "adjust_attr", name = "spore_exposure", amount = 2 },
  ], else = [
    { op = "adjust_attr", name = "spore_exposure", amount = 4 },
  ] },
]


# ---------------------------------------------------------
# MEMORY GARDEN (19-24)
# ---------------------------------------------------------

[[room]]
id          = "mp_garden_entrance"
name        = "Memory Garden — Gate"
description = "A massive fungal archway grown around ancient stone. The air vibrates with stored thoughts."
exits       = { west = "mp_fields7", east = "mp_garden1" }
on_enter    = [
  { op = "if_attr", name = "spore_exposure", min = 30, then = [
    { op = "message", tag = "error", text = "Your mind is too clouded to enter the Garden. Find clarity first." },
    { op = "teleport_player", room_id = "mp_fields7" },
  ], else = [
    { op = "message", tag = "quest", text = "The archway hums approvingly as your clear mind crosses the threshold." },
  ] },
]

[[room]]
id          = "mp_garden1"
name        = "Memory Garden — Outer Chamber"
description = "Fungal growth intertwines with ancient machinery. Whispered memories echo faintly."
spawns      = ["mp_memory_node_guardian"]
exits       = { west = "mp_garden_entrance", east = "mp_garden2" }

[[room]]
id          = "mp_garden2"
name        = "Memory Garden — Node Hall"
description = "Rows of fungal memory nodes pulse with stored knowledge."
items       = ["mp_memory_spore_node"]
exits       = { west = "mp_garden1", east = "mp_garden3" }
on_enter    = [
  { op = "adjust_attr", name = "spore_exposure", amount = -5 },
  { op = "set_flag",    flag = "mp_mind_clear" },
]

[[room]]
id          = "mp_garden3"
name        = "Memory Garden — Shifting Archive"
description = "Shelves of fungal growth rearrange themselves when unobserved."
spawns      = ["mp_memory_node_guardian"]
exits       = {
  west = "mp_garden2",
  east = { to = "mp_garden4", show_if = { op = "has_flag", flag = "mp_mind_clear" } },
}
on_enter    = [
  { op = "if_attr", name = "spore_exposure", min = 20, then = [
    { op = "teleport_player", room_id = "mp_garden2" },
    { op = "message", tag = "error", text = "The archive shifts before you can focus. Return when your mind is clear." },
  ] },
]

[[room]]
id          = "mp_garden4"
name        = "Memory Garden — Core Antechamber"
description = "A warm glow radiates from deeper within. The air feels heavy with meaning."
exits       = { west = "mp_garden3", east = "mp_garden5" }

[[room]]
id          = "mp_garden5"
name        = "Memory Garden — Cognitive Core"
description = "A massive fungal heart pulses with ancient knowledge. The Cognitive Core Guardian looms at its center."
spawns      = ["mp_core_guardian"]
exits       = { west = "mp_garden4", east = "mp_garden6" }
on_enter    = [
  { op = "if_not_flag", flag = "mp_core_guardian_slain", then = [
    { op = "message", tag = "combat", text = "The Cognitive Core Guardian turns toward you, its form shifting between shapes." },
  ] },
]

[[room]]
id          = "mp_garden6"
name        = "Memory Garden — Fragment Chamber"
description = "A crystalline fungal node floats in a column of soft light. The Cognitive Regulator Fragment hovers within."
items       = ["cognitive_regulator_fragment"]
exits       = { west = "mp_garden5" }
on_enter    = [
  { op = "if_not_flag", flag = "mp_fragment_seen", then = [
    { op = "message", tag = "quest", text = "The Cognitive Regulator Fragment pulses with stored memories." },
    { op = "set_flag", flag = "mp_fragment_seen" },
  ] },
]
