description = "The corridor bends in ways that feel wrong. Your sense of direction falters."
spawns      = ["mp_spore_drifter"]
exits       = {
  west = "mp_maze1",
  east = { to = "mp_maze3", show_if = { op = "has_flag", flag = "mp_mind_clear" } },
}
on_enter    = [
  { op = "if_item", item_id = "mp_fungal_mask", then = [
    { op = "adjust_attr", name = "spore_exposure", amount = 3 },
  ], else = [
    { op = "adjust_attr", name = "spore_exposure", amount = 5 },
  ] },
  { op = "if_attr", name = "spore_exposure", min = 35, then = [
