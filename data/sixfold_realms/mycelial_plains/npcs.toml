# ---------------------------------------------------------
# COGNITIVE CORE GUARDIAN (boss — tied to Cognitive Regulator Fragment)
# ---------------------------------------------------------

[[npc]]
id          = "mp_core_guardian"
name        = "Cognitive Core Guardian"
desc_short  = "A towering fungal entity pulsing with ancient memory."
desc_long   = "Its form shifts between humanoid and fungal shapes, as if built from half-remembered thoughts."
tags        = ["fungal", "construct", "armored"]
style       = "mindweft"
style_prof  = 60
hp          = 180
max_hp      = 180
attack      = 20
defense     = 14
xp_reward   = 250
gold_reward = 0
hostile     = true
dialogue    = "mp_core_guardian"

kill_script = [
  { op = "set_flag",      flag = "mp_core_guardian_slain" },
  { op = "advance_quest", quest_id = "mp_fragment", step = 2 },
  { op = "message", tag = "combat_kill", text = "The guardian collapses into drifting spores that fade into the air." },
]

round_script = [
  # High spore exposure — guardian exploits clouded mind
  { op = "if_attr", name = "spore_exposure", min = 30, then = [
    { op = "say", text = "Your mind is clouded. You cannot resist." },
    { op = "damage", amount = 8 },
  ] },
  # Clear mind — guardian presses harder at round 4
  { op = "if_attr", name = "spore_exposure", max = 10, then = [
    { op = "if_combat_round", min = 4, then = [
      { op = "say", text = "Clarity burns through the garden's defenses!" },
      { op = "apply_status", effect = "weakened", duration = 2 },
    ] },
  ] },
]
