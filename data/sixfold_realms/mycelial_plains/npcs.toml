[[npc]]
id          = "mp_mayor_dellen"
name        = "Mayor Dellen Farrow"
desc_short  = "A kind but exhausted leader trying to keep Sporehaven functioning."
desc_long   = "Dellen’s eyes are tired, and his thoughts wander mid-sentence. He fights the creeping forgetfulness with stubborn determination."
tags        = ["humanoid", "townsfolk"]
style       = "mindweft"
style_prof  = 10
hp          = 50
max_hp      = 50
attack      = 4
defense     = 4
hostile     = false
xp_reward   = 20
gold_reward = 0
