# Mycelial Plains — Fighting Styles

[[style]]
id                = "mindweft"
name              = "Mindweft"
desc_short        = "A predictive style that weaves intuition and pattern recognition into fluid combat."
desc_long         = "Mindweft practitioners read their opponent's intent before the strike lands. Developed in the spore-saturated awareness of the Mycelial Plains, the style blends intuition and pattern recognition into fluid, anticipatory combat. Strong against methodical, deliberate fighters; weak against erratic beasts whose moves defy prediction."
strong_vs         = ["humanoid", "slow", "armored"]
weak_vs           = ["fast", "beast", "flying"]
strong_multiplier = 1.4
weak_multiplier   = 0.70
attack_bonus      = 0
defense_bonus     = 2
difficulty        = 1.3
preferred_weapon_tags = ["staff", "light", "fist"]
preferred_armor_tags  = ["light", "cloth"]
weapon_bonus      = 0.15
armor_bonus       = 0.15
learned_from      = "mp_sporewarden"
learned_at        = 2
passives = [
  { ability = "anticipate",      threshold = 40, trigger = "defend", chance = 0.15, message = "You read the attack before it lands — stepping clear!",        on_activate = [{op = "skip_npc_attack"}] },
  { ability = "cognitive_flow",  threshold = 65, trigger = "attack", chance = 0.12, message = "Momentum flows through your strike!",                          on_activate = [{op = "multiply_damage", multiplier = 1.5}] },
  { ability = "spore_resonance", threshold = 80, trigger = "defend", chance = 0.10, message = "Fungal awareness floods your senses — you absorb the blow!", on_activate = [{op = "apply_status", effect = "protected", duration = 2}] },
]
