giver   = "mp_sporewarden"
summary = "The Sporewarden can weave a mantle that shields the mind from spores, but only if you gather the right materials."

[[step]]
index     = 1
objective = "Gather Fungal Fiber and a Clarity Cap."
hint      = "Fungal Fiber grows in bloom zones; Clarity Caps grow in cleaner groves."

[[step]]
index     = 2
objective = "Commission the Sporewarden Mantle."
hint      = "The Sporewarden waits near the Loomroot Rise. Use the commission command."

[[step]]
index     = 3
objective = "Collect the finished Sporewarden Mantle."
hint      = "Return to the Sporewarden once the commission is complete."

[[reward]]
type   = "xp"
amount = 300

[[reward]]
type   = "gold"
amount = 50
