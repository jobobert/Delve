# Subregion A — Highspire Approach (Rooms 1–6)

[[room]]
id          = "dp_approach_1"
name        = "Ridge Road"
description = "A narrow path clinging to the mountain, wind biting at your cloak."
coord       = [0,0]
exits       = { east = "dp_approach_2", south = "rl_ferry_berth_peaks" }
flags       = []
on_enter    = [
  { op = "message", tag = "system", text = "The air tastes of iron and distant flame." },
]

[[room]]
id          = "dp_approach_2"
name        = "Windward Ledge"
description = "A ledge with ropes tied to ancient anchors; updrafts buffet anything loose."
coord       = [1,0]
exits       = { west = "dp_approach_1", east = "dp_approach_3", up = "dp_watch_post" }
flags       = ["hazard"]
hazard_damage = 2
hazard_message = "A sudden gust nearly throws you off balance."
on_enter = [
  { op = "skill_check", skill = "perception", dc = 12,
    on_pass = [{ op = "message", tag = "system", text = "You spot a safer line of footing." }],
    on_fail = [{ op = "damage", amount = 3, message = "You stagger as the wind slams into you." }],
  },
]

[[room]]
id          = "dp_approach_3"
name        = "Charred Outcrop"
description = "Blackened rock and a faint trail of scorched feathers."
coord       = [2,0]
exits       = { west = "dp_approach_2", east = "dp_approach_4" }
items       = ["drake_feather_fragment"]
spawns      = ["young_drake_scout"]
flags       = []

[[room]]
id          = "dp_approach_4"
name        = "Miner's Waystation"
description = "A small shelter with racks for tools and a brazier for warming hands."
coord       = [3,0]
exits       = { west = "dp_approach_3", east = "dp_approach_5" }
spawns      = ["miner_apprentice"]
items       = ["rusty_pickaxe_node"]
flags       = ["no_combat"]

[[room]]
id          = "dp_approach_5"
name        = "Resonant Cairn"
description = "Stacked stones hum faintly when the wind passes through them."
