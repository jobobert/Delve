flags       = []

[[room]]
id          = "dp_apex_approach_3"
name        = "Thermal Conduit Gate"
description = "An ancient gate carved with concentric rings; heat pulses from within."
coord       = [17,0]
exits       = {
  west = "dp_apex_approach_2",
  east = {
    to       = "dp_apex_inner_1",
    locked   = true,
    lock_tag = "dp_thermal_gate_lock",
    desc     = "A ringed stone gate sealed by humming sigils.",
  },
}
flags       = []
on_enter = [
  { op = "if_not_flag", flag = "dp_thermal_gate_notice", then = [
    { op = "message", tag = "system", text = "The carved rings in the gate pulse faintly; something holds them closed." },
    { op = "set_flag", flag = "dp_thermal_gate_notice" },
  ] },
  { op = "if_flag", flag = "dp_thermal_gate_unlocked", then = [
    { op = "unlock_exit", room_id = "dp_apex_approach_3", direction = "east" },
    { op = "message", tag = "system", text = "With a grinding sigh the gate's rings slide aside, revealing the path inward." },
    { op = "set_flag", flag = "dp_thermal_gate_opened" },
  ] },
]

