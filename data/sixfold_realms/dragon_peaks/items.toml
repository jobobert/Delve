# Signature Weapon: Sky-Piercer Glaive
[[item]]
id          = "sky_piercer_glaive"
name        = "Sky-Piercer Glaive"
desc_short  = "A long glaive with a blade shaped like a wind-split feather."
desc_long   = "Forged from resonant alloy and drakebone, the Sky-Piercer hums with trapped updrafts. It anchors gliders and sings when struck."
slot        = "weapon"
weight      = 3
tags        = ["polearm", "wind", "draconic"]
weapon_tags = ["polearm", "reach"]
respawn     = false
gold_value  = 450
effects     = [
  { type = "stat_bonus", stat = "attack", amount = 12 },
  { type = "stat_bonus", stat = "defense", amount = 3 },
  { type = "on_equip", message = "The glaive's edge hums and the wind seems to answer." },
  { type = "on_hit", ability = "stun", chance = 0.10, magnitude = 1 },
]

# Mining: Resonant Alloy Vein (scenery node)
[[item]]
id          = "resonant_alloy_ingot_node"
name        = "Resonant Alloy Vein"
desc_short  = "A seam of shimmering alloy embedded in the rock."
desc_long   = "The metal vibrates faintly; miners prize it for its use in ancient machinery."
slot        = ""
scenery     = true
respawn     = true
on_get      = [
  { op = "require_tag", tag = "pickaxe", fail_message = "You need a pickaxe to mine this seam." },
  { op = "skill_check", skill = "crafting", dc = 12,
    on_pass = [
      { op = "give_item", item_id = "resonant_alloy_ingot" },
      { op = "skill_grow", skill = "crafting", amount = 3 },
      { op = "message", tag = "item", text = "You extract a glowing ingot of resonant alloy." },
    ],
    on_fail = [
      { op = "give_item", item_id = "scrap_metal" },
      { op = "message", tag = "system", text = "You chip off a dull scrap of metal." },
    ],
  },
]

