# dragon_peaks/items.toml
#
# Weapons:    sky_piercer_glaive, rusty_pickaxe
# Scenery:    resonant_alloy_ingot_node, dp_raw_ore_node, volcanic_glass_node,
#             drakebone_deposit, rusty_pickaxe_node, resonance_forge_panel,
#             thermal_conductor_piece, drake_egg
# Materials:  resonant_alloy_ingot, dp_raw_ore, volcanic_glass_shard,
#             drakebone_fragment, scrap_metal, drake_scale, drake_feather_fragment,
#             glider_anchor_point, sky_piercer_anchor, drake_hoard_fragment

# ── Signature weapon ─────────────────────────────────────────────────────────

[[item]]
id          = "sky_piercer_glaive"
name        = "Sky-Piercer Glaive"
desc_short  = "A long glaive with a blade shaped like a wind-split feather."
desc_long   = "Forged from resonant alloy and drakebone, the Sky-Piercer hums with trapped updrafts. Balanced for both reach and the weight needed to hold a glider line."
slot        = "weapon"
weight      = 3
weapon_tags = ["polearm", "glaive", "reach"]
respawn     = false
effects     = [
  { type = "stat_bonus", stat = "attack",  amount = 12 },
  { type = "stat_bonus", stat = "defense", amount = 3  },
  { type = "on_equip",   message = "The glaive's edge hums and the wind seems to answer." },
  { type = "on_hit",     ability = "stun", chance = 0.10, magnitude = 1 },
]

# ── Mining tools ──────────────────────────────────────────────────────────────

[[item]]
id          = "rusty_pickaxe_node"
name        = "Rusty Pickaxe"
desc_short  = "An old pickaxe wedged into a rack."
desc_long   = "It looks serviceable enough for light mining."
slot        = ""
scenery     = true
respawn     = true
effects     = []
on_get      = [
  { op = "give_item", item_id = "rusty_pickaxe" },
  { op = "message", tag = "item", text = "You take the rusty pickaxe; it's heavier than it looks." },
]

[[item]]
id          = "rusty_pickaxe"
name        = "Rusty Pickaxe"
desc_short  = "A worn but usable pickaxe."
desc_long   = "It has seen better days, but it can still break rock. Carries the tag that mining nodes require."
slot        = "weapon"
weight      = 3
tags        = ["pickaxe"]
weapon_tags = ["tool", "blunt"]
respawn     = false
effects     = [
  { type = "stat_bonus", stat = "attack", amount = 2 },
]

# ── Mining scenery nodes ──────────────────────────────────────────────────────

[[item]]
id          = "dp_raw_ore_node"
name        = "Rough Ore Seam"
desc_short  = "A seam of unrefined ore running through the stone."
desc_long   = "Low-grade resonant ore, common near the mine entrance. Easy to chip free, useful in forging commissions."
slot        = ""
scenery     = true
respawn     = true
effects     = []
on_get      = [
  { op = "require_tag", tag = "pickaxe", fail_message = "You need a pickaxe to chip ore from this seam." },
  { op = "give_item", item_id = "dp_raw_ore" },
  { op = "skill_grow", skill = "crafting", amount = 1 },
  { op = "message", tag = "item", text = "You chip free a chunk of rough ore." },
]

[[item]]
id          = "resonant_alloy_ingot_node"
name        = "Resonant Alloy Vein"
desc_short  = "A seam of shimmering alloy embedded in the rock."
desc_long   = "The metal vibrates faintly; miners prize it for its use in ancient machinery."
slot        = ""
scenery     = true
respawn     = true
effects     = []
on_get      = [
  { op = "require_tag", tag = "pickaxe", fail_message = "You need a pickaxe to mine this seam." },
  { op = "skill_check", skill = "crafting", dc = 12,
    on_pass = [
      { op = "give_item", item_id = "resonant_alloy_ingot" },
      { op = "skill_grow", skill = "crafting", amount = 3 },
      { op = "message", tag = "item", text = "You extract a glowing ingot of resonant alloy." },
    ],
    on_fail = [
      { op = "give_item", item_id = "dp_raw_ore" },
      { op = "message", tag = "system", text = "The alloy crumbles — you salvage rough ore instead." },
    ],
  },
]

[[item]]
id          = "volcanic_glass_node"
name        = "Volcanic Glass Deposit"
desc_short  = "A cluster of sharp, glassy shards fused to the rock."
desc_long   = "The shards catch the light like frozen flame; careful extraction yields useful lenses."
slot        = ""
scenery     = true
respawn     = true
effects     = []
on_get      = [
  { op = "require_tag", tag = "pickaxe", fail_message = "You need a pickaxe to harvest the glass." },
  { op = "skill_check", skill = "survival", dc = 10,
    on_pass = [
      { op = "give_item", item_id = "volcanic_glass_shard" },
      { op = "skill_grow", skill = "survival", amount = 2 },
      { op = "message", tag = "item", text = "You pry a sharp shard free without cutting yourself." },
    ],
    on_fail = [
      { op = "damage", amount = 4, message = "A shard slices your hand as you fumble." },
    ],
  },
]

[[item]]
id          = "drakebone_deposit"
name        = "Drakebone Cluster"
desc_short  = "A cluster of fossilized drakebone embedded in the cliff."
desc_long   = "Rare and prized, drakebone is light, strong, and sings faintly when struck."
slot        = ""
scenery     = true
respawn     = true
effects     = []
on_get      = [
  { op = "require_tag", tag = "pickaxe", fail_message = "You need a pickaxe to extract drakebone." },
  { op = "skill_check", skill = "crafting", dc = 14,
    on_pass = [
      { op = "give_item", item_id = "drakebone_fragment" },
      { op = "skill_grow", skill = "crafting", amount = 4 },
      { op = "message", tag = "item", text = "You free a resonant fragment of drakebone." },
      { op = "advance_quest", quest_id = "forge_sky_piercer", step = 1 },
    ],
    on_fail = [
      { op = "message", tag = "system", text = "The bone crumbles under your tools." },
    ],
  },
]

# ── Device piece ─────────────────────────────────────────────────────────────

[[item]]
id          = "thermal_conductor_piece"
name        = "Thermal Conductor"
desc_short  = "A humming crystalline module carved with heat sigils."
desc_long   = "Part of the Sixfold Regulator; its pulse is out of sync with the Peaks. The sigils respond to touch — warm and insistent, like a heartbeat slightly off rhythm."
slot        = ""
scenery     = true
respawn     = false
effects     = []
on_get      = [
  { op = "message", tag = "item", text = "The conductor thrums in your hands, warm and insistent." },
  { op = "set_flag", flag = "dp_has_thermal_conductor" },
  { op = "advance_quest", quest_id = "hoard_of_the_apex_drake", step = 4 },
  { op = "complete_quest", quest_id = "hoard_of_the_apex_drake" },
  { op = "prestige", amount = 5, reason = "recovered the Thermal Conductor from the Apex Drake's hoard" },
]

# ── Resonance Forge Panel ─────────────────────────────────────────────────────

[[item]]
id          = "resonance_forge_panel"
name        = "Resonance Forge Panel"
desc_short  = "A ringed control panel with rotating sigils and a molten cradle."
desc_long   = "Ancient gears and crystal inlays. A resonant ingot placed in the cradle can lock the vent timing and open the Thermal Conduit Gate. Skilled hands might manage it without one."
slot        = ""
scenery     = true
respawn     = false
effects     = []
on_get      = [
  { op = "if_not_flag", flag = "dp_forge_aligned", then = [
    { op = "if_has_item", item_id = "resonant_alloy_ingot", then = [
      { op = "take_item", item_id = "resonant_alloy_ingot" },
      { op = "message", tag = "crafting", text = "You seat the ingot in the cradle. The panel hums and the gears begin to turn." },
      { op = "set_flag", flag = "dp_forge_aligned" },
      { op = "set_flag", flag = "dp_thermal_gate_unlocked" },
      { op = "unlock_exit", room_id = "dp_apex_approach_3", direction = "east" },
      { op = "message", tag = "system", text = "A deep rumble echoes through the mountain as the vents stabilise." },
      { op = "advance_quest", quest_id = "forge_sky_piercer", step = 2 },
      { op = "advance_quest", quest_id = "hoard_of_the_apex_drake", step = 3 },
    ], else = [
      { op = "skill_check", skill = "crafting", dc = 14,
        on_pass = [
          { op = "message", tag = "crafting", text = "You jury-rig the panel with careful strikes and the resonance locks into place." },
          { op = "set_flag", flag = "dp_forge_aligned" },
          { op = "set_flag", flag = "dp_thermal_gate_unlocked" },
          { op = "unlock_exit", room_id = "dp_apex_approach_3", direction = "east" },
          { op = "advance_quest", quest_id = "forge_sky_piercer", step = 2 },
          { op = "message", tag = "system", text = "The gate's sigils glow and the lock releases with a sigh." },
        ],
        on_fail = [
          { op = "message", tag = "error", text = "Your attempts misalign the panel; the vents flare in protest." },
          { op = "damage", amount = 6, message = "A backlash of heat sears you." },
        ],
      },
    ] },
  ], else = [
    { op = "message", tag = "system", text = "The panel is already aligned. The gears turn steadily." },
  ] },
]

# ── Drake Egg (companion hook) ────────────────────────────────────────────────

[[item]]
id          = "drake_egg"
name        = "Drake Egg"
desc_short  = "A warm, mottled egg humming faintly with life."
desc_long   = "An egg from the Apex's hoard. It responds to calm hands and steady reputations."
slot        = ""
scenery     = true
respawn     = false
effects     = []
on_get      = [
  { op = "if_prestige", min = 40, then = [
    { op = "message", tag = "item", text = "The egg settles in your arms, as if recognising you." },
    { op = "set_flag", flag = "dp_drake_egg_taken" },
    { op = "give_companion", companion_id = "drake_hatchling" },
  ], else = [
    { op = "message", tag = "system", text = "The egg trembles and cracks slightly; you feel a pang of guilt." },
    { op = "damage", amount = 10, message = "A shard of shell cuts you as the egg rejects your touch." },
  ] },
]

