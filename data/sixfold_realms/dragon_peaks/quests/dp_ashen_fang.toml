id = "dp_ashen_fang"
title = "The Ashen Fang"
giver = "smith_orun"
summary = "Orun has seen enough drakes die to know how to make something that bleeds like one. He'll forge you an Ashen Fang if you bring him the right materials."

[[step]]
index = 1
objective = "Find smith_orun at Highspire Hold."
hint = "Orun works the forge at Highspire Hold's central platform."

[[step]]
index = 2
objective = "Gather a volcanic glass shard, a drakebone fragment, and a drake feather fragment."
hint = "The glass nodes are near the emberfall slopes. Drakebone comes from the larger drakes. Feather fragments drop from cliff hawks."

[[step]]
index = 3
objective = "Commission the Ashen Fang from smith_orun."
hint = "Return to Orun with all three materials and commission the blade."

[[reward]]
type = "xp"
amount = 200

[[reward]]
type = "gold"
amount = 50
