id      = "forge_sky_piercer"
title   = "Forge the Sky-Piercer"
giver   = "smith_orun"
summary = "Gather materials from the Emberfall vents and work with Orun to craft the legendary Sky-Piercer Glaive."

[[step]]
index     = 1
objective = "Gather: 1 resonant alloy ingot, 1 drakebone fragment, 1 volcanic glass shard."
hint      = "Mine the Emberfall vents and hunt drakes. Orun also sells some materials."

[[step]]
index     = 2
objective = "Use the Resonance Forge Panel in Hearthforge Ruin to align the vents."
hint      = "A resonant ingot placed in the cradle will lock the panel. Skilled hands can manage without one."

[[step]]
index     = 3
objective = "Commission the Sky-Piercer Glaive from Orun and collect it when ready."
hint      = "Return to Orun after stabilising the forge. Use 'commission' to place the order."

[[reward]]
type   = "xp"
amount = 300
