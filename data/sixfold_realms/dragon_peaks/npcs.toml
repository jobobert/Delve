[[npc]]
id          = "warden_selka"
name        = "Warden Selka Thornwright"
desc_short  = "A stern watchwoman wrapped in wind-leather."
desc_long   = "Selka studies drake patterns and keeps the watch. She believes dragons can be reasoned with, but not coddled."
tags        = ["humanoid", "guard"]
style       = "sky_piercer"
style_prof  = 45
hp          = 120
max_hp      = 120
attack      = 18
defense     = 12
xp_reward   = 120
gold_reward = 40
hostile     = false
dialogue    = "We hold the line here. The Peaks demand respect."

give_accepts = [
  {
    item_id = "drakebone_fragment",
    message = "Selka turns the fragment over, eyes narrowing. 'Proof of a hunt. You did well.'",
    script  = [
      { op = "prestige", amount = 8, reason = "brought drakebone to the Warden" },
      { op = "give_gold", amount = 50 },
      { op = "advance_quest", quest_id = "hoard_of_the_apex_drake", step = 2 },
    ],
  },
]

round_script = [
  { op = "if_prestige", min = 40, then = [
    { op = "message", tag = "combat_hit", text = "Selka fights with measured strikes, as if honoring an ally." },
  ] },
  { op = "if_prestige", max = -20, then = [
    { op = "message", tag = "combat_hit", text = "Selka's strikes are cold and unforgiving toward those who bring discord." },
  ] },
]

kill_script = [
  { op = "message", tag = "combat_kill", text = "Selka falls with a look of grim satisfaction." },
  { op = "set_flag", flag = "dp_selka_slain" },
]

