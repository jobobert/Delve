  { op = "if_combat_round", min = 2, then = [
    { op = "apply_status", effect = "weakened", duration = 2 },
    { op = "message", tag = "combat", text = "A burst of scalding steam saps your strength." },
  ] },
]

kill_script = [
  { op = "message", tag = "combat_death", text = "The sprite disperses with a hiss, leaving a patch of scalded stone." },
]

