# ── Miner Apprentice — give_accepts trade ─────────────────────────────────────

[[npc]]
id          = "miner_apprentice"
name        = "Miner Apprentice"
desc_short  = "A calloused miner with a hopeful grin."
desc_long   = "They trade small favours for tools and gossip about rich veins. Their pickaxe broke last week and they've been making do since."
tags        = ["humanoid"]
style       = "brawling"
style_prof  = 8
hp          = 45
max_hp      = 45
attack      = 6
defense     = 5
xp_reward   = 20
gold_reward = 5
hostile     = false
dialogue    = "Rich seam deeper in, if you've got the tools."

give_accepts = [
  {
    item_id = "scrap_metal",
    message = "The apprentice brightens. 'I can patch a pickaxe with this.'",
    script = [
      { op = "take_item", item_id = "scrap_metal" },
      { op = "give_item", item_id = "rusty_pickaxe" },
      { op = "message",   tag = "item", text = "The apprentice hands you a patched pickaxe." },
    ],
  },
]

# ── ENEMIES ───────────────────────────────────────────────────────────────────

# Cliff Hawk — ambush predator of the approach paths
# Fast and diving, knocks things off ledges. Sky-Piercer users handle it well.

[[npc]]
id          = "cliff_hawk"
name        = "Cliff Hawk"
desc_short  = "A large mountain hawk with iron-grey talons."
desc_long   = "It circles in the updrafts and strikes without warning — talons first, fast enough to knock an unprepared traveller sideways."
tags        = ["beast", "fast", "flying"]
style       = "sky_piercer"
style_prof  = 18
hp          = 28
max_hp      = 28
attack      = 10
defense     = 4
xp_reward   = 22
gold_reward = 0
hostile     = true
respawn     = true
respawn_time = 4

round_script = [
  { op = "if_combat_round", min = 2, then = [
    { op = "message", tag = "combat", text = "The hawk stoops into a dive, striking with punishing speed!" },
    { op = "damage", amount = 3 },
  ] },
]

kill_script = [
  { op = "message", tag = "combat_death", text = "The hawk tumbles from the updraft and disappears over the ledge." },
]

