respawn     = false

round_script = [
  { op = "if_prestige", min = 50, then = [
    { op = "message", tag = "combat", text = "The Apex hesitates, studying you as if weighing an old debt." },
  ] },
  { op = "if_prestige", max = -30, then = [
    { op = "message", tag = "combat", text = "The Apex roars with fury — its attacks grow savage against those it deems dishonorable." },
