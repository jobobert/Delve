# dragon_peaks/npcs.toml
#
# Friendly: warden_selka, smith_orun, tinker_apprentice, vendor_alloys, miner_apprentice
# Enemies:  cliff_hawk, mountain_bandit, steam_sprite, cave_rat, echo_bat,
#           sky_serpent, lava_sprite, young_drake_scout, ashwood_drake,
#           apex_drake_guard, apex_drake

# ── Warden Selka Thornwright — quest giver, sky_piercer trainer ───────────────

[[npc]]
id          = "warden_selka"
name        = "Warden Selka Thornwright"
desc_short  = "A stern watchwoman wrapped in wind-leather."
desc_long   = "Selka studies drake patterns and keeps the watch. She believes dragons can be reasoned with, but not coddled. She teaches Sky-Piercer to those who prove themselves in the Peaks."
tags        = ["humanoid", "guard"]
style       = "sky_piercer"
style_prof  = 45
hp          = 120
max_hp      = 120
attack      = 18
defense     = 12
xp_reward   = 120
gold_reward = 40
hostile     = false
dialogue    = "We hold the line here. The Peaks demand respect."

give_accepts = [
  {
    item_id = "drakebone_fragment",
    message = "Selka turns the fragment over, eyes narrowing. 'Proof of a hunt. You did well.'",
    script  = [
      { op = "prestige",      amount = 8, reason = "brought drakebone to the Warden" },
      { op = "give_gold",     amount = 50 },
      { op = "advance_quest", quest_id = "hoard_of_the_apex_drake", step = 2 },
    ],
  },
]

round_script = [
  { op = "if_prestige", min = 40, then = [
    { op = "message", tag = "combat_hit", text = "Selka fights with measured strikes, as if honouring an ally." },
  ] },
  { op = "if_prestige", max = -20, then = [
    { op = "message", tag = "combat_hit", text = "Selka's strikes are cold and unforgiving toward those who bring discord." },
  ] },
]

kill_script = [
  { op = "message", tag = "combat_death", text = "Selka falls with a look of grim satisfaction." },
  { op = "set_flag", flag = "dp_selka_slain" },
]

# ── Master Smith Orun Kett — commission crafter, shopkeeper ───────────────────

[[npc]]
id          = "smith_orun"
name        = "Master Smith Orun Kett"
desc_short  = "A broad-shouldered smith with soot-streaked hair."
desc_long   = "Orun forges resonant alloys and experiments with ancient techniques. He can craft unusual weapons and ingots if given the right materials."
tags        = ["humanoid", "smith", "crafter"]
style       = "sky_piercer"
style_prof  = 30
hp          = 90
max_hp      = 90
attack      = 14
defense     = 10
xp_reward   = 80
gold_reward = 30
hostile     = false
dialogue    = "Metal remembers the hands that shape it."

shop = [
  { item_id = "resonant_alloy_ingot", price = 120 },
  { item_id = "volcanic_glass_shard", price = 30  },
  { item_id = "dp_raw_ore",           price = 60  },
]

