# Steam Sprite — born from the vent fields, small elemental

[[npc]]
id          = "steam_sprite"
name        = "Steam Sprite"
desc_short  = "A small elemental of scalding vapour."
desc_long   = "Birthed from the vent field's thermal chaos, it drifts on pockets of pressurised air. Contact burns. It has no malice — just heat."
tags        = ["beast", "small", "fast"]
style       = "sky_piercer"
style_prof  = 15
hp          = 30
max_hp      = 30
attack      = 10
defense     = 5
xp_reward   = 25
gold_reward = 0
hostile     = true
respawn     = true
respawn_time = 4

