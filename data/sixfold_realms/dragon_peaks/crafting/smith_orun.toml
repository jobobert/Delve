# Commission 1: Forge the Sky-Piercer (quest item)
[[commission]]
id              = "forge_sky_piercer_commission"
npc_id          = "smith_orun"
label           = "Forge the Sky-Piercer"
desc            = "Provide Orun with the required materials and assist at the Hearthforge Ruin."
slot            = "weapon"
weapon_tags     = ["polearm", "glaive", "reach"]
materials       = ["resonant_alloy_ingot", "drakebone_fragment", "volcanic_glass_shard"]
turns_required  = 20
gold_cost       = 0
weight          = 3
on_complete = [
  { op = "message", tag = "crafting", text = "Orun hammers the final edge and hands you the Sky-Piercer." },
  { op = "advance_quest", quest_id = "forge_sky_piercer", step = 3 },
  { op = "complete_quest", quest_id = "forge_sky_piercer" },
  { op = "prestige", amount = 5, reason = "forged the Sky-Piercer with Orun" },
]
qualities = [
  { tier = "poor",        weight = 20, attack_bonus = 8,  defense_bonus = 1, equip_msg = "The glaive hums weakly. The balance is slightly off, but it will serve.", craft_message = "It's functional. Not my finest work." },
  { tier = "standard",    weight = 55, attack_bonus = 12, defense_bonus = 3, equip_msg = "The glaive's edge hums and the wind seems to answer." },
  { tier = "exceptional", weight = 20, attack_bonus = 14, defense_bonus = 4, name_prefix = "Fine ", equip_msg = "The blade sings in updraft currents. Orun outdid himself.", craft_message = "The alloy took the edge perfectly." },
  { tier = "masterwork",  weight = 5,  attack_bonus = 16, defense_bonus = 5, name_prefix = "Masterwork ", equip_msg = "The Sky-Piercer resonates with the mountain's thermal pulse. Extraordinary.", craft_message = "I've forged a hundred blades. That one asked to be made." },
]


# Commission 2: Resonant Ingot Forging (used in other zones, must keep id=dp_resonant_ingot)
[[commission]]
id              = "dp_resonant_ingot"
npc_id          = "smith_orun"
label           = "Resonant Ingot Forging"
desc            = "A high-heat forging process that binds drake-scale essence into a metal ingot."
slot            = ""
weapon_tags     = []
materials       = ["drake_scale", "dp_raw_ore"]
turns_required  = 12
gold_cost       = 0
on_complete = [
  { op = "message", tag = "crafting", text = "The forge roars as the ingot cools, humming with draconic resonance." },
  { op = "give_item", item_id = "resonant_alloy_ingot" },
]
qualities = [
  { tier = "poor",        weight = 25, craft_message = "Brittle alloy — it held together, but barely." },
  { tier = "standard",    weight = 50, craft_message = "Tempered alloy. Solid work." },
  { tier = "exceptional", weight = 25, craft_message = "Sky-forged alloy. The drake-scale bonded cleanly to the ore." },
]
