# Commission 1: Tune the Echo Compass (required for Pressure Below quest)
[[commission]]
id             = "mf_tune_echo_compass"
npc_id         = "mf_path_reader_sera"
label          = "Tune the Echo Compass"
desc           = "Sera can stabilise an Echo Compass using Mistfen materials so it will respond to the Echo Gate."
slot           = ""
weapon_tags    = []
materials      = ["echo_compass", "bog_quartz", "pressure_hollowed_stone"]
turns_required = 10
gold_cost      = 0
on_complete = [
  { op = "message", tag = "crafting", text = "Sera hums softly as the compass needle settles. 'There. It will hold now.'" },
  { op = "give_item", item_id = "echo_compass_tuned" },
  { op = "set_flag",  flag = "mf_echo_gate_unlocked" },
  { op = "prestige",  amount = 1, reason = "worked with the Path-Readers to stabilise the Mistfen" },
]
qualities = [
  { tier = "poor",        weight = 25, craft_message = "The needle wavers a little. 'It will hold — probably,' Sera says." },
  { tier = "standard",    weight = 50, craft_message = "Sera nods. 'Standard tuning. It will do the job.'" },
  { tier = "exceptional", weight = 25, craft_message = "'Perfect alignment. The Mistfen will answer to this.' Sera sounds almost surprised." },
]


# Commission 2: Bog-Quartz Heart Refinement (cross-zone material for Verdant Heartwood)
[[commission]]
id             = "mf_quartz_heart"
npc_id         = "mf_path_reader_sera"
label          = "Bog-Quartz Heart Refinement"
desc           = "A Mistfen refinement that stabilises a quartz core into a resonant heart, useful in later zones."
slot           = ""
weapon_tags    = []
materials      = ["bog_quartz", "pressure_hollowed_stone"]
turns_required = 12
gold_cost      = 0
on_complete = [
  { op = "message", tag = "crafting", text = "The quartz stabilises, pulsing with a soft inner glow." },
  { op = "give_item", item_id = "mf_quartz_heart" },
]
qualities = [
  { tier = "poor",        weight = 25, craft_message = "The resonance is cloudy — it will work, but it's unstable." },
  { tier = "standard",    weight = 50, craft_message = "Stable resonance. The quartz heart is solid." },
  { tier = "exceptional", weight = 25, craft_message = "Pure resonance. The quartz hums with a steady, clear pulse." },
]


# Commission 3: Forge the Pressure Chain
[[commission]]
id             = "mf_forge_pressure_chain"
npc_id         = "mf_path_reader_sera"
label          = "Forge the Pressure Chain"
desc           = "Sera can bind bog-quartz and pressure-hollowed stone into a chain weapon that stuns on impact."
slot           = "weapon"
weapon_tags    = ["polearm", "chain", "pressure"]
materials      = ["bog_quartz", "pressure_hollowed_stone"]
turns_required = 14
gold_cost      = 0
weight         = 3
on_complete = [
  { op = "message", tag = "crafting", text = "Sera links the final segment. The chain vibrates once, sharply, then settles." },
  { op = "advance_quest", quest_id = "mf_pressure_chain", step = 3 },
  { op = "complete_quest", quest_id = "mf_pressure_chain" },
  { op = "prestige", amount = 3, reason = "forged the Pressure Chain with Sera" },
]
qualities = [
  { tier = "poor",        weight = 20, attack_bonus = 6,  defense_bonus = 1, equip_msg = "The links are slightly mismatched — the stun pulse will be inconsistent.", craft_message = "The quartz bonded rough. It will hold." },
  { tier = "standard",    weight = 55, attack_bonus = 9,  defense_bonus = 2, equip_msg = "The chain hums steadily. Each blow carries the weight of the entire swamp." },
  { tier = "exceptional", weight = 20, attack_bonus = 11, defense_bonus = 3, name_prefix = "Tuned ", equip_msg = "The chain resonates perfectly. The stunwave carries further than it should.", craft_message = "The pressure aligned cleanly. I felt it in my hands." },
  { tier = "masterwork",  weight = 5,  attack_bonus = 13, defense_bonus = 4, name_prefix = "Masterwork ", equip_msg = "The chain almost pulls you toward targets. Its pressure-wave is devastating.", craft_message = "I have never felt a weapon like that leave my hands before." },
]
