[[commission]]
id    = "mf_tune_echo_compass"
title = "Tune the Echo Compass"
desc  = "Use Mistfen materials to stabilise an Echo Compass for the Drowned Vault."
repeatable = false

giver_npc = "mf_path_reader_sera"

requires = [
  { item_id = "echo_compass",           qty = 1 },
  { item_id = "bog_quartz",             qty = 2 },
  { item_id = "pressure_hollowed_stone", qty = 1 },
]

produces = [
  { item_id = "echo_compass_tuned", qty = 1 },
]

on_accept = [
  { op = "message", tag = "quest", text = "Sera agrees to help you tune the compass—if you bring the right materials." },
]

on_complete = [
  { op = "set_flag",  flag = "mf_echo_gate_unlocked" },
  { op = "prestige",  amount = 1, reason = "worked with the Path‑Readers to stabilise the Mistfen" },
]

