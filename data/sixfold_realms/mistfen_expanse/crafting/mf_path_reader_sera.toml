# Commission 1: Tune the Echo Compass (required for Pressure Below quest)
[[commission]]
id             = "mf_tune_echo_compass"
npc_id         = "mf_path_reader_sera"
label          = "Tune the Echo Compass"
desc           = "Sera can stabilise an Echo Compass using Mistfen materials so it will respond to the Echo Gate."
slot           = ""
weapon_tags    = []
materials      = ["echo_compass", "bog_quartz", "pressure_hollowed_stone"]
turns_required = 10
gold_cost      = 0
on_complete = [
  { op = "message", tag = "crafting", text = "Sera hums softly as the compass needle settles. 'There. It will hold now.'" },
  { op = "give_item", item_id = "echo_compass_tuned" },
  { op = "set_flag",  flag = "mf_echo_gate_unlocked" },
  { op = "prestige",  amount = 1, reason = "worked with the Path-Readers to stabilise the Mistfen" },
]
qualities = [
  { tier = "poor",        weight = 25, craft_message = "The needle wavers a little. 'It will hold — probably,' Sera says." },
  { tier = "standard",    weight = 50, craft_message = "Sera nods. 'Standard tuning. It will do the job.'" },
  { tier = "exceptional", weight = 25, craft_message = "'Perfect alignment. The Mistfen will answer to this.' Sera sounds almost surprised." },
]


# Commission 2: Bog-Quartz Heart Refinement (cross-zone material for Verdant Heartwood)
