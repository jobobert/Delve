# Mistfen Expanse — Fighting Styles

[[style]]
id                = "pressure_weave"
name              = "Pressure Weave"
desc_short        = "A deceptive style that manipulates distance and timing."
desc_long         = "Pressure Weave manipulates distance, timing, and spatial pressure to exhaust and disorient opponents. Developed by Mistfen Path-Readers, it rewards patience and reactive play — effective against armored or large opponents who cannot close distance reliably."
strong_vs         = ["armored", "large", "slow"]
weak_vs           = ["fast", "beast", "small"]
strong_multiplier = 1.4
weak_multiplier   = 0.70
attack_bonus      = 0
defense_bonus     = 1
difficulty        = 1.3
preferred_weapon_tags = ["light", "staff", "fist"]
preferred_armor_tags  = ["light", "cloth"]
weapon_bonus      = 0.15
armor_bonus       = 0.15
learned_from      = "mf_path_reader_sera"
learned_at        = 2
passives = [
  { ability = "pressure_spike", threshold = 50, trigger = "attack", chance = 0.20, message = "A pressure spike catches your opponent off-guard!",     on_activate = [{op = "apply_status", effect = "weakened", duration = 2}] },
  { ability = "phase_step",     threshold = 75, trigger = "defend", chance = 0.15, message = "You shift through the pressure and slip the attack!", on_activate = [{op = "skip_npc_attack"}] },
]

[[style]]
id                = "shadowstrike"
name              = "Shadowstrike"
desc_short        = "A quick, opportunistic style built on deception."
desc_long         = "Shadowstrike is built on deception — strike when the opponent is not expecting it, from an angle they are not watching. Excels against slow or armored targets caught mid-motion. Struggles against fast or instinctive fighters who react before thought."
strong_vs         = ["slow", "armored", "humanoid"]
weak_vs           = ["fast", "beast", "flying"]
strong_multiplier = 1.4
weak_multiplier   = 0.70
attack_bonus      = 1
defense_bonus     = 0
difficulty        = 1.2
preferred_weapon_tags = ["blade", "light", "one_handed"]
preferred_armor_tags  = ["light"]
weapon_bonus      = 0.20
armor_bonus       = 0.10
learned_from      = ""
learned_at        = 0
passives = [
  { ability = "shadow_slip", threshold = 50, trigger = "defend", chance = 0.15, message = "You melt into shadow and the blow passes through empty air!", on_activate = [{op = "skip_npc_attack"}] },
  { ability = "backstab",    threshold = 75, trigger = "attack", chance = 0.12, message = "A precise strike finds the gap!",                           on_activate = [{op = "multiply_damage", multiplier = 1.6}] },
]

[[style]]
id                = "iron_root"
name              = "Iron Root"
desc_short        = "An immovable defensive style that turns the opponent's force against them."
desc_long         = "Iron Root teaches you to become immovable — plant your feet and let the opponent's force become a weapon. Near-impossible to break through sustained pressure. Against anything quick that refuses to commit, the style's lack of mobility is a severe liability."
strong_vs         = ["humanoid", "small", "slow"]
weak_vs           = ["fast", "flying", "beast"]
strong_multiplier = 1.5
weak_multiplier   = 0.65
attack_bonus      = 2
defense_bonus     = 3
difficulty        = 1.5
preferred_weapon_tags = ["blunt", "two_handed", "heavy"]
preferred_armor_tags  = ["heavy", "chain"]
weapon_bonus      = 0.25
armor_bonus       = 0.20
learned_from      = ""
learned_at        = 0
passives = [
  { ability = "root_stance",   threshold = 25, trigger = "defend", chance = 0.18, message = "Iron Root holds — the blow is absorbed!",     on_activate = [{op = "block_damage"}] },
  { ability = "crushing_grip", threshold = 60, trigger = "attack", chance = 0.12, message = "A crushing, methodical strike!", on_activate = [{op = "multiply_damage", multiplier = 1.5}] },
]
