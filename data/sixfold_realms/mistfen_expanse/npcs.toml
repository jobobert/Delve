[[npc]]
id          = "mf_vault_watcher"
name        = "Vault Watcher"
desc_short  = "A pressure‑wreathed guardian formed of water and stone."
desc_long   = "Its shape shifts with each breath you take, as if your lungs are part of its body."
tags        = ["construct", "armored"]
style       = "iron_root"
style_prof  = 50
hp          = 90
max_hp      = 90
attack      = 14
defense     = 12
xp_reward   = 140
gold_reward = 0
hostile     = true
kill_script = [
  { op = "set_flag",      flag = "mf_vault_watcher_slain" },
  { op = "advance_quest", quest_id = "mf_pressure_below", step = 2 },
  { op = "message", tag = "combat_kill", text = "The Vault Watcher collapses into still water." },
]
round_script = [
  # High‑prestige branch: guardian eases off a bit
  { op = "if_prestige", min = 10, then = [
    { op = "if_combat_round", min = 2, then = [
      { op = "if_npc_hp", max = 70, then = [
        { op = "say", text = "Stabilising presence detected. Reducing pressure." },
        { op = "apply_status", effect = "weakened", duration = 2 },
      ] },
    ] },
  ] },

  # Low‑prestige branch: guardian hits harder
  { op = "if_prestige", max = -5, then = [
    { op = "if_combat_round", min = 2, then = [
      { op = "say", text = "Destabilising intruder. Increasing pressure." },
      { op = "damage", amount = 4, message = "The water around you compresses violently." },
    ] },
  ] },

  # Existing behaviour (kept as a neutral fallback)
  { op = "if_combat_round", min = 3, then = [
    { op = "if_npc_hp", max = 40, then = [
      { op = "say", text = "Pressure… equalising…" },
      { op = "apply_status", effect = "weakened", duration = 3 },
    ] },
  ] },
]

