id      = "mf_anchors_in_the_mire"
title   = "Anchors in the Mire"
giver   = "mf_path_reader_sera"
summary = "Sera told you that Anchor Stones can pin the Mistfen's looping paths. You must earn one and attune it."

[[step]]
index     = 1
objective = "Reach the Anchor Field east of Sera's camp."
hint      = "From the camp, go east into the mist."

[[step]]
index     = 2
objective = "Claim an Anchor Stone that will answer to you."
hint      = "Interact with the Anchor Stone Marker. Prestige may affect whether it responds."

[[step]]
index     = 3
objective = "Walk the Mist Loops while carrying the Anchor Stone."
hint      = "With the stone attuned, the loops should no longer trap you."

[[reward]]
type   = "xp"
amount = 200

[[reward]]
type   = "gold"
amount = 40
