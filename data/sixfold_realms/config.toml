# data/sixfold_realms/config.toml — World configuration for The Sixfold Realms.
#
# Edit this file to customise your world. It is read by the engine at startup
# and overrides all engine defaults. This file is version-controlled and belongs
# with your world data.
#
# See data/WORLD_MANUAL.md for the full field reference.

# ── World identity ─────────────────────────────────────────────────────────────
world_name = "The Sixfold Realms"

# ── New character stats ────────────────────────────────────────────────────────
new_char_hp = 100

# ── Currency ───────────────────────────────────────────────────────────────────
currency_name   = "marks"
currency_abbrev = "mk"

# ── Fighting styles ────────────────────────────────────────────────────────────
default_style = "flowcurrent"

# ── Vision ─────────────────────────────────────────────────────────────────────
vision_threshold = 3

# ── Equipment slots ────────────────────────────────────────────────────────────
equipment_slots = [
    "head", "body", "hands", "feet",
    "weapon", "offhand", "neck", "ring",
]

# ── Skills ─────────────────────────────────────────────────────────────────────
[skills]
perception = "Perception"
navigation = "Navigation"
diplomacy  = "Diplomacy"
survival   = "Survival"
lore       = "Lore"
crafting   = "Crafting"

# ── World-defined player attributes ───────────────────────────────────────────
# spore_exposure: tracks cognitive impairment from Mycelial Plains fungal spores.
# Increases in spore-dense rooms; reduced by clarity brews and safe zones.
# Used to gate the Memory Garden and certain NPC interactions in Region 5.

[[player_attrs]]
id      = "spore_exposure"
min     = 0
max     = 100
default = 0
display = "bar"

# resonance: tracks stability inside the Core Chamber.
# Starts at 100 (reset on entry), drains as the player descends.
# Restored by calibrating the five subsystem sentinels.
# Required minimum: 60 to pass Calibration Gate, 80 to reach Crystal Chamber.

[[player_attrs]]
id      = "resonance"
min     = 0
max     = 100
default = 100
display = "bar"

# ── Status effects ──────────────────────────────────────────────────────────────
# Named conditions applied/cleared by scripts and combat passives.
# Fields: id, label, apply_msg, expiry_msg, combat_atk, combat_def, damage_per_move

[[status_effect]]
id              = "poisoned"
label           = "Poisoned"
apply_msg       = "Venom seeps through your veins."
expiry_msg      = "The venom finally clears from your blood."
combat_atk      = 0
combat_def      = 0
damage_per_move = 3

[[status_effect]]
id              = "blinded"
label           = "Blinded"
apply_msg       = "Darkness closes in around you."
expiry_msg      = "Light returns to your eyes."
combat_atk      = -4
combat_def      = 0
damage_per_move = 0

[[status_effect]]
id              = "weakened"
label           = "Weakened"
apply_msg       = "Your strength drains away."
expiry_msg      = "Vigour returns to your limbs."
combat_atk      = -4
combat_def      = 0
damage_per_move = 0

[[status_effect]]
id              = "slowed"
label           = "Slowed"
apply_msg       = "A heaviness settles over your movements."
expiry_msg      = "The heaviness lifts and you move freely again."
combat_atk      = 0
combat_def      = -3
damage_per_move = 0

[[status_effect]]
id              = "protected"
label           = "Protected"
apply_msg       = "A shimmer of protection surrounds you."
expiry_msg      = "The protective shimmer fades."
combat_atk      = 0
combat_def      = 3
damage_per_move = 0

[[status_effect]]
id              = "confused"
label           = "Confused"
apply_msg       = "The world blurs at the edges — you struggle to focus."
expiry_msg      = "Your thoughts clear."
combat_atk      = -2
combat_def      = -2
damage_per_move = 0

[[status_effect]]
id              = "spores"
label           = "Spore-touched"
apply_msg       = "A cloud of spores settles over you, clouding your senses."
expiry_msg      = "The spore haze lifts from your mind."
combat_atk      = -1
combat_def      = 0
damage_per_move = 2

[[status_effect]]
id              = "entropy"
label           = "Entropic"
apply_msg       = "Unstable energy seeps into your body, disrupting your focus."
expiry_msg      = "The entropic interference fades."
combat_atk      = -2
combat_def      = -2
damage_per_move = 1
