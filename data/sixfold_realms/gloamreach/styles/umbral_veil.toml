# Gloamreach — Fighting Styles

# umbral_veil: a deceptive style that bends light and shadow to create delayed strikes.
# Native to the Gloamreach Lightbearers. Rewards elusive, disorienting play.
# Effective against armored and humanoid foes who rely on direct force.
[[style]]
id            = "umbral_veil"
name          = "Umbral Veil"
desc          = "A deceptive style that bends light and shadow to create delayed strikes and afterimages. Rewards elusive, disorienting play."
strong_vs     = ["armored", "humanoid", "slow"]
weak_vs       = ["beast", "fast", "flying"]
defense_bonus = 1
difficulty    = 1.4
learned_from  = "gr_umbral_weaver"

[[passive]]
ability   = "afterimage_strike"
threshold = 50
trigger   = "attack"
message   = "Your shadow lashes out a heartbeat behind your strike — a double blow!"
on_activate = [
  { op = "apply_status", effect = "confused", duration = 2 },
]

[[passive]]
ability   = "shadow_step"
threshold = 65
trigger   = "defend"
message   = "You slip between moments — the attack passes through your afterimage!"
on_activate = [
  { op = "skip_npc_attack" },
]

[[passive]]
ability   = "entropy_surge"
threshold = 75
trigger   = "attack"
message   = "Unstable energy surges into your strike!"
on_activate = [
  { op = "multiply_damage", multiplier = 1.6 },
]
