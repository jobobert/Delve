# Gloamreach — Fighting Styles
#
# umbral_veil: a deceptive style that bends light and shadow to create
# delayed strikes and afterimages. Native to the Gloamreach Lightbearers.
# Rewards elusive, disorienting play against armored or slow opponents.
#
# Passive chain:
#   50  afterimage_strike — attack; chance to confuse the enemy (attack)
#   65  shadow_step       — slip between moments, skipping an NPC attack (defend)
#   75  entropy_surge     — unstable energy amplifies a strike (attack)

[[style]]
id                = "umbral_veil"
name              = "Umbral Veil"
desc_short        = "A deceptive style that bends light and shadow to create delayed strikes."
desc_long         = "Umbral Veil treats every fight as a game of misdirection — your afterimage strikes a heartbeat after you do, leaving opponents unable to trust what they see. Developed by Gloamreach Lightbearers who learned to navigate perpetual twilight, it rewards elusive, disorienting play. Effective against armored or deliberate fighters who rely on reading motion; weak against fast or flying opponents that are too erratic to misdirect."
strong_vs         = ["armored", "humanoid", "slow"]
weak_vs           = ["beast", "fast", "flying"]
strong_multiplier = 1.4
weak_multiplier   = 0.70
attack_bonus      = 0
defense_bonus     = 1
difficulty        = 1.4
preferred_weapon_tags = ["light_blade", "fist", "staff"]
preferred_armor_tags  = ["cloth", "light"]
weapon_bonus      = 0.20
armor_bonus       = 0.15
learned_from      = "gr_umbral_weaver"
learned_at        = 2
passives = [
  { ability = "afterimage_strike", threshold = 50, trigger = "attack", chance = 0.15, message = "Your shadow lashes out a heartbeat behind your strike — a double blow!", on_activate = [{op = "apply_status", effect = "confused", duration = 2}] },
  { ability = "shadow_step",       threshold = 65, trigger = "defend", chance = 0.15, message = "You slip between moments — the attack passes through your afterimage!",   on_activate = [{op = "skip_npc_attack"}] },
  { ability = "entropy_surge",     threshold = 75, trigger = "attack", chance = 0.12, message = "Unstable energy surges into your strike!",                                on_activate = [{op = "multiply_damage", multiplier = 1.6}] },
]
