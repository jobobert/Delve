# ---------------------------------------------------------
# ENTROPY GUARDIAN (boss — tied to Shadow Regulator Fragment)
# ---------------------------------------------------------

[[npc]]
id          = "gr_entropy_guardian"
name        = "Entropy Guardian"
desc_short  = "A towering figure of shadow-crystal and unstable energy."
desc_long   = "Its form shifts constantly, as if struggling to maintain coherence."
tags        = ["entropy", "construct", "armored"]
style       = "umbral_veil"
style_prof  = 60
hp          = 180
max_hp      = 180
attack      = 22
defense     = 16
xp_reward   = 250
gold_reward = 0
hostile     = true
dialogue    = "gr_entropy_guardian"

kill_script = [
  { op = "set_flag",      flag = "gr_entropy_guardian_slain" },
  { op = "advance_quest", quest_id = "gr_shadow_fragment", step = 3 },
  { op = "message", tag = "combat_kill", text = "The guardian collapses into drifting shards of shadow-crystal." },
]

round_script = [
  # Bright light destabilizes the guardian — player gets a defensive boost
  { op = "if_light", max = 2, then = [], else = [
    { op = "say", text = "The guardian destabilizes under your bright light!" },
    { op = "apply_status", effect = "protected", duration = 2 },
  ] },
  # In deep darkness the guardian presses harder — weakens player at round 4
  { op = "if_combat_round", min = 4, then = [
    { op = "say", text = "The guardian draws power from the surrounding darkness!" },
    { op = "apply_status", effect = "weakened", duration = 2 },
  ] },
]

