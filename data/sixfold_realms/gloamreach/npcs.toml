# ---------------------------------------------------------
# ECHO-TOUCHED HERMIT (guide / puzzle NPC)
# ---------------------------------------------------------

[[npc]]
id          = "gr_echo_hermit"
name        = "Echo-Touched Hermit"
desc_short  = "A figure who flickers between moments."
desc_long   = "The hermit's form shifts subtly, as if caught between echoes of themselves."
tags        = ["humanoid"]
style       = "umbral_veil"
style_prof  = 35
hp          = 65
max_hp      = 65
attack      = 10
defense     = 7
hostile     = false
xp_reward   = 0
gold_reward = 0
dialogue    = "gr_echo_hermit"
round_script = [
  # Hermit is disoriented by bright light — applies confusion to player in combat
  { op = "if_light", max = 2, then = [], else = [
    { op = "say", text = "The hermit flickers violently in your bright light." },
    { op = "apply_status", effect = "confused", duration = 1 },
  ] },
]


