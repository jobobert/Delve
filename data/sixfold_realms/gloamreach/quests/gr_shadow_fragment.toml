# The Cavern That Remembers — main zone quest.
#
# Step 1 advanced by the tuning fork on_use script.
# Step 2 advanced by the Entropy Guardian kill_script.
# Step 3 advanced + quest completed by shadow_regulator_fragment on_get.
# Prestige is awarded in shadow_regulator_fragment on_get.

id      = "gr_shadow_fragment"
title   = "The Cavern That Remembers"
giver   = "gr_lightbearer_alen"
summary = "A fragment of the Regulator lies deep within Gloamreach, guarded by entropy and shadow echoes. To claim it, you must master your light and disrupt the caverns' unstable resonance."

[[step]]
index     = 1
objective = "Disrupt an echo chamber using a tuning fork."
hint      = "Echo rooms replay themselves unless disrupted by resonance. Use the tuning fork from your inventory."

[[step]]
index     = 2
objective = "Defeat the Entropy Guardian."
hint      = "The guardian recoils from bright light. Equip the bright lantern before you fight."

[[step]]
index     = 3
objective = "Claim the Shadow Regulator Fragment."
hint      = "The fragment floats in the Gloam Core's final chamber."

[[reward]]
type   = "xp"
amount = 400

[[reward]]
type   = "gold"
amount = 60
