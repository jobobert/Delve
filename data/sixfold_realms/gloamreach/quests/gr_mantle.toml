# Weaving the Umbral Mantle — crafting quest.
#
# Step 1 becomes active when the Weaver starts the quest via dialogue.
# Steps 2 and 3 are advanced by the crafting commission on_complete.
# Prestige is awarded in the commission on_complete.

id      = "gr_mantle"
title   = "Weaving the Umbral Mantle"
giver   = "gr_umbral_weaver"
summary = "The Umbral Weaver can shape a mantle from shadow-ore and entropy residue, but only if you gather the materials and withstand the caverns' instability."

[[step]]
index     = 1
objective = "Gather Shadow-Ore and Entropy Residue."
hint      = "Mine shadow-ore veins in the deep warrens; collect entropy residue from pools or fallen husks."

[[step]]
index     = 2
objective = "Bring the materials to the Umbral Weaver."
hint      = "The Weaver works in the Echo Warrens — Shadowfall Pit."

[[step]]
index     = 3
objective = "Commission the Umbral Mantle at the Weaver."
hint      = "Use the 'commission' command with the Weaver to begin the weaving."

[[reward]]
type   = "xp"
amount = 300

[[reward]]
type   = "gold"
amount = 50
