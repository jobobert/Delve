# --- Light explanation ---
[[node]]
id   = "light_explain"
line = "'Gloamreach was meant to dampen excess energy. Now it amplifies it. Light bends. Shadows wander.'"

[[response]]
node = "light_explain"
text = "How do I keep my light steady?"
next = "light_advice"

[[node]]
id   = "light_advice"
line = "'Balance. Too bright, and the caverns push back. Too dim, and the shadows feed.'"

[[response]]
node = "light_advice"
text = "I'll try to keep it balanced."
next = ""


