[[node]]
id    = "root"
lines = [
  "The Weaver’s hands stitch darkness into form. 'You seek a mantle? Shadows can be shaped… if you have the right materials.'"
]

[[response]]
node = "root"
text = "What materials do you need?"
next = "materials"

[[response]]
node = "root"
text = "I have the materials."
next = "check"

[[response]]
node = "root"
text = "What does the mantle do?"
next = "explain"


# --- Materials ---
[[node]]
id   = "materials"
line = "'Shadow‑Ore and Entropy Residue. Bring them, and I will weave the mantle.'"

[[response]]
node = "materials"
text = "I'll gather them."
next = ""


# --- Check materials ---
[[node]]
id   = "check"
line = "The Weaver examines your materials."
script = [
  { op = "if_item", item_id = "gr_shadow_ore", then = [
    { op = "if_item", item_id = "gr_entropy_residue", then = [
      { op = "take_item", item_id = "gr_shadow_ore" },
      { op = "take_item", item_id = "gr_entropy_residue" },
      { op = "give_item", item_id = "umbral_mantle" },
      { op = "message", tag = "crafting", text = "The Weaver shapes the shadows into a mantle that settles around your shoulders." },
      { op = "advance_quest", quest_id = "gr_mantle", step = 2 }
    ], else = [
      { op = "message", tag = "error", text = "'You lack the residue. The mantle will not hold without it.'" }
    ] }
  ], else = [
    { op = "message", tag = "error", text = "'You lack the ore. Shadows need substance to bind.'" }
  ] }
]

[[response]]
node = "check"
text = "Thank you."
next = ""


# --- Explain ---
[[node]]
id   = "explain"
line = "'The mantle bends light and shadow. It helps you walk where others cannot.'"

[[response]]
node = "explain"
text = "Sounds useful."
next = ""
