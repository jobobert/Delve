# Commission 1: Weave the Umbral Mantle (required for gr_mantle quest)
[[commission]]
id             = "gr_weave_mantle"
npc_id         = "gr_umbral_weaver"
label          = "Weave Umbral Mantle"
desc           = "The Umbral Weaver binds shadow-ore and entropy residue into a mantle of shifting darkness."
slot           = "body"
armor_tags     = ["cloth", "shadow", "entropy"]
materials      = ["gr_shadow_ore", "gr_entropy_residue"]
turns_required = 12
gold_cost      = 0
weight         = 1
on_complete = [
  { op = "message", tag = "crafting", text = "The Weaver draws the shadows tight, weaving them into a mantle that shifts with the light." },
  { op = "advance_quest", quest_id = "gr_mantle", step = 2 },
  { op = "advance_quest", quest_id = "gr_mantle", step = 3 },
  { op = "complete_quest", quest_id = "gr_mantle" },
  { op = "prestige", amount = 2, reason = "mastered the caverns' instability" },
]
qualities = [
  { tier = "poor",        weight = 25, defense_bonus = 1, max_hp_bonus = 2, equip_msg = "The weave is loose in places, letting in cold drafts of entropy.", craft_message = "The shadows resisted — it held, but barely." },
  { tier = "standard",    weight = 50, defense_bonus = 3, max_hp_bonus = 5, equip_msg = "The mantle shifts with the light, sometimes absorbing it, sometimes bending it around you." },
  { tier = "exceptional", weight = 25, defense_bonus = 5, max_hp_bonus = 8, name_prefix = "Umbral ", equip_msg = "The mantle drinks the surrounding shadows and wraps you in perfect darkness.", craft_message = "The entropy wove itself. I barely had to guide it." },
]


# Commission 2: Shadow-Crystal Polish (refinement of shadow materials)
[[commission]]
id             = "gr_crystal_polish"
npc_id         = "gr_umbral_weaver"
label          = "Shadow-Crystal Polish"
desc           = "The Weaver can refine raw shadow-ore into a polished shard useful for crafting and light control."
slot           = ""
weapon_tags    = []
materials      = ["gr_shadow_ore", "gr_shadecloth_scrap"]
turns_required = 8
gold_cost      = 0
on_complete = [
  { op = "message", tag = "crafting", text = "The Weaver polishes the ore until it gleams with dark light." },
  { op = "give_item", item_id = "gr_nullstone_shard" },
]
qualities = [
  { tier = "poor",        weight = 25, craft_message = "Dull polish — the shard is serviceable." },
  { tier = "standard",    weight = 50, craft_message = "Clean polish. The nullstone is well-formed." },
  { tier = "exceptional", weight = 25, craft_message = "Perfect polish. The shard gleams with an eerie inner light." },
]


# Commission 3: Shape the Entropy Edge
[[commission]]
id             = "gr_shape_entropy_edge"
npc_id         = "gr_umbral_weaver"
label          = "Shape the Entropy Edge"
desc           = "The Weaver can draw entropy into a shadow-ore blade — an edge that makes wounds that won't close."
slot           = "weapon"
weapon_tags    = ["blade", "shadow", "entropy"]
materials      = ["gr_shadow_ore", "gr_entropy_residue", "gr_nullstone_shard"]
turns_required = 15
gold_cost      = 0
weight         = 2
on_complete = [
  { op = "message", tag = "crafting", text = "The Weaver runs a fingertip along the finished edge. A thin line of shadow follows it. 'It will hold,' she says." },
  { op = "advance_quest", quest_id = "gr_entropy_edge", step = 2 },
  { op = "advance_quest", quest_id = "gr_entropy_edge", step = 3 },
  { op = "complete_quest", quest_id = "gr_entropy_edge" },
  { op = "prestige", amount = 3, reason = "shaped the Entropy Edge with the Umbral Weaver" },
]
qualities = [
  { tier = "poor",        weight = 20, attack_bonus = 8,  equip_msg = "The edge is rough in places — it will cause wounds, but inconsistently.", craft_message = "The entropy resisted shaping. It held, barely." },
  { tier = "standard",    weight = 55, attack_bonus = 11, equip_msg = "The blade is thin and cold. Wounds it makes will bleed freely." },
  { tier = "exceptional", weight = 20, attack_bonus = 13, name_prefix = "Entropic ", equip_msg = "The edge seems to anticipate cuts. The shadow-ore aligned perfectly.", craft_message = "The nullstone drew the entropy clean into the blade. Rare." },
  { tier = "masterwork",  weight = 5,  attack_bonus = 15, name_prefix = "Masterwork ", equip_msg = "The blade is barely there in dim light. Every wound it makes refuses to close.", craft_message = "That was not shaping. That was entropy choosing its own form." },
]
