# Commission 1: Weave the Umbral Mantle (required for gr_mantle quest)
[[commission]]
id             = "gr_weave_mantle"
npc_id         = "gr_umbral_weaver"
label          = "Weave Umbral Mantle"
desc           = "The Umbral Weaver binds shadow-ore and entropy residue into a mantle of shifting darkness."
slot           = ""
weapon_tags    = []
materials      = ["gr_shadow_ore", "gr_entropy_residue"]
turns_required = 12
gold_cost      = 0
on_complete = [
  { op = "message", tag = "crafting", text = "The Weaver draws the shadows tight, weaving them into a mantle that shifts with the light." },
  { op = "give_item", item_id = "umbral_mantle" },
  { op = "advance_quest", quest_id = "gr_mantle", step = 2 },
  { op = "advance_quest", quest_id = "gr_mantle", step = 3 },
  { op = "complete_quest", quest_id = "gr_mantle" },
  { op = "prestige", amount = 2, reason = "mastered the caverns' instability" },
]

# --- Quality Tiers ---
[[quality]]
name        = "Frayed Weave"
min_quality = 0
max_quality = 39
effects     = [
  { type = "stat_bonus", stat = "defense", amount = -1 },
  { type = "stat_bonus", stat = "max_hp",  amount = -3 },
]

[[quality]]
name        = "Balanced Weave"
min_quality = 40
max_quality = 79
effects     = []

[[quality]]
name        = "Umbral Perfection"
min_quality = 80
max_quality = 100
effects     = [
  { type = "stat_bonus", stat = "defense", amount = 2 },
  { type = "stat_bonus", stat = "max_hp",  amount = 5 },
]


