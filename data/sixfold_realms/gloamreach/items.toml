# ---------------------------------------------------------
# LIGHT SOURCES (equippable; light_add adjusts effective light when equipped)
# ---------------------------------------------------------

[[item]]
id          = "gr_dim_lantern"
name        = "Dim Lantern"
desc_short  = "A lantern that emits a weak, wavering glow."
desc_long   = "Its light is barely enough to push back the gloom, but it steadies your steps."
slot        = "offhand"
weight      = 1
respawn     = false
light_add   = 1
tags        = ["light_source"]
gold_value  = 15

[[item]]
id          = "gr_bright_lantern"
name        = "Bright Lantern"
desc_short  = "A lantern that burns with steady, bright light."
desc_long   = "Its glow cuts through the gloom, revealing paths hidden in darkness."
slot        = "offhand"
weight      = 1
respawn     = false
light_add   = 2
tags        = ["light_source"]
gold_value  = 30

[[item]]
id          = "gr_shadow_crystal"
name        = "Shadow Crystal"
desc_short  = "A crystal that absorbs light instead of emitting it."
desc_long   = "Holding it dims your surroundings, revealing paths that hide from brightness."
slot        = "offhand"
weight      = 0
respawn     = false
light_add   = -1
tags        = ["shadow_tool"]
gold_value  = 20


# ---------------------------------------------------------
# EQUIPPABLE ITEMS
# ---------------------------------------------------------

[[item]]
id          = "gr_entropy_band"
name        = "Entropy Band"
desc_short  = "A ring that channels ambient entropy."
desc_long   = "The metal is cool to the touch, humming faintly with the caverns' instability."
slot        = "ring"
weight      = 0
respawn     = false
effects     = [
  { type = "stat_bonus", stat = "defense", amount = 2 },
]

[[item]]
id          = "umbral_mantle"
name        = "Umbral Mantle"
desc_short  = "A cloak woven from shadow-silk and entropy threads."
desc_long   = "It shifts with the light, sometimes absorbing it, sometimes bending it around you."
slot        = "body"
weight      = 1
respawn     = false
tags        = ["shadow", "entropy"]
effects     = [
  { type = "stat_bonus", stat = "defense", amount = 3 },
  { type = "stat_bonus", stat = "max_hp",  amount = 5 },
]


# ---------------------------------------------------------
# TOOLS / CONSUMABLES
# ---------------------------------------------------------

[[item]]
id          = "gr_echo_tuning_fork"
name        = "Echo Tuning Fork"
desc_short  = "A fork that vibrates with delayed resonance."
desc_long   = "Striking it disrupts shadow echoes and stabilizes looping corridors."
slot        = ""
weight      = 0
respawn     = false
gold_value  = 10
on_use      = [
  { op = "if_not_flag", flag = "gr_echo_disrupted", then = [
    { op = "set_flag",      flag = "gr_echo_disrupted" },
    { op = "advance_quest", quest_id = "gr_shadow_fragment", step = 1 },
    { op = "message", tag = "system", text = "The tuning fork hums, disrupting the echo around you." },
  ], else = [
    { op = "message", tag = "system", text = "The echo here is already disrupted. The fork falls silent." },
    { op = "fail" },
  ] },
]

[[item]]
id          = "gr_afterimage_trap"
name        = "Afterimage Trap"
desc_short  = "A small device that captures unstable shadows."
desc_long   = "When activated, it pulls afterimages into itself, neutralizing them."
slot        = ""
weight      = 0
respawn     = false
gold_value  = 8
on_use      = [
  { op = "set_flag", flag = "gr_afterimage_trapped" },
  { op = "message", tag = "system", text = "The trap snaps shut, capturing a drifting afterimage." },
]

[[item]]
id          = "gr_nullstone_shard"
name        = "Nullstone Shard"
desc_short  = "A shard of stone that deadens magical interference."
desc_long   = "It hums faintly, absorbing unstable energy around you."
slot        = ""
weight      = 0
respawn     = false
tags        = ["entropy_resist"]
gold_value  = 12


# ---------------------------------------------------------
# GATHERING NODES (scenery)
# ---------------------------------------------------------

[[item]]
id          = "gr_shadow_ore_vein"
name        = "Shadow-Ore Vein"
desc_short  = "A seam of ore that drinks the surrounding light."
desc_long   = "The ore feels heavier than it looks, as if pulling toward darkness."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
on_get      = [
  { op = "skill_check", skill = "crafting", dc = 10,
    on_pass = [
      { op = "give_item",  item_id = "gr_shadow_ore" },
      { op = "skill_grow", skill = "crafting", amount = 2 },
      { op = "message", tag = "system", text = "You chip free a dense lump of shadow-ore." },
      { op = "if_not_flag", flag = "gr_mantle_started", then = [
        { op = "set_flag", flag = "gr_mantle_started" },
        { op = "advance_quest", quest_id = "gr_mantle", step = 1 },
      ] },
    ],
    on_fail = [
      { op = "give_item",  item_id = "gr_shadow_ore" },
      { op = "message", tag = "system", text = "You pry loose some shadow-ore, though it resists your tools." },
    ],
  },
]

[[item]]
id          = "gr_entropy_pool_node"
name        = "Entropy Pool"
desc_short  = "A pool of roiling black liquid that seeps unstable energy."
desc_long   = "Touching the surface leaves a cold residue on your fingers — entropy residue."
slot        = ""
weight      = 0
scenery     = true
respawn     = true
on_get      = [
  { op = "skill_check", skill = "survival", dc = 8,
    on_pass = [
      { op = "give_item",  item_id = "gr_entropy_residue" },
      { op = "skill_grow", skill = "survival", amount = 2 },
      { op = "message", tag = "system", text = "You carefully collect entropy residue from the pool." },
    ],
    on_fail = [
      { op = "give_item",  item_id = "gr_entropy_residue" },
      { op = "damage",     amount = 2 },
      { op = "message", tag = "system", text = "Entropy residue clings to your skin — and stings." },
    ],
  },
]


