index     = 1
objective = "Enter the Core Chamber and stabilize your resonance."
hint      = "Resonance stability begins at 100. Keep it above 60 to pass the Calibration Gate."

# ---------------------------------------------------------
# ACT II — RECALIBRATION
# ---------------------------------------------------------

[[step]]
index     = 2
objective = "Calibrate all five subsystems in the Resonance Lattice."
