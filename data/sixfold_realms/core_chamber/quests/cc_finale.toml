# ---------------------------------------------------------
# ACT III — THE OVERSEER
# ---------------------------------------------------------

[[step]]
index     = 3
objective = "Defeat the Overseer’s final form."
hint      = "The Overseer reacts to your resonance stability. High stability weakens it."

# ---------------------------------------------------------
# ACT IV — THE CHOICE
# ---------------------------------------------------------

[[step]]
index     = 4
objective = "Realign the central crystal and choose the fate of the device."
hint      = "You may restore the Regulator or disable it permanently."

