[[node]]
id    = "root"
lines = [
  "'Spatial compression detected. Pressure calibration required.'"
]

[[response]]
node = "root"
text = "Stabilize the currents."
next = "calibrate"

[[node]]
id   = "calibrate"
line = "'Airflow normalized.'"
script = [
  { op = "adjust_attr", name = "resonance", amount = 15 },
  { op = "set_flag",    flag = "cc_pressure_aligned" },
]

[[response]]
node = "calibrate"
text = "The currents are steady."
next = ""
