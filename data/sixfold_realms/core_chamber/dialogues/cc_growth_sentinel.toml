[[node]]
id    = "root"
lines = [
  "Roots coil around the sentinel. 'Growth calibration required.'"
]

[[response]]
node = "root"
text = "Guide the vines."
next = "calibrate"

[[node]]
id   = "calibrate"
line = "'Growth cycle stabilized.'"
script = [
  { op = "add_resonance", amount = 10 },
  { op = "set_flag", flag = "cc_growth_aligned" }
]

[[response]]
node = "calibrate"
text = "The vines respond."
next = ""
