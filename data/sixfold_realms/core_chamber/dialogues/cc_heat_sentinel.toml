[[node]]
id    = "root"
lines = [
  "'Thermal imbalance detected. Heat calibration required.'"
]

[[response]]
node = "root"
text = "Balance the vents."
next = "calibrate"

[[node]]
id   = "calibrate"
line = "'Thermal flow restored.'"
script = [
  { op = "add_resonance", amount = 10 },
  { op = "set_flag", flag = "cc_heat_aligned" }
]

[[response]]
node = "calibrate"
text = "The vents are steady."
next = ""
