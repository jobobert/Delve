[[node]]
id    = "root"
lines = [
  "The central crystal pulses weakly. 'Resonance aligned. Awaiting directive.'"
]

[[response]]
node = "root"
text = "Restore the Sixfold Regulator."
next = "restore"

[[response]]
node = "root"
text = "Disable the device permanently."
next = "disable"


# --- Restore Path ---
[[node]]
id   = "restore"
line = "'Directive accepted. Reboot sequence initializing. Resonance restored to all regions.'"
script = [
  { op = "set_flag",       flag = "cc_reboot_restore" },
  { op = "set_flag",       flag = "cc_crystal_activated" },
  { op = "advance_quest",  quest_id = "cc_finale", step = 4 },
  { op = "complete_quest", quest_id = "cc_finale" },
  { op = "prestige", amount = 5, reason = "restored balance to the Sixfold Realms" },
]

[[response]]
node = "restore"
text = "Let the world breathe again."
next = ""


# --- Disable Path ---
[[node]]
id   = "disable"
line = "'Directive accepted. Shutdown sequence initializing. Resonance dissipating.'"
script = [
  { op = "set_flag",       flag = "cc_reboot_disable" },
  { op = "set_flag",       flag = "cc_crystal_activated" },
  { op = "advance_quest",  quest_id = "cc_finale", step = 4 },
  { op = "complete_quest", quest_id = "cc_finale" },
  { op = "prestige", amount = 5, reason = "chose the fate of the Sixfold Realms" },
]

[[response]]
node = "disable"
text = "Let nature reclaim its freedom."
next = ""
