[[node]]
id    = "root"
lines = [
  "'Memory drift detected. Cognitive calibration required.'"
]

[[response]]
node = "root"
text = "Anchor the thoughts."
next = "calibrate"

[[node]]
id   = "calibrate"
line = "'Memory lattice stabilized.'"
script = [
  { op = "add_resonance", amount = 10 },
  { op = "set_flag", flag = "cc_memory_aligned" }
]

[[response]]
node = "calibrate"
text = "The echoes quiet."
next = ""
