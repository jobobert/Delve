# --- HEAT (Dragon Peaks) ---
[[room]]
id          = "cc_heat_calibration"
name        = "Calibration — Heat"
description = "Thermal vents flare rhythmically, like a beating heart. The heat node glows deep orange."
spawns        = ["cc_heat_sentinel"]
spawns      = ["cc_echo_heat"]
exits       = { east = "cc_lattice1" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -3 },
]


# --- MEMORY (Mycelial Plains) ---
[[room]]
id          = "cc_memory_calibration"
name        = "Calibration — Memory"
description = "Fungal nodes glow softly, whispering fragments of forgotten knowledge. The memory sentinel stands in quiet contemplation."
spawns        = ["cc_memory_sentinel"]
spawns      = ["cc_echo_memory"]
