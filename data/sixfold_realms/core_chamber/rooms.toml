# =========================================================
# CORE CHAMBER — ROOMS
# =========================================================
# Resonance mechanic: adjust_attr name="resonance" tracks stability (0-100).
# Resets to 100 on cc_entrance entry.
# Drains during descent; restored by calibrating sentinel spawns (+15 each).
# Calibration Gate (cc_descent7 -> cc_lattice1): requires resonance >= 60.
# Nexus Gate: requires all 5 calibration flags set (checked in on_enter).
# Crystal Chamber: gated by cc_overseer_defeated flag.
# =========================================================


# ---------------------------------------------------------
# DESCENT (1-7)
# ---------------------------------------------------------

[[room]]
id          = "cc_entrance"
name        = "Chamber Threshold"
description = "A circular platform suspended over darkness. Resonance hums beneath your feet, calibrating to your presence."
flags       = ["town"]
spawns      = ["cc_banker"]
exits       = { down = "cc_descent1" }
on_enter    = [
  { op = "set_attr",      name = "resonance", value = 100 },
  { op = "advance_quest", quest_id = "cc_finale", step = 1 },
  { op = "message", tag = "system", text = "Resonance stabilizes to full. The descent begins." },
]

[[room]]
id          = "cc_descent1"
name        = "Descent — Echoing Shaft"
description = "The walls shimmer with faint memories of the regions above."
spawns      = ["cc_resonance_wisp"]
exits       = { up = "cc_entrance", down = "cc_descent2" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -2 },
]

[[room]]
id          = "cc_descent2"
name        = "Descent — Pressure Vein"
description = "A pulse of air pushes against you, like the Mistfen's distortions."
spawns      = ["cc_resonance_wisp"]
exits       = { up = "cc_descent1", down = "cc_descent3" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -2 },
]

[[room]]
id          = "cc_descent3"
name        = "Descent — Overgrowth Scar"
description = "Vines and roots cling to the walls, twitching faintly."
spawns      = ["cc_resonance_wisp"]
exits       = { up = "cc_descent2", down = "cc_descent4" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -2 },
]

[[room]]
id          = "cc_descent4"
name        = "Descent — Thermal Rift"
description = "Heat radiates from cracks in the floor. The air shimmers with instability."
spawns      = ["cc_resonance_sentinel"]
exits       = { up = "cc_descent3", down = "cc_descent5" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -4 },
]

[[room]]
id          = "cc_descent5"
name        = "Descent — Shadow Echo"
description = "Darkness pools unnaturally, bending around any light source."
spawns      = ["cc_resonance_wisp"]
exits       = { up = "cc_descent4", down = "cc_descent6" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -3 },
]

[[room]]
id          = "cc_descent6"
name        = "Descent — Memory Drift"
description = "The walls shift when unobserved. You feel the Plains' influence echoing through stone."
spawns      = ["cc_resonance_wisp"]
exits       = { up = "cc_descent5", down = "cc_descent7" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -2 },
]

[[room]]
id          = "cc_descent7"
name        = "Descent — Calibration Gate"
description = "Five pedestals stand before an archway carved with the symbols of each region. The gate hums, awaiting stable resonance."
exits       = {
  up   = "cc_descent6",
  down = { to = "cc_lattice1", show_if = { op = "has_flag", flag = "cc_gate_stable" } },
}
on_enter    = [
  { op = "if_attr", name = "resonance", min = 60, then = [
    { op = "set_flag", flag = "cc_gate_stable" },
    { op = "message", tag = "system", text = "The gate resonates with your stability. It opens." },
  ], else = [
    { op = "message", tag = "error", text = "The gate rejects unstable resonance. Calibrate in the Lattice above." },
  ] },
]


# ---------------------------------------------------------
# RESONANCE LATTICE (hub + 5 calibration branches)
# ---------------------------------------------------------

[[room]]
id          = "cc_lattice1"
name        = "Lattice — Convergence Hub"
description = "Paths branch in five directions, each echoing a region's influence. The Overseer's presence presses from below."
spawns      = ["cc_resonance_sentinel"]
exits       = {
  north = "cc_light_calibration",
  east  = "cc_pressure_calibration",
  south = "cc_growth_calibration",
  west  = "cc_heat_calibration",
  up    = "cc_memory_calibration",
  down  = { to = "cc_nexus_entrance", show_if = { op = "has_flag", flag = "cc_all_calibrated" } },
}
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -1 },
]


# --- LIGHT (Gloamreach) ---
[[room]]
id          = "cc_light_calibration"
name        = "Calibration — Light"
description = "Mirrors and crystals float in midair, scattering beams of shifting color. A prismatic sentinel watches over the node."
spawns        = ["cc_light_sentinel"]
spawns      = ["cc_echo_light"]
exits       = { south = "cc_lattice1" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -3 },
]


