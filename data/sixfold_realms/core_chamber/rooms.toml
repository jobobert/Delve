on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -3 },
]


# ---------------------------------------------------------
# NEXUS (Overseer's domain)
# ---------------------------------------------------------

[[room]]
id          = "cc_nexus_entrance"
name        = "Nexus — Outer Ring"
description = "The air vibrates with unstable resonance. The Overseer senses your presence. There is no turning back."
spawns      = ["cc_resonance_wisp"]
exits       = { east = "cc_nexus1", up = "cc_lattice1" }
on_enter    = [
  { op = "if_not_flag", flag = "cc_light_aligned", then = [
    { op = "message", tag = "error", text = "The Light subsystem is not calibrated. The nexus rejects you." },
    { op = "teleport_player", room_id = "cc_lattice1" },
  ] },
  { op = "if_not_flag", flag = "cc_pressure_aligned", then = [
    { op = "message", tag = "error", text = "The Pressure subsystem is not calibrated. The nexus rejects you." },
    { op = "teleport_player", room_id = "cc_lattice1" },
  ] },
  { op = "if_not_flag", flag = "cc_growth_aligned", then = [
    { op = "message", tag = "error", text = "The Growth subsystem is not calibrated. The nexus rejects you." },
    { op = "teleport_player", room_id = "cc_lattice1" },
  ] },
  { op = "if_not_flag", flag = "cc_heat_aligned", then = [
    { op = "message", tag = "error", text = "The Heat subsystem is not calibrated. The nexus rejects you." },
    { op = "teleport_player", room_id = "cc_lattice1" },
  ] },
  { op = "if_not_flag", flag = "cc_memory_aligned", then = [
    { op = "message", tag = "error", text = "The Memory subsystem is not calibrated. The nexus rejects you." },
    { op = "teleport_player", room_id = "cc_lattice1" },
  ] },
  { op = "set_flag",      flag = "cc_all_calibrated" },
  { op = "advance_quest", quest_id = "cc_finale", step = 2 },
  { op = "adjust_attr",   name = "resonance", amount = -3 },
  { op = "message", tag = "quest", text = "All five subsystems calibrated. The Overseer awaits." },
]

[[room]]
id          = "cc_nexus1"
name        = "Nexus — Inner Ring"
description = "Energy arcs between floating pillars. The central crystal glows faintly through the archway ahead."
spawns      = ["cc_resonance_sentinel"]
exits       = { west = "cc_nexus_entrance", east = "cc_overseer_arena" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -3 },
]

[[room]]
id          = "cc_overseer_arena"
name        = "Overseer's Arena"
description = "A vast chamber where resonance gathers into a towering construct of shifting light and shadow."
spawns      = ["cc_overseer_final"]
exits       = {
  west = "cc_nexus1",
  east = { to = "cc_crystal_chamber", show_if = { op = "has_flag", flag = "cc_overseer_defeated" } },
}
on_enter    = [
  { op = "if_not_flag", flag = "cc_overseer_defeated", then = [
    { op = "adjust_attr", name = "resonance", amount = -5 },
    { op = "message", tag = "combat", text = "The Overseer turns toward you, its form cycling through all five frequencies." },
  ] },
]


# ---------------------------------------------------------
# CRYSTAL CHAMBER & REBOOT
# ---------------------------------------------------------

[[room]]
id          = "cc_crystal_chamber"
name        = "Crystal Chamber"
description = "The central crystal awaits realignment. Its light flickers weakly, five hues cycling in slow rotation."
spawns        = ["cc_crystal"]
exits       = { west = "cc_overseer_arena", east = "cc_reboot_chamber" }
on_enter    = [
  { op = "if_not_flag", flag = "cc_crystal_activated", then = [
    { op = "message", tag = "quest", text = "The Central Crystal pulses with anticipation. Speak to it to complete the alignment." },
  ] },
]

[[room]]
id          = "cc_reboot_chamber"
name        = "Reboot Chamber"
description = "A circular platform surrounded by rising resonance energy. The device hums with renewed purpose."
exits       = { west = "cc_crystal_chamber" }
on_enter    = [
  { op = "if_flag", flag = "cc_reboot_restore", then = [
    { op = "message", tag = "system", text = "The Sixfold Regulator pulses with renewed life. The world breathes easier." },
  ] },
  { op = "if_flag", flag = "cc_reboot_disable", then = [
    { op = "message", tag = "system", text = "The device winds down in silence. The resonance fades, leaving only quiet." },
  ] },
]
