description = "Air currents twist unpredictably, bending sound and space around the alignment node."
spawns        = ["cc_pressure_sentinel"]
spawns      = ["cc_echo_pressure"]
exits       = { west = "cc_lattice1" }
on_enter    = [
  { op = "adjust_attr", name = "resonance", amount = -3 },
