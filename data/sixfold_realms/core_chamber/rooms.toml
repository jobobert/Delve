[[room]]
id          = "cc_entrance"
name        = "Chamber Threshold"
description = "A circular platform suspended over darkness. Resonance hums beneath your feet."
exits       = { down = "cc_descent1" }
on_enter    = [
  { op = "add_resonance", amount = -2 }
]

[[room]]
id          = "cc_descent1"
name        = "Descent — Echoing Shaft"
description = "The walls shimmer with faint memories of the regions above."
exits       = { up = "cc_entrance", down = "cc_descent2" }
on_enter    = [
  { op = "add_resonance", amount = -1 }
]

[[room]]
id          = "cc_descent2"
name        = "Descent — Pressure Vein"
description = "A pulse of air pushes against you, like the Mistfen’s distortions."
exits       = { up = "cc_descent1", down = "cc_descent3" }
on_enter    = [
  { op = "add_resonance", amount = -2 }
]

[[room]]
id          = "cc_descent3"
name        = "Descent — Overgrowth Scar"
description = "Vines and roots cling to the walls, twitching faintly."
exits       = { up = "cc_descent2", down = "cc_descent4" }
on_enter    = [
  { op = "add_resonance", amount = -1 }
]

[[room]]
id          = "cc_descent4"
name        = "Descent — Thermal Rift"
description = "Heat radiates from cracks in the floor. The air shimmers."
exits       = { up = "cc_descent3", down = "cc_descent5" }
on_enter    = [
  { op = "add_resonance", amount = -3 }
]

[[room]]
id          = "cc_descent5"
name        = "Descent — Shadow Echo"
description = "Darkness pools unnaturally, bending around your light."
exits       = { up = "cc_descent4", down = "cc_descent6" }
on_enter    = [
  { op = "add_resonance", amount = -2 }
]

[[room]]
id          = "cc_descent6"
name        = "Descent — Memory Drift"
description = "The walls shift when unobserved. You feel the Plains’ influence."
exits       = { up = "cc_descent5", down = "cc_descent7" }
on_enter    = [
  { op = "add_resonance", amount = -2 }
]

[[room]]
id          = "cc_descent7"
name        = "Descent — Calibration Gate"
description = "Five pedestals await the device pieces you recovered."
exits       = {
  up = "cc_descent6",
  down = { to = "cc_lattice1", show_if = { op = "resonance_at_least", amount = 60 } }
}
on_enter = [
  { op = "if_resonance_at_most", amount = 59, then = [
    { op = "message", tag = "error", text = "The gate rejects unstable resonance." }
  ] }
]

[[room]]
id          = "cc_lattice1"
name        = "Lattice — Convergence Hub"
description = "Paths branch in five directions, each echoing a region’s influence."
exits       = {
  north = "cc_light_calibration",
  east  = "cc_pressure_calibration",
  south = "cc_growth_calibration",
  west  = "cc_heat_calibration",
  down  = "cc_memory_calibration"
}
on_enter = [
  { op = "add_resonance", amount = -1 }
]

# --- LIGHT (Gloamreach) ---
[[room]]
id          = "cc_light_calibration"
name        = "Calibration — Light"
description = "Mirrors and crystals float in midair, scattering beams of shifting color."
exits       = { south = "cc_lattice1" }
on_enter    = [
  { op = "add_resonance", amount = -5 }
]
on_use = [
  { op = "add_resonance", amount = 15 },
  { op = "set_flag", flag = "cc_light_aligned" }
]

# --- PRESSURE (Mistfen) ---
