[[room]]
id          = "cc_heat_calibration"
name        = "Calibration — Heat"
description = "Thermal vents flare rhythmically, like a beating heart."
exits       = { east = "cc_lattice1" }
on_enter    = [
  { op = "add_resonance", amount = -5 }
]
on_use = [
  { op = "add_resonance", amount = 15 },
  { op = "set_flag", flag = "cc_heat_aligned" }
]

# --- MEMORY (Mycelial Plains) ---
[[room]]
id          = "cc_memory_calibration"
name        = "Calibration — Memory"
description = "Fungal nodes glow softly, whispering fragments of forgotten knowledge."
exits       = { up = "cc_lattice1" }
on_enter    = [
  { op = "add_resonance", amount = -5 }
]
on_use = [
  { op = "add_resonance", amount = 15 },
  { op = "set_flag", flag = "cc_memory_aligned" }
]

[[room]]
id          = "cc_nexus_entrance"
name        = "Nexus — Outer Ring"
description = "The air vibrates with unstable resonance. The Overseer senses your presence."
exits       = { east = "cc_nexus1", west = "cc_lattice1" }
on_enter    = [
  { op = "add_resonance", amount = -3 }
]

[[room]]
id          = "cc_nexus1"
name        = "Nexus — Inner Ring"
description = "Energy arcs between floating pillars. The central crystal glows faintly."
exits       = { west = "cc_nexus_entrance", east = "cc_overseer_arena" }
on_enter    = [
  { op = "add_resonance", amount = -3 }
]

[[room]]
id          = "cc_overseer_arena"
name        = "Overseer’s Arena"
description = "A vast chamber where resonance gathers into a towering construct."
exits       = { west = "cc_nexus1", east = "cc_crystal_chamber" }
on_enter    = [
  { op = "spawn", npc_id = "cc_overseer_final" }
]

[[room]]
id          = "cc_crystal_chamber"
name        = "Crystal Chamber"
description = "The central crystal awaits realignment. Its light flickers weakly."
exits       = {
  west = "cc_overseer_arena",
  east = { to = "cc_reboot_chamber", show_if = { op = "resonance_at_least", amount = 80 } }
}
on_enter = [
  { op = "if_resonance_at_most", amount = 79, then = [
    { op = "message", tag = "error", text = "The crystal rejects unstable resonance." }
  ] }
]

[[room]]
id          = "cc_reboot_chamber"
name        = "Reboot Chamber"
description = "A circular platform surrounded by rising energy. The device awaits your choice."
exits       = { west = "cc_crystal_chamber" }
on_enter    = [
  { op = "message", tag = "system", text = "The Sixfold Regulator awaits your command." }
]

