# ---------------------------------------------------------
# OVERSEER — Final Form (boss)
# ---------------------------------------------------------

[[npc]]
id          = "cc_overseer_final"
name        = "The Overseer"
desc_short  = "A towering resonance construct formed from all five subsystems."
desc_long   = "Its body shifts between light, shadow, heat, pressure, growth, and memory. It is not hostile by nature, but its directive is absolute: prevent catastrophic overload."
tags        = ["construct", "boss", "resonance", "large", "armored"]
style       = "resonance_core"
style_prof  = 80
hp          = 300
max_hp      = 300
attack      = 25
defense     = 18
hostile     = true
xp_reward   = 500
gold_reward = 0
dialogue    = "cc_overseer_final"

kill_script = [
  { op = "set_flag",      flag = "cc_overseer_defeated" },
  { op = "advance_quest", quest_id = "cc_finale", step = 3 },
  { op = "give_item",     item_id = "cc_lattice_band" },
  { op = "message", tag = "combat_kill", text = "The Overseer dissolves into harmonic light, its directive finally silenced." },
]

round_script = [
  # Low resonance — Overseer exploits the instability to deal bonus damage
  { op = "if_attr", name = "resonance", max = 40, then = [
    { op = "say", text = "Resonance unstable. Shutdown protocol initiated." },
    { op = "damage", amount = 12 },
  ] },
  # High resonance at round 5+ — player gains protective shimmer
  { op = "if_attr", name = "resonance", min = 80, then = [
    { op = "if_combat_round", min = 5, then = [
      { op = "say", text = "Stability rising. Recalibration imminent." },
      { op = "apply_status", effect = "protected", duration = 2 },
    ] },
  ] },
]


