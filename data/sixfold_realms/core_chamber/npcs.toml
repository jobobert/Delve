# ---------------------------------------------------------
# Overseer — Final Form
# ---------------------------------------------------------

[[npc]]
id          = "cc_overseer_final"
name        = "The Overseer"
desc_short  = "A towering resonance construct formed from all five subsystems."
desc_long   = "Its body shifts between light, shadow, heat, pressure, growth, and memory. It is not hostile by nature, but its directive is absolute: prevent catastrophic overload."
tags        = ["construct", "boss", "resonance"]
style       = "resonance_core"
style_prof  = 80
hp          = 300
max_hp      = 300
attack      = 25
defense     = 18
hostile     = true
xp_reward   = 500
gold_reward = 0

# The Overseer reacts to resonance stability.
round_script = [
  { op = "if_resonance_at_most", amount = 40, then = [
    { op = "say", text = "Resonance unstable. Shutdown required." },
    { op = "damage", amount = 12 }
  ] },
  { op = "if_resonance_at_least", amount = 80, then = [
    { op = "say", text = "Stability rising. Recalibration possible." },
    { op = "heal", amount = 10 }
  ] }
]

kill_script = [
  { op = "set_flag", flag = "cc_overseer_defeated" },
  { op = "advance_quest", quest_id = "cc_finale", step = 2 },
  { op = "message", tag = "combat_kill", text = "The Overseer dissolves into harmonic light." }
]


